body:
  text: 卷二癇痙仆地作聲醒吐瀺涎異於驚病命之曰癇小兒惡候癇其一焉所以然者氣骨不堅臟腑尚弱血脈未全乳哺失節客氣相干惟風驚食乃癇之原風屬外感驚屬內緣不內不外食所是專蓋此三因三癇各纏別其經絡脾與心肝然古癇症稱有五端五臟配合六畜殊看一曰馬癇馬叫連連此其所屬心火熬煎二曰羊癇羊叫綿綿此其所屬肝風作愆三曰雞癇雞鳴關關此其所屬肺部邪干四曰豬癇豬叫漫漫此其所屬右腎病傳五曰牛癇牛吼嘽嘽此其所屬脾土濕湮應聲而發俱各僕顛心則面赤吐齧舌尖肝則面青手足掣攣腎則面黑體直屍眠肺則面白驚跳頭旋脾則面黃四肢緩癱古人分辨若是班班然諸癇症莫不有痰咽喉梗塞聲出多般致疾之由驚食風寒血滯心竅邪犯心官隨聲所發輕重斷聯雖似六畜詎竟確然奚分五臟附會戔戔耑通心主血脈調宣豁痰順氣治法真詮醫者識此慎毋改遷癇為心病痙乃肝瘨風邪所襲太陽最先肝風內煽相與招延內外風合強直難扳角弓反張發則如弦不搐不搦目惟上觀有剛有柔悉心以探大約氣虛病根內拴兼痰挾火病勢難安治痙之法其旨甚元搖頭噤口相類為緣乘脾合膽區別其間癇痙之分張元素曰身軟時醒者為癇身反張強直如弓不時醒者為痓十無一生痓與痙亦驚風之屬陳藏器曰驚癇即急驚之症但驚癇發時仆地作聲醒時吐涎沫急慢驚俱不作聲不吐沫也楊士瀛曰痓者手足冰冷痙者舉身強直痓痙本一病當以陽剛陰柔別之剛者無汗柔者有汗其症肢體強直腰身反張甚於風癇大抵不治癇者卒然暈倒目瞪流涎神氣鬱勃四肢搐搦沉默昏憒似死似生其聲惡叫過後惺惺治法惟以驚風食三種陰陽二症別而治之如驚癇者恐怖積驚而發啼叫恍惚宜定魄丸沉香天麻湯風癇者風邪外襲先屈手指如數物乃發宜追風祛痰丸食癇者乳食時遇驚停積或成癖或大便酸臭宜紫霜丸始也身熱抽搐啼叫是為陽癇易治宜龍腦安神丸始也身無熱手足清冷不抽掣不啼叫是為陰癇難治宜引神歸舍丹因急驚成癇宜三癇丹因慢驚成癇宜來復丹取利胎中受驚成癇宜燒丹丸癇病方萌耳後高骨間必有青紋紛紛如線見之急用爪破須令血出啼叫尤得氣通更易效也薛己曰錢云角弓反張者由風邪客太陽經也足太陽主周身之氣其脈起於目內眥而行肝屬木主風所以風邪易侵也夫小兒皮膚未密外邪易傷肝為相火其怒易發若身反張強直發熱不搐者風傳太陽也宜人參羌活湯丹溪云痙比癇為虛宜帶補多是氣虛有火兼痰用人參竹瀝治之不用兼風之藥此論實發前人所未發前輩雖云十無一生蓋未嘗有此法施於人也陰陽二癇史演山曰陽癇者因感驚風三次發搐不為去風下痰則再發曰三次者或一月或一季一發驚搐必經過三度故曰三次非一日三次也所謂驚風三發即為癇者是也其候身熱自汗目上視嚼沫咬牙手足掣搐面紅紫脈皆浮數以白解散加五和湯疏解下痰用水晶丹半夏丸陰癇者因慢驚後去痰不盡痰入心包而得四肢逆冷吐舌搖頭嚼沫牙關緊閉不甚驚搐作啼面色或白或青脈沉微治以固真湯調寬氣飲和解王汝言曰癇小兒之惡候也蓋小兒血脈不斂氣骨不聚為風邪所觸為乳哺失節停結癖積而得之其候神氣怫鬱瞪目直視面目牽引口噤流涎肚腹膨脹手足掣搐似死似生或聲或啞或項背反張或腰脊強直但四體柔弱發而時醒者為癇若一身強硬終日不醒者則為痙症不可不辨風驚食三癇王肯堂曰全嬰方云風癇因將養失度血氣不和或厚衣汗出腠理開舒風邪入之其病在肝肝主風其症目赤面青發搐宜琥珀散驅風膏大青膏有熱四順飲退後與利驚丸下其痰涎驚癇因血氣盛實臟腑生熱或驚怖大啼精神傷動外邪入之其病在心心主驚其症忽然叫聲發搐宜琥珀散鎮心丸有熱四順飲利驚丸下之不生別病食癇其病在脾脾納食其症噯吐醙氣即發搐此症或大便酸臭紫丸子下之以上三症大同小異並屬陽也各目睛翻斜手足潮搐或作豬聲發過即瘥皆十生一死五臟癇薛己曰面赤目瞪吐舌齧舌心煩氣短其聲如羊曰心癇面青唇青兩眼上竄手足攣掣反折其聲如犬曰肝癇面黑目振吐沫形如屍其聲如豬曰腎癇面如枯骨目白反視驚跳反折搖頭吐沫其聲如雞曰肺癇面痿黃目直腹滿四肢不收自利其聲如牛曰脾癇五癇通用五色丸為主參以各經之藥王肯堂曰按千金敘六畜癇無五臟之分錢氏始分之而無馬癇曾氏謂初發作羊犬聲者咽喉為風痰所梗聲自如此其理甚明言六畜者強名之耳故丹溪謂於經既無所據而治法亦未有五者之分所以不必分五也癇症治法劉完素曰大抵血滯心竅邪氣在心積驚成癇通行心經調平血脈順氣豁痰乃其要也假如小兒有熱有痰不欲乳哺眠睡不安常常驚悸此皆發癇之漸即以紫霜丸導之時間量與此丸減其盛氣則無驚風癇釣之患諸癇發不能言者蓋咽喉為氣之道路風傷其氣以掩聲音道路之門抑亦血滯於心心竅不通所致耳南星炮為末豬膽汁調和少許啖之極效若錢氏五癇丸南星散以菖蒲湯調下治癇之要藥也諸癇不治症錢乙曰五癇甚者死病後甚者亦死婁全善曰小兒癇病目直無聲目睹不轉眼生白障唇黑眼慢瞳人瞬動目間青黑面青指黑口出涎沫如白膿口噤肚脹不乳喉如牽鋸之聲多睡不乳身熱下血不乳身體痿軟不醒腹內虛鳴痞逆而痛吐利不止汗出壯熱不休臥久不寢身體反張大人脊下容一手小兒脊下容一指並不治痙必拘攣張渙曰小兒痙病所受肝風怯弱致筋脈攣縮兩手拳伸展無力是名拘攣宜薏苡丹疳積古稱兒病驚疳最大驚得心肝疳得脾胃臟腑因由各不相蔽童稚之時病則為疳弱冠而後病成癆瘵同出異名惟年齒計元氣虧傷氣血虛憊其原則一非有他癘曰惟小兒臟腑嬌脆飽固易傷飢亦為害熱則熏蒸冷則凝滯故疳之來必有伊始或幼闕乳耗傷形氣此疳之根積漸生蒂或兩三歲乳食無制此疳由脾過飽反瘁或喜生冷甘肥黏膩此疳由積腸胃氣閉或母自養一切無忌喜怒淫勞即與乳吮此疳由母傳氣為戾或因病餘妄行轉泄胃枯液亡虛熱漸熾此疳由醫冒昧錯治大抵疳病緣此等弊然而古人五臟分隸各有症形各有方劑肝心腎肺脾總多累二十四候更宜體會莊氏家傳最為詳備總之疳候必先貪嗜鹽酸炭米好吃泥塊口渴且饞形體憔悴潮熱腸鳴面黃便穢漸漸腹脹牙干目眯揉鼻撏眉脊高項細甚至縮腮頭皮光異肚大筋青發焦毛萃齦爛腿枯周身疥癩種種惡候詎必齊逮約略形神實惟危殆為語病家毋徒嗟喟失治於前今亦無奈疳病原由症治錢乙曰大抵疳病當辨寒熱肥瘦其初病者為肥熱疳久病者為瘦冷疳冷熱交作者為冷熱疳當分治之諸疳皆當補其母假令日中發潮熱是心虛熱也肝為心母法當先補肝母肝實而後瀉心心得母氣則內平而潮熱自愈矣危亦林曰疳者干也瘦瘁少血也皆由氣血虛憊臟腑受傷故有五臟疳外有蛔疳脊疳腦疳乾疳疳渴疳瀉疳痢疳腫疳瘡疳勞無辜疳丁奚哺露治之各有方其病多因乳哺失常肥甘不節腸胃積滯而得之惟腎疳害人最速蓋腎虛受邪疳奔上焦故以走馬為喻初作口臭次傳齒黑齦爛熱血迸出甚則齒脫宜急治之才得全活然齒不復生矣張元素曰疳者小兒受癖或久吐瀉醫者妄投轉過之藥小兒易為虛實致令胃虛而亡津液內發虛熱外消肌肉一臟虛則諸臟皆弱其病目胞腫腹脹利色無常漸加瘦瘠久不痊可是腸胃有風宜宣風散導之後則各依本臟補其母聖惠方曰凡小兒疳在內眼澀腹脹利色無常或如泔澱日漸羸瘦此候可療若鼻下赤爛自揉鼻頭上有瘡生痂痛癢漸漸流引繞於兩耳時時目赤頭髮稀疏腦皮光緊頭大項細肌體瘦羸亦可治也若唇口被蝕齒齦五色或盡峭黑舌下有白瘡上齶有竅子口中時有臭氣齒齦漸染欲爛亦可治也若下部開張有時赤爛癢不可忍下利無常亦可治也若疳蝕脊膂十指皆癢自咬指甲頭髮作穗脊骨如鋸有時腹脹有時下痢若急治之無不瘥也惟五疳有絕候皆不可治一襯著腳中指底不覺疼二抱著手足垂軃無力三病未退遍身不暖四臟腑瀉青涎及沫不止五項筋舒展無力如此之候皆不可治也初虞世曰有熱疳有冷疳有冷熱疳此其要也熱疳者病多在外鼻下赤爛頭癢濕癢五心煩熱掀衣氣粗渴引冷水煩躁臥地肚熱腳冷潮熱往來皆熱疳也冷疳者病多在內利色無常其沫青白肢體軟弱目腫面黧又一症躁渴臥地似有熱狀惟飲食不進滑泄無已亦冷疳也其有瀉多膿血日加瘦弱此則謂之冷熱疳大抵疳之受病皆虛使然熱者虛中之熱冷者虛中之冷治熱不可妄表過涼治冷不可峻溫驟補故曰小兒易為虛實脾虛不受寒溫服寒則生冷服溫則生熱當識此勿誤曾氏曰大抵疳之為病皆因過餐飲食於脾家一臟有積不治傳之餘臟而成五疳之疾若脾家病去則餘臟皆安苟失其治日久必有傳變脾家病宜沉香檳榔丸烏犀丸更察虛實療之有蟲者使君子丸心腹痛吐清水蟲自下者二聖丸諸疳症皆宜用五疳保童丸萬應丸常服化積治疳仍各投本臟調理之劑寧心茯神湯調肝耆歸湯調脾參苓白朮散補肺補肺散補腎調元散庶各得其宜前症不致再作葉桂曰幼兒斷乳納食值夏月脾胃主氣易於肚膨泄瀉頭及手足心熱形體日瘦或煩渴善食漸成五疳積聚當審體之強弱病之新久有餘者當疏胃清熱食入糞色白或不化當健脾佐消導清熱若濕熱內郁蟲積腹痛導滯驅蟲微下之緩調用肥兒丸之屬稚年五疳猶大方五癆雖方書有五臟之分是症夏令為多固從脾胃蓋小兒乳食雜進運化不及初斷乳後果腥雜進氣傷滯聚致熱蒸於裡肌肉消瘦腹大肢細名曰丁奚或善食或不嗜食或渴飲無度或便瀉白色久延不已多致凶危宜忌食生冷腥肥凝滯治法初用清熱和中分利次則疏補化運一定之理五臟疳錢乙曰肝疳亦名風疳白膜遮睛亦名筋疳瀉血而瘦心疳亦名驚疳面黃頰赤身壯熱脾疳亦名食疳面黃腹大食泥土又名肥疳身瘦虛黃干而有瘡其候不一今略舉之目澀或生白膜唇赤身干黃或黑喜臥冷地或食泥土身有瘡疥瀉青白黃沫水利色變易腹滿髮鬢作穗頭大項細極瘦飲水肺疳亦名氣疳氣喘口鼻生瘡腎疳亦名急疳極瘦瘡疥亦名骨疳喜臥冷地曾氏曰肝疳生眵髮際左臉多青或白睛微黃瀉利夾水或如苔色心疳咬牙舒舌愛飲冷水喜伏眠於地脾疳愛食冷物引飲無度身面俱黃發稀作穗頭大項小腹脹腳弱或瀉肌瘦目慢晝涼夜熱不思乳食肺疳鼻下赤爛手足枯細口腥右腮㿠白腎疳兩耳內外生瘡腳如鶴膝頭縫不合或未能行牙齒生遲其縫臭爛傳作走馬疳之類王漢東曰凡治疳不必細分五疳但虛則補之熱則清之冷則溫之吐則治吐利則治利積則治積蟲則治蟲不出集聖丸一方加減用之屢試屢效無辜疳聖惠方曰小兒無辜疳腦後有核如彈丸捏之反下轉是也若不速去當損其命此核初生軟而不痛中有蟲如米粉得熱氣漸長大大則筋結定定即蟲隨血氣流散所有停蓄子母相生侵蝕臟腑肌肉作瘡或大便泄膿血致漸黃瘦頭大發直手足細弱從茲夭折王漢東曰小兒無辜疳者蓋是飢飽勞役風驚暑積入邪所傷久漸黃瘦吃食不長肌肉夜間多哭身上或發微熱多渴不知飢飽或生瘡癬是也疳病二十四候莊氏家傳曰第一候瀉膿血日漸瘦是冷熱疳第二候腳細肚高胸前骨生愛吃泥土酸鹹日久通身黃時時吐逆下利腹內疼痛是脾疳第三候鼻下赤爛愛揉眼兼血痢是肺疳乃因吃熱物或病乳所傷心肺加之咳嗽更服涼冷藥過多便上熱下冷漸漸昏沉日夜煩哭第四候皮虛皺面無顏色身上燥癢心煩第五候毛髮稀疏鼻內生瘡是肺疳第六候頭生瘡發稀焦是肝疳第七候牙變黃赤不定是腎疳第八候發焦乾鼻下生瘡是肺疳第九候咬指甲毛髮作穗四肢沉重是心疳第十候齒蟲蝕肚上筋生是骨槽疳第十一候肚逆腹脹是胃疳又名奶疳第十二候牙齦臭爛面無顏色不思食是脾疳又名口疳第十三候愛合面臥多睡如醉腹脹氣急因曾吃生肉腹內有蟲是心脾疳第十四候鼻內乾燥疼痛口中臭氣牙根有鮮紅血是肝肺疳第十五候腳細肚高並青筋是脾疳第十六候非時生瘡愛吃冷水是熱疳第十七候皮膚上生粟子糞中米出是脾冷疳第十八候氣滿腹脹及口乾是心胃疳第十九候愛吃生米麵炭磚瓦是脾胃疳第二十候揉鼻揩眼咬指甲愛飲水是肝渴疳第二十一候多寒熱愛臥不起是骨熱疳第二十二候愛飲水目不開是肝疳第二十三候肌體或熱或涼發渴無時是急疳第二十四候牙根黑唇懶開開則赤是心疳積熱丁奚哺露李梴曰丁奚者腹大頸細黃瘦是也丁者手足與項極小伶仃也奚者腹大也甚者尻高肉削臍突胸滿或生谷症愛吃生米土炭等物宜十全丹布袋丸哺露者虛熱往來頭骨分解反食吐蟲煩渴嘔噦骨瘦崚嶒露形蓋丁奚哺露皆因脾胃久虛形體瘦削亦由胎稟所成盡皆無辜種類並難治大體相似宜十全丹布袋丸疳病名目史演山曰積是疳之母所以有積不治乃成疳候又有治積不下其積存而臟虛成疳尤重大抵小兒泄瀉無時作渴虛熱煩躁下利腫滿喘急皆疳候虛症古云疳虛用補是知疳之為疾不可更利動臟腑發作之初名曰疳氣肚大脹急名曰肝虛瀉利頻並名曰疳積五心煩熱名曰疳熱毛焦發穗肚大筋青好吃異物名曰疳極熱發往來形體枯槁面無神采名曰疳癆手足細小項長骨露尻臀無肉腹脹臍突名曰丁奚食加嘔噦頭骨分開作渴引飲蟲從口出名曰哺露總皆疳候五疳出蟲法聖惠方曰五疳久而不瘥則腹內必有蟲肌體黃瘦下利不止宜服藥出之用聖惠乾蟾丸則疳氣漸退其蟲狀如絲髮或如馬尾多出於腹背及頭項上若蟲色黃白赤者可治青色者不可療也又有積疳蟲蟲蝕脊膂身熱羸瘦黃色積中生熱煩渴下利拍背如鼓鳴脊骨如鋸齒或十指皆瘡頻咬爪甲是也宜聖惠金蟾散走馬疳王好古曰走馬疳疳蝕之極也乃五臟蒸熱上攻甚即偏沿作崩沙候牙邊肉腫爛口內氣臭身微潮熱吃食不得牙縫出鮮血常動搖似欲脫肉爛自漏落治之先以淡鹽湯洗口即下紫金散摻之日三次揩殺牙邊肉內蟲如大段甚即下秋霜散摻之然後以天竺黃散夾地黃膏調理即安如不退先落齒一兩三個即死不治相次面光發腮漏見骨而殂鰲按曾氏治法先去積熱用當歸散合三稜散加薑棗煎服次投蘆薈丸玉露飲及以鹽溫水灌漱或以軟雞翎蘸鹽水拂洗拭乾以密陀僧散敷之若經久不愈傳於唇之上下成崩沙症腮穿齒落而死疳病不治症危亦林曰如疳癆疳瀉面槁色夭齒張骨露腹硬不食皆疳之症也李梴曰肝疳目帶青左脅下硬多吐沫眼頭黑者不治心疳耳邊有青脈舌上有焦點者不治脾疳肚大青筋唇口無血色人中平下利不止者不治肺疳嗽逆氣急瀉白水身上黑斑者不治腎疳要吃鹹酸飲水不住小便如粉汁齒黑有瘡骨出耳干腦焦不治疳渴飲水不止舌黑者死疳癆氣促者死疳瀉痢咳逆脫肛者不治發熱煩躁病有輕重無不熱歊熱不一端內外久暴陰虛內燒陽盛外燥病久骨蒸病暴液耗驚食風寒疳痰癖懊皆令發熱昏迷顛倒各有兼症均宜詳校而此諸熱五臟分攪額赤咬牙掌中若燎渴飲或嘔心熱可料左頰先赤便難筋掉多怒多驚肝熱如告鼻赤嗜臥肢體惰傲遇夜益甚脾熱堪道喘嗽氣粗右頰紅冒手掐眉目肺熱宜悼足不喜覆頦赤聲噪骨酥如蟲腎熱與較更參虛實理無或拗熱必發煩熱必發躁症異原同俱非易療如何謂煩火入肺竅如何謂躁火入腎篎其火維何必君獨耀金燔水涸病日以虣㘂煎不安心經熱鬧㘂啀不定心經風鉸皆足生驚急慢天釣發熱煩躁往往齊到尋源溯流全憑性巧對症立方病根是掃五臟熱錢乙曰面上左腮為肝右腮為肺額上為心鼻為脾頦為腎赤色者熱也隨症治之身熱不飲水者熱在外身熱飲水者熱在內也小兒熱病六一散妙藥也寒水石散亦佳凡熱症疏利後或和解後無虛症勿溫補熱必隨生也諸熱通用小兒清心丸李梴曰肝熱手尋衣領亂捻物瀉青丸壯熱飲水喘悶瀉白散心熱視其睡口中氣溫或合面睡及上竄咬牙導赤散脾熱目黃肚大怠惰嗜臥身熱飲水四肢不收瀉黃散肺熱手掐眉目鼻面甘桔湯腎熱兩足不喜衣覆地黃丸薛己曰肝熱者左頰先赤便難筋急多怒多驚四肢困倦寅卯時益甚瀉青丸柴胡飲子心熱者額上先赤心煩心痛掌中熱而噦或壯熱飲水巳午時益甚導赤散瀉心湯脾熱者鼻上先赤其熱在肌肉遇夜益甚瀉黃散肺熱者右頰先赤日西熱甚輕則瀉白散重則地骨皮散腎熱者頦下先赤兩足熱甚骨酥酥如蟲蝕熱盛不能起於床夜間益盛滋腎丸熱有虛實表裡譚殊聖曰虛熱者因病後發熱無時一日三五次者此客熱乘虛而作其必氣血未勻四體羸弱治宜調氣補虛其熱自退宜白朮散或未退人參犀角散薛己曰虛則喜熱惡寒乍涼乍溫怫鬱驚惕上盛下泄屈體而臥睡而露睛面色青白恍惚神緩噓氣軟弱手足指冷宜惺惺散實則仰體而臥睡不露睛面赤氣粗口熱燥渴二便難煩啼暴叫手足指熱宜四順清涼飲加柴胡壯熱惡風寒為元氣不充表之虛熱也壯熱不惡風寒為外邪所客表之實熱也壯熱欲飲湯為津液短少里之虛熱也壯熱飲水為內火燔爍里之實熱也熱而二便調和風邪蘊結於裡而發者此表熱惺惺散加麻黃汗之熱而頰赤作渴睡眠不安四肢驚掣者此裡熱四順清涼飲熱辨溫壯煩王肯堂曰溫熱與壯熱相類而異一向熱不止由氣血壅實五臟生熱蒸熨於內則眠臥不安精神恍惚熏發於外則表裡俱熱煩躁喘粗甚則發驚癇也輕則火府丹金蓮飲子重則梔子仁湯若但溫溫然不甚盛是溫熱也大便臭而黃者此腹內有伏熱也四順飲子糞白而酸臭則挾宿食不消也紫霜丸輕者少服重者多服節哺乳當取微利至五心熱盛煩躁不安手足時欲露出小便赤澀謂之煩熱七寶散若唇深紅飲水不止竹葉石膏湯熱分驚積閻孝忠曰驚熱者遍身發熱或熱而不甚面青自汗睡夢虛驚顛叫恍惚有因驚而生熱者有因熱而生驚者錢氏導赤散涼驚丸皆其治也曾氏曰積熱者腹中有癖而發熱也必眼胞浮腫面黃足冷發熱從頭至肚愈甚或聞飲食之氣噁心及腸疼嘔吐治同傷積熱有晝夜久暫之分萬全曰按鄭氏全嬰方所云血熱者巳午發熱夜則涼指小兒血盛實而言也蓋謂巳午者心火用事之時也心主血血氣行至巳午則陽氣盛陽氣與正氣相搏故至期而發熱非其時者非血熱也宜龍膽丸地黃膏之類海藏云夜熱屬陰四順飲之類此言血熱在夜也脈經云小兒有宿食嘗暮發熱明日復止此言宿食夜熱也積熱者久熱也疳熱亦久但兼面黃吃炭土鼻下爛也三因云小兒積熱者表裡俱熱遍身皆熱頰赤口乾小便赤大便焦黃先以四順飲利動臟腑則熱去既去復熱者內熱已解而表熱未解也當用惺惺散表熱乃去表熱去後又發熱者此表裡俱虛氣不歸元而陽浮於外所以發熱非熱極也只用六神散入粳米煎和其胃氣則陽收歸內身體便涼重者用銀白散暫時發熱者或由感冒而得也寒熱並作薛己曰陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒寒熱往來此乃陰陽相勝也夫陰氣並於陰則發寒陽氣並於陽則發熱寸口脈微為陽不足陰氣上入陽中則惡寒尺脈弱為陰不足陽氣下入陰中則發熱陽不足則先寒後熱陰不足則先熱後寒陰陽不歸其分則寒熱交爭也又上盛則發熱下盛則發寒陽勝則乍熱陰勝則乍寒陰陽相勝虛實不調故邪氣更作而寒熱往來或乍寒乍熱也少陽膽者肝之腑界於表裡之間陰陽之氣易乘故寒熱多主肝膽經症以小柴胡湯加減治之若只見寒熱起居如常久而不愈及大病後元氣未復悉屬陰虛生熱陽虛生寒宜八珍湯甚者十全大補湯有宿食為病亦令寒熱保和丸食積既消而寒熱尚作者肝邪乘脾所勝侮所不勝也異功散加柴胡山梔張渙曰寒熱症有頭疼汗出者有嘔吐不食者有憎寒而反飲水者有壯熱而反飲湯者有筋骨疼痛者有因食積寒而腹中痛熱而腹中鳴者鰲按此寒熱並作乃自為一症故有一日兩三度發或五六度發者非如瘧之休止有時也其瘧症寒熱另詳瘧門骨蒸熱潮熱餘熱曾氏曰骨蒸熱者身體虛羸遇晚而發有熱無寒醒時渴汗方止此乃疳病之餘毒傳作骨蒸或腹內有癖塊有時微痛用化癖丸先治脾虛宿滯次以柴胡飲為治仍忌雞酒羊面毒物鰲按湯氏治骨蒸熱用生犀散地骨皮散七寶散金蓮飲子殊為妥協存參有小兒熱症用表裡藥後其熱俱退既乃復熱者為餘熱也推其原乃表裡俱虛而陽浮於外陰伏於內所以又發熱宜用溫平藥和其里則體熱自除錢氏白朮散去木香加扁豆水煎及黃耆六一湯安神散自然平復龔信曰熱有作止每日應時而發謂之潮熱如潮信之不失其期也錢氏云假如潮熱是一臟實一臟虛而內發虛熱也法當補母而瀉本臟則愈且如日中發潮熱者心虛也脈為心之母則宜先補肝肝實而後瀉心心得母氣則內平而潮熱愈也醫見潮熱妄謂其實乃以硝黃諸冷藥下之下既多矣不能禁約而津液內竭縱取一時之瘥鮮不成疳病而身瘦也曾氏法遇潮熱症先以百解散發表次以當歸散治之脈實者以大柴胡下之虛浮數者以百解散微汗之若潮熱而嘔者小柴胡和解之王肯堂曰餘熱者謂寒邪未盡傳經之遺熱也仁齋曰傷寒汗下後而熱又來乃表裡俱虛氣不歸元陽浮於外不可再用涼藥蓋熱去則寒起古人戒之法當和胃使陽氣收斂其熱自止宜參苓白朮散煩躁原由症治薛己曰仲景云火入肺則煩入腎則躁夫心者君火也火旺則金燔水虧而火獨存故肺腎合而為躁也活人云但煩熱者虛煩也諸虛煩熱與傷寒相似但不惡寒鼻不疼故知非傷寒也頭不疼脈不緊故知非裡寒也不可發汗攻下當與竹葉湯兼嘔橘皮湯又心虛則先煩而後渴翕翕發熱其脈浮緊而大是也蓋煩者心中煩擾為內熱故屬陽躁者肢體躁動或踝身為外熱故屬陰外熱者無根之火也是以為虛在小兒當辨其㘂煎不安是煩㘂啀不定是躁㘂煎者心經有熱精神恍惚煩滿生驚㘂啀者心經有風煩躁驚搐也熱甚者黃連解毒湯輕者導赤散風熱者至寶丹脈數而實便閉者神芎丸此皆實熱之治法也若煩而頭痛短氣口乾咽燥不渴者虛也四君加芎歸煩不得眠酸棗仁湯面戴陽目內赤六脈洪大按之全無者血虛發躁當歸補血湯若躁而踝體欲入並中脈沉細或浮大按之如無者此皆陰盛發躁宜參附湯有回生之功也傷寒漢張仲景創論傷寒六經分治陰陽並觀傳變不一貴探其原表則易治里豈易痊三陽為表里症常兼三陰為里表症亦繁病機疊出不一其端合併兩感欲辨難言汗吐下法不誤則安男婦大小大概皆然然而小兒還須另看臟腑嬌嫩六氣未完外邪易犯乳食多愆一旦病至身熱如煎頭疼骨痛閤眼赤顴或汗無汗發渴咽乾種種形症病則相牽謂為傷寒寧曰否焉然而幼稚雜病多般驚疳痰食痘疹煩冤總皆發熱躁擾相干設若誤認時日遷延如大人法治之必偏百十三方立斃下咽如是死者良屬可憐如是死者醫罪曷寬審音察色詳辨為先內傷外感務究其根脈或罔據三關細研毋俾病勢變幻纏綿再參疫癘夏熱春溫中風中濕暑暍瀰漫認病毋錯方治求全庶幾是兒壽保彭籛傷寒原由症治張元素曰凡小兒傷寒表症有惡風惡寒者當發表如氣盛能食不大便無表症者可攻裡春主溫屬木身溫當發汗夏主長屬火身熱而煩躁合大發散長夏主化屬土四季月同當調其飲食秋主收屬金身涼內溫合微下冬主臟屬水身熱而惡寒是熱在外而寒在內身涼而惡熱是熱在內而寒在外熱在內者調胃承氣湯寒在內者調中湯丸凡小兒傷寒宜依四時陰陽升降順逆剛柔而施治氣升浮則發之收藏則下之有汗發熱惡風脈浮緩者風傷衛桂枝湯無汗發熱惡寒不當風而自憎寒脈浮緊者寒傷榮麻黃湯有汗發熱惡風脈浮緊無汗發熱惡寒脈浮緩謂之榮衛俱傷桂枝麻黃合半湯無汗發熱不惡風寒脈沉洪者可下之更詳其厥與不厥量寒熱淺深而治之有汗四肢厥脈沉微者名陰厥四逆湯無汗四肢厥脈沉微者名陽厥大承氣湯如四肢不厥身熱內外皆陽不動三焦宜涼藥三五服下之黃芩甘草湯黃芩白朮湯黃芩蒼朮湯黃芩梔子湯連翹飲子小柴胡湯八正散涼膈散白虎湯五黃散此上中下三焦藥宜選用中暑脈虛背寒惡自汗而渴者白虎湯身涼脈緊熱在內者急下之口燥咽乾不大便是也無汗身大熱者可發汗升麻湯大青膏天麻膏有汗身大熱者惺惺散桂枝湯解肌湯小柴胡湯白朮防風湯可選用發汗者量四時暄暑燥濕風寒各宜春涼夏寒秋溫冬熱而發之如身表無大熱而小便不利是有濕熱結膀胱仍用勝濕藥白朮白茯苓之類以利小便則其熱自退傷寒咳嗽吐清水哽氣長出氣是肺不足也阿膠散面白如枯骨者死不治身熱咳嗽吐痰者褊銀丸若有表症惡風寒而嗽者惺惺散加減鼠黏子湯身大熱吐逆不止者茯苓半夏湯大吐者當下之消積丸潮熱有時胸滿短氣嘔吐者桃奴丸張云岐曰小兒有寒邪及瘟氣時疫瘡疹身疼頭痛壯熱多眠不語潮熱煩渴痰實咳嗽人參羌活湯時氣頭昏體熱七寶散小兒同乳母服大人亦可用小兒表傷寒則皮膚閉而為熱盛即生風欲為驚搐血氣未實不能勝邪故發搐也大小便依度口中氣熱當發之宜大青膏肺盛復有風冷則胸滿短氣氣急喘嗽上氣當先散肺瀉白散後發散大青膏若止傷寒則不胸滿設令小兒卒暴身壯熱惡寒四肢冷或耳尻冷鼻氣冷為斑疹也與傷寒表症相似此胎氣始發自內之外若與傷寒表症同治者誤也當作斑疹治之王好古曰小兒傷寒時氣風熱痰壅咳嗽及氣不和者四君子湯加細辛栝蔞桔梗薄荷生薑或加防風川芎內有寒或遇天寒欲發散者則去栝蔞虛汗夜啼加麥冬楊士瀛曰小兒頭額痛身體發熱大便黃赤腹中有熱四順散連翹飲三黃丸身體潮熱頭目昏痛心神煩躁小便赤大便秘此熱劇也調胃承氣湯頭額身體溫熱大便白而酸臭者胃中有食積也雙聖丸虞摶曰小兒傷風貪睡口中氣熱呵欠煩悶當發散大青膏表症也尋常風壅發熱鼻涕痰嗽煩渴惺惺散有風熱裡熱口中氣熱大小便秘赤飲水不止有下症者大黃丸大熱飲水不止而善食者可微下如清便自調不可下也恐外熱逐於內而變結胸危症張兼善曰小兒傷風兼臟者兼心則驚悸兼肺則悶亂喘息哽氣長出氣咳嗽兼腎則畏明各隨補母臟虛見故也如傷風手足冷脾臟怯也當先和脾益黃散而後發散大青膏未瘥調中丸有下症大黃丸後服溫驚丸傷風腹脹亦脾臟虛也當補肺必不喘後發散仍補脾也去脹塌氣丸發散大青膏傷風吐瀉白朮散夾驚傷寒熱極生風薄荷散龐安常曰小兒傷寒自汗當補虛和陰陽小建中湯減桂加黃耆人參地黃吳綬曰小兒傷寒六經治例皆同但有胎熱驚熱血熱客熱寒熱潮熱痰熱食熱變蒸熱傷風熱痘疹熱一皆發作狀似傷寒要在明辨之耳況肌體嫩弱血氣未定脈法不同藥劑輕小之別故略具節要於後凡小兒病詳察面色為先傷寒尤宜加意凡食熱傷乳則吐哯奶瓣不消口中醋氣傷食則心下滿硬噯氣作酸惡食右手氣口脈盛手心熱手背不熱肚背先熱以此別之凡治小兒傷寒發熱必以六君子湯為主或加神麯麥芽山楂砂仁香附之類內實者加枳實青皮熱不解者加柴胡黃連黃芩之類如無熱香砂保和丸凡變蒸發熱長氣血也夫變者氣上蒸者體熱也輕者發熱虛驚耳冷微汗唇中有白泡如珠子是也三日而愈重者寒熱脈亂腹痛啼叫不食凡乳食即吐哯五日愈也凡傷寒發熱則貪睡眼澀呵欠煩悶鼻塞噴嚏或流清涕口中氣熱咳嗽聲重或自汗怕風人參羌活散其餘治例宜同傷寒表症例也要在詳辨而治之耳凡傷寒則怕寒拘急發熱翕翕然在表晝夜不止直待汗出方解錢氏曰男子則面黃體重女子則面赤喘急憎寒口中氣熱呵欠煩悶項急也大抵傷寒則手背熱手心不熱左手人迎脈緊盛也其餘六經治法同大人傷寒但藥宜輕小耳亦有夾驚夾食傷寒要在詳審凡痘疹發熱錢氏曰腮赤多躁噴嚏眼澀呵欠煩悶時發驚悸身重發熱耳尖鼻尖手足稍冷乍涼乍熱睡中驚惕起臥不安乃其候也切不可認作傷寒發汗蓋覆取汗則大誤須仔細辨之鰲按小兒傷寒雖云六經治例與大人無異然畢竟有別小兒多一切雜症如前輩所云固當一一分辨施治即真屬傷寒而小兒必夾驚夾食之症為多故即用六經分治之劑其中必兼去驚消食之品方可奏功至小兒傷寒形症亦屬有定如頭痛體重鼻塞流涕喘息頰赤眼澀或眼赤黃口乾咳嗽噴嚏或口鼻出水山根青色身上寒毛起或畏人或惡寒兩手脈必洪數凡此等症皆屬傷寒之候必明辨之方不與一切之症相混而可以傷寒之治為治而即此等症亦不必悉具隨見數症便是如吳氏詳列諸症本與傷寒無涉今特錄之者所以別於傷寒欲醫者知一切諸症之各有形症便當各隨症治而可不混於傷寒也麻疹麻疹浮小而有頭粒非如發斑成片一色方其初起必先發熱都似傷寒而有分別鼻流清涕咳嗽嚏泄眼胞微腫淚汪盈睫或嘔或利紅及腮頰此麻疹候汗下不必按此諸症乃為肺疾亦屬天行傳染而得身熱之後其出最捷一擁而來六時漸沒其沒貴遲期兩三日熱清毒退乃為上吉亦有出遲三日始滅亦有沒早頃刻無跡皆由熱毒膚厚而合恐生他變至不可測及其既退調護宜密切須忌口風寒莫及疹後變生最易咳逆毒流肺竅氣喘吸吸或成癆瘵骨蒸羸怯毒淫脾腎漸至骨立或頻瀉利青黃夾雜毒流腸胃氣虛難接或口生瘡牙齦爛黑毒深入肝奄奄命絕此四大症疹後易涉慎勿輕視致令危急按症尋求治之以法麻疹原由症治錢乙曰麻疹形症亦同有如發風𤺋疙瘩擁起如雲頭色赤成斑隨見隨沒者有如粟米頭粇三番俱見而不沒至三日後方收漸沒者然皆謂麻疹其於欲出未出之際當用發表藥發之則易出易愈也有發熱至十餘日始見者大抵主在發散肺經之熱毒始事也調理補養病後之元氣終事也其或兼風兼痰兼食隨宜加對症藥萬全曰疹小而碎少陰心火也心肺位乎上心火旺則肺受之治疹專以肺為主觀咳嗽者火炎則肺葉焦舉也鼻流清涕者鼻為肺竅以火爍金而液自流也目中淚出者肺熱則移於肝肝之竅在目也或手掐眉目唇鼻及面者肺熱症也疹子只怕不能得出若出盡則毒便解故治疹者發熱時當察時令寒暄以藥發之如時大寒以桂枝葛根湯發之大熱以升麻葛根湯合人參白虎湯發之不寒不熱以荊防敗毒散發之如兼疫癘時行之氣則以人參敗毒散發之聞人槻曰麻疹初出全類傷寒發熱咳嗽鼻塞面腫涕唾稠黏全是肺經之症有末傳泄利者有一起即兼泄利者肺與大腸相表裡表裡俱病也惟不可觸冒風寒及於正蒸熱時啖食能變輕為重不可不慎朱震亨曰斑駁疹毒之病是肺胃熱毒熏發於皮膚狀如蚊蚤所咬也李梴曰疹者如粟米微紅隱隱皮膚不出作癢全無痛處麻子最小隱隱如麻子頂平軟不礙指即有清水痘多挾疹同出麻亦多挾疹同出故曰痘疹麻疹麻疹以升麻葛根湯加蔥白紫蘇乃麻疹初起之神方或蘇葛湯亦佳或以加味敗毒散表之汗後身涼紅痕自滅麻不出而喘者死變成黑斑者死麻疹後餘毒內攻循衣摸床譫語神昏者死史演山曰疹喜清涼痘喜溫暖人皆知之然疹子初出亦須和暖則易出所以發苗之初只要發出得盡則其毒便解大抵疹欲出已出之際雖寒勿用桂枝雖虛勿用參朮雖嘔而有痰勿用半夏南星王肯堂曰發熱六七日知是疹子卻不見出此皮膚堅厚腠理閉密又或為風寒襲之曾有吐利乃伏也急用托裡發表之劑麻黃湯調柏墨散發之外用胡荽酒麻蘸遍身刮之疹子發熱或自汗或鼻衄者不須止之亦發散之義疹子發熱吐利乃火邪內逼純是熱症不可作寒論上焦多吐黃芩湯加茅根蘆根枇杷葉下焦多利黃芩湯送香連丸中焦吐利俱多黃芩湯多加茅根蘆根調六一散滯下加味黃芩湯調六一散疹出之時咽喉腫痛乃毒火上熏勿作喉痹治甘桔湯加元參牛蒡連翹或射干鼠黏子湯疹色喜通紅若淡白者心血不足養血化斑湯色太紅或紫殷者血熱也或出太暴者並宜大青湯黑者死疹既出熱盛不減此毒壅遏大青湯解其表便澀者黃連解毒湯合白虎湯解其里大便不通四順清涼飲疹後熱不除忽發搐不可與急驚同論用導赤散加人參麥冬送安神丸大熱未退不可與食與傷寒同龔信曰當以蔥白湯飲之其麻自出如渴只宜蔥白湯以滋其渴使毛竅中常微潤可也過三日不沒者內有實熱犀角地黃湯解之翁仲仁曰麻疹與痘瘡始似終殊原同症異痘瘡發於五臟麻疹出於六腑然麻疹一症先動陽分而後歸於陰經故標屬陰而本屬陽其熱也氣與血分相搏故血多虛耗其治也先發散行氣而後滋陰補血凡動氣燥悍之藥皆不可下也鰲按翁氏此說已舉麻疹之原由症治包括詳盡名論也凡看麻疹之法多於耳後頂上腰眼先見其顆大而不長其形小而勻淨既出色紫紅乾燥暗晦乃火盛毒熾宜六一散解之四物湯換生地加柴芩翹葛牛蒡紅花等滋陰涼血而熱似除所謂養陰退陽之義也如疹出見風早沒不清爽者宜消毒飲加發散之藥雖不復出亦尋愈矣吐桂曰疹屬陽腑經邪初起必從表治症見頭痛喘咳氣粗嘔逆一二日即發者輕三五日者重陽病七日外隱伏不透邪反內攻喘不止必腹痛脹秘悶危矣治宜苦辛清熱涼膈去硝黃方書謂足陽明胃疹如雲布密或大顆如痘但無根盤又謂手太陰肺疹但有點粒無片片者用辛散解肌冬月無汗壯熱喘急用麻杏如華蓋散三拗湯夏月無汗用辛涼解肌葛根前胡薄荷防風香薷牛蒡枳殼桔梗木通之屬古人以表邪口渴即加葛根以其升胃津熱甚煩渴用石膏辛涼解肌無汗忌用連翹辛涼翹出眾草能升能清最利幼科治小兒六經諸熱疹宜通泄泄瀉為順下痢五色者亦無妨惟二便不利最多凶症治法大忌止瀉痧本六氣客邪風寒暑濕必從火化痧既外發世人皆云邪透孰謂出沒之際升必有降勝必有復常有痧外發身熱不除致咽啞齦腐喘急腹脹下痢不食煩躁昏沉竟以告斃者皆屬裡症不清致變須分三焦受邪孰多或兼別病累瘁須細體認上焦藥用辛涼中焦苦辛寒下焦鹹寒春令發痧從風溫夏季從暑風暑必兼濕秋令從熱爍燥氣冬月從風寒痧疳濕盛熱蒸口舌咽喉疳蝕若不速治有穿腮破頰咽閉喘促告斃矣治之宜早外治另用專方若湯藥方法必輕淡能解上病或清散亦可痧痢乃熱毒內陷與傷寒協熱邪盡則痢止同法忌升提忌補澀輕則分利宣通重則宜用苦寒解毒鰲按方書名麻疹者北人單謂之疹吳人謂之痧子浙人謂之喑子名各不同其實則一也痧疹雖由肺胃間毒畢竟是肺經所發之疾故方書言手太陰肺疹但有點粒無片片者今時所患皆是點粒分明者也至方書言足陽明胃疹如雲布密恐是斑毒故一片如雲密布且斑毒之發亦由陽明鬱熱毒蒸所致痧不發於胃而專發於肺也即使痧毒內陷或亦入胃入脾入肝入腎各有變症然此是痧發不透後其毒轉註之臟腑經絡非初發之經也方書謂胃疹者古人每斑疹二字連用其謂胃疹當即是斑其謂肺疹乃是痧子即麻疹也葉氏以痧宜通泄泄瀉為順云云夫痧固宜通泄然太泄痢又恐毒之下注者未盡而毒之外發者復因下泄而多阻滯以致毒陷益深瀉痢愈不止正氣遂日益虛此際正難措手然葉氏忌升提忌補澀二語又為痧痢金科玉律切不可犯則於此而斟酌求治惟以解毒為主兼散腸間鬱積而肺大腸表裡腸間之鬱積清肺經之毒自解卻不可犯胃氣以絕生氣瘧疾寒熱往來附夏傷於暑秋必痎瘧又云瘧病必由風著內經之言宜為細度夏月盛暑腠理開發汗出當風浴後磅礴衛氣不守邪氣內薄舍於膜原應時而劇暑日得風根因是托然而小兒多由食摶脾弱胃衰乳食停積諸邪悉附與正相角壅遏陰陽二氣交錯陰盛陽虛先寒而慄陽勝陰虛先熱如烙邪與衛並故日揮霍邪深入里故間日作瘧必有痰停滯胸膈瘧必有濕痠疼手腳癉牝溫寒鬼瘴名各為症不同而可約略冷起毫毛伸欠蕭索戰慄鼓頷頭痛如鑿及其熱時內外火鑠渴欲引飲身疼筋縛或先寒侵或先熱灼陰陽偏勝如酬如酢故以往來寒熱如約丹溪有言最為精確無汗發汗散邪為主有汗止汗固正宜速務期邪盡陰陽和協無奈世醫不知用藥小柴胡湯以為定法不知前賢再四叮囑早服柴胡淹纏難卻邪由外散正無內削用和陰陽才可下噱莫慢輕疏切宜斟酌久瘧不愈瘧母內托胸脅之間可按可摸治應消散毋俾正弱瘧疾原由症治曾氏曰內經瘧論云夏傷於暑秋必痎瘧謂腠理開而汗出遇風或得於澡浴水氣舍於皮膚間因衛氣不守邪氣並居其疾始作伸欠寒慄腰背俱痛骨節煩疼寒生則內外皆熱頭疼而渴乃陰陽二氣交爭虛實更作而然陰氣獨盛則陽虛故先寒戰慄腰背頭項骨節皆痛陽氣獨勝則陰虛故先熱發時不嗜食喜嘔頭疼腰痛小便不利陰盛陽虛則內外皆寒陰盛陰虛則內外皆熱此外感六淫或內傷七情蘊積痰飲病氣與衛氣並居故病日作衛氣晝行於陽夜行於陰得陽而外出得陰而內薄五臟病氣深入不能與衛氣俱出則間日而作當衛氣所至病氣所在則發在陽則熱在陰則寒俟陰陽各衰衛氣與病氣相離則病休陰陽相搏衛氣與病氣相集則復作各隨其衛氣之所在與所中邪氣相合而然也先寒後熱者先傷寒而後傷風名寒瘧先熱後寒者先傷風而後傷寒名溫瘧但熱不寒者名癉瘧身重寒熱骨節痛腹脹滿自汗善嘔名濕瘧但寒不熱者名牝瘧其病不一故治當隨其陰陽虛實汗吐下溫對症施治以平為期然必因正氣虛感受邪氣留而不去其病為實自表傳裡先汗後下古今不易故治瘧必須先表用百解散加薑蔥次小柴胡加桂枝薑棗以和解表裡之邪自然作效若表裡實用當歸散五和湯烏犀丸下之勻氣散止補後以藿香飲加草果良薑薑棗正胃氣去寒邪則自平復如表解後寒熱往來以二仙飲截之寒熱既除用平胃散鹽湯空心調服溫胃健脾則外邪自清此為明論有寒多熱少經久不愈致脾胃弱飲食少神色變二姜丸及清脾湯為治婁全善曰治小兒瘧疾多與大人同法以出汗為瘥宜桂枝柴胡參芩輩其病食病痰以意消息之小兒多由食積得之必兼消藥為先也葉桂曰瘧因暑發居多方書雖有痰食寒熱瘴癘之互異幼稚之瘧都因脾胃受病然氣怯神弱初病驚癇厥逆為多在夏秋之時斷不可認為驚癇大方瘧症須分十二經與咳症相等若幼醫庸俗但以小柴胡去參或香薷葛根之屬不知柴胡動肝陰葛根竭胃汁致變屢矣幼科純陽暑為熱氣症必熱多煩渴邪自肺受者桂枝白虎湯二進必愈其有冷食不運有足太陰脾病見症初用正氣或用辛溫如草果生薑半夏之屬方書謂草果治太陰獨勝之寒知母治陽明獨勝之熱瘧久色奪唇白汗多餒弱必用四獸飲陰虛內熱必用鱉甲首烏知母便漸溏者忌用久瘧營傷寒勝加桂姜擬初中末瘧門用藥於左如初病暑風濕熱瘧藥兼脘痞悶用桔梗枳殼杏仁厚朴二味喘最宜栝蔞皮山梔香豉頭痛宜辛涼輕劑連翹薄荷赤芍羚羊角蔓荊子滑石此方淡滲清上重則用石膏口渴用花粉煩渴用竹葉石膏湯熱甚則用芩連山梔夏季身痛屬濕羌防辛溫宜忌宜用木防己蠶沙暑熱邪傷初在氣分日久不解漸入血分反渴不多飲唇舌絳赤芩連膏如不應必用血藥涼佐清氣熱一味足矣輕則用丹皮汗多忌青蒿犀角竹葉心元參鮮生地細生地木通亦能發汗淡竹葉若熱久痞結瀉心湯選用又夏月熱久入血最多蓄血一症譫語昏狂看法以小便清長者大便必黑為是桃仁承氣湯為要藥幼稚瘧久面腫腹膨泄瀉不欲食或囊腫或跗腫必用東垣益氣以升陽倘脾陽消憊前方不應用理中湯或錢氏益黃散得效二三日須投五苓散一二日再與異功參苓白朮散之類必全好徐忠可注金匱有云幼兒未進穀食者患瘧久不止用冰糖濃湯余試果驗瘧多用烏梅以酸泄木安土之意用常山草果乃劫其太陰之藥以常山極走使二邪不相併之謂用人參生薑曰露姜飲一以固元一以散邪取通神明去穢惡之氣總之久瘧氣餒凡壯膽氣皆可止瘧未必真有瘧鬼又瘧邪既久深入血分或結瘧母鱉甲煎丸設用煎方活血通絡可矣寒熱往來巢元方曰風邪外客於皮膚而痰飲內漬於臟腑致令血氣不和陰陽更相乘克陽勝則熱陰勝則寒陰陽之氣為邪所乘邪正相干陰陽交爭時發時止則寒熱更相往來也吳綬曰凡寒熱往來是無定期者其有定期瘧也全生云若其人翕翕如熱淅淅如寒無有時度支節如解手足痠疼頭目昏暈此由營衛虛弱外為風邪相乘搏於陽則發熱搏於陰則發寒久不治成癆宜荊芥散又曰如苦寒熱如瘧不以時度腸滿膨脝起則頭暈大便不通或時腹痛胸膈痞悶此由宿谷停留不化結於腸間氣道不舒陰陽交亂宜備急丸若止見寒熱起居如常久而不愈乃大病後元氣未復悉屬陰虛生熱陽虛生寒宜八珍湯食積為病亦令寒熱保和丸消之兼嘔吐泄瀉六君子湯厥冷飲熱人參理中丸作渴不止七味白朮散食積消而寒熱尚作者肝邪乘脾也異功散加梔柴然此皆非瘧症也切不可混龐安常曰小兒食積寒熱如瘧渴瀉氣急要合地臥此候當先取下積只用平胃散次常服進食丸
