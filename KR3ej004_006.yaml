body:
  text: 卷六諸病應用方千金藿香湯藿香一兩生薑三兩青竹茹炙草各半兩每五六錢煎熱加升麻五錢此方治毒氣吐下腹脹逆害乳哺殊聖歸命丹丁香藿香各一分生犀牛黃各半錢豬鯽狗蝟熊膽各錢半丸梧子大一歲以下用苦楝湯化下二丸隨兒大小加減治小兒驚吐不止並吐黃水及乳食神效半夏散半夏一兩陳糯米三錢加薑五片棗一枚此方治小兒胃虛嘔吐水穀不化白附飲白附子南星生半夏生川烏生天麻陳皮南木香全蠍殭蠶丁香各二錢每粗末三錢加薑三片煎作五次空心溫服治肝風克脾土痰涎壅盛和飲食吐出張渙三香丹藿香葉丁香各一兩半夏五錢三味為末次入膩粉一分冰片麝香各一錢薑汁糊丸黍米大每十丸人參薄荷湯下量大小加減此方治挾驚嘔吐不止守中湯桔梗蒼朮各二兩泡薑四錢炙草六錢每末一錢空心湯服煎亦可治春夏相交陰濕氣重中傷脾胃致腹痛泄利久不止漸傳手足浮腫飲食少思香連丸薑炒黃連二兩煨木香五錢米飯丸每一二十丸米飲下四神丸肉豆蔻五味子各二兩補骨脂四兩吳萸一兩紅棗五六十枚生薑六兩水二鍾煮乾取棗肉丸每五六十丸白湯下治脾胃虛大便不實飲食不思或泄利腹痛龍骨散龍骨炒黃連各一兩當歸枳殼各五錢每粗末一錢煎隨大小加減此方治小兒暴利丁香散丁香厚朴黃連當歸白朮訶子肉伏龍肝各五錢木香一分赤石脂一兩每末五分米湯調下日三服隨大小加減治小兒赤白久痢胃虛不食漸羸寬腸丸枳殼五錢麻仁木通大黃半生半炒檳榔大腹皮各二錢半蜜丸每三十丸至五十丸枳殼甘草湯下一二歲蜜湯化下此方治痢后里急大便反閉澀不通養臟湯人參炙草各二錢半白芍白朮各五錢木香肉桂各一錢肉豆蔻訶子肉罌粟殼各錢半每㕮咀二錢加薑二棗一煎空心溫服此主生津益氣溫腸止痢雙金飲大罌粟殼一兩蜜水炒大川芎五錢醋炒每末一錢至二錢米湯下治赤白痢日夜頻數及久泄瀉萬金散生罌殼一兩甘草二兩半生半炙陳皮二兩烏梅一兩每二錢煎二三沸服此方治水瀉下痢久不瘥者神效散粟殼白芷烏梅各一兩乳香川芎各五錢每二錢煎治赤白痢日夜頻數食減腹痛小便不利升陽益胃湯黃耆二錢半夏人參黃連白朮炙草各一錢獨活防風白芍羌活各五分陳皮茯苓柴胡澤瀉各三分薑棗各二黃連散炒黃連牡蠣煅各五錢烏梅肉炙甘草訶子肉各一分每末一二錢煎治小兒痢渴煩熱吃水不知足紫霜丸代赭石醋煅杏仁霜乳香硃砂木香各一錢黃連一分輕粉五分麝香少許巴霜十粒肉豆蔻二個煨糊丸每七丸至十四丸米湯下治久積胸高羸瘦赤白痢腹痛甚桔梗丸桔梗神麯各一兩麥芽烏梅肉厚朴人參白朮赤石脂黃芩炙甘草桂心龍骨各五錢黃連一兩黃雌雞骨一具去肉淨酒浸炙蜜丸每十五丸此方治小兒久痢羸瘦食不消止渴聖效散白芷半生半炒葛根各二兩京墨二兩半生半煅黃丹二兩半生半炒每細末五分倒流水調下治小兒因吐利氣虛津液減耗生疳煩渴飲水不休面腫腳浮腹大頸細尿白不吃食七氣湯半夏五兩人參辣桂各一兩甘草五錢每末三錢加薑五棗一煎治七氣所傷痰涎結聚心腹亦痛不能飲食蓬莪朮散蓬朮當歸各一兩木香人參桂心各五錢黑牽牛一分糊丸黍米大每十丸淡薑湯下隨兒大小加減使君子丸使君子肉檳榔榴根皮大黃半生半炒各七錢半糊丸麻仁大每服三四十丸治腹內諸蟲作痛口吐清水二聖丸檳榔一兩巴霜十五粒糊丸每七十七丸五更茶下投藥見蟲下盡即進稀粥此方治腹內諸蟲並消穀逐水下氣去風芍藥甘草湯白芍一兩甘草二錢半此方治出疹肚腹痛滿小便不通塌氣丸胡椒一兩蠍尾五錢去毒糊丸粟米大每五七丸至一二十丸米飲下一方有木香一錢錢氏及潔古所用塌氣丸乃此二味切不可誤用有牽牛者慎之五疳保童丸生五倍子夜明砂青黛苦楝根皮蘆薈熊膽黃連生龍膽草乾蟾皮去骨炙麝香蕪荑仁蟬蛻等分米糊丸麻子大一歲二十丸米湯下二三服此方治五種疳疾中滿分消丸黃連枳實厚朴各五錢乾薑薑黃豬苓砂仁澤瀉茯苓各三錢陳皮白朮各一分半夏四分黃芩一兩二錢甘草一分蒸餅丸黍米大每三十丸丹腹脹方葛根蘇梗萊蔔子陳皮各二錢甘草一錢食減加白朮升陽滋血湯蠍梢二分神麯三分厚朴當歸各一錢桃仁十粒升麻三分治嬰兒腹脹不大便羸弱南星腹皮湯南星一兩大腹皮薑皮陳皮扁豆子青皮桑皮甘草各五錢主腫疾欲愈未愈之間脾胃虛慢氣促痰喘腹脹胸滿神困面色痿黃小水不利香陸胃苓丸丁香商陸赤小豆陳皮炙草各二兩製蒼朮澤瀉各二兩半赤苓豬苓去皮白朮各兩半肉桂一兩厚朴二兩糊丸每三十丸至七十丸溫湯下治腫疾久不愈大能實脾導水多服取愈浚川丸大戟芫花醋炒沉香檀香木香檳榔莪朮大腹皮桑皮各五錢黑白牽牛生末各一兩巴霜十五粒糊丸麻子大每十七丸濃蔥湯五更初空心下去水未盡停一日減用十三丸次減作九丸再至七丸症退即止仍投南星腹皮散如單腹脹甚能飲食氣壯者加甘遂末同丸忌甘草以相反也治水腫單腹脹氣促氣減遍身面浮營衛飲子當歸熟地人參茯苓川芎白朮炙草白芍枳殼炙黃耆陳皮治氣血俱虛營衛不順頭面手足浮腫喘急分氣飲子五味子桔梗茯苓炙草陳皮桑皮草果大腹皮白朮枳殼當歸全紫蘇半夏曲蘇子生薑宜兼服八味理中丸以上宜救生丹通利大效神功救生丹雄黃硃砂各一分巴霜二十一粒乾薑二錢醋一盞煮巴薑干去薑將巴出油和雄朱研勻雪糕丸麻子大一歲二丸酒浸赤芍少許送下治氣虛喘急四肢腫腹脹急沖滿脅肋乍熱乍寒或瀉或祕由久停虛積營衛不順也宜推去其惡毒之氣耆歸湯蜜炙黃耆一兩酒當歸白芍川芎各五錢炙草三錢每㕮咀二錢煎治兒稟賦弱痘瘡出不快及肝虛目視不明莊氏蘆薈丸蘆薈研一錢龍膽草炒研一兩皂角三錢以水二升挼汁去渣熬膏入二末和丸每三丸至五丸薄荷湯下此方治小兒風疳順肝氣進飲食硃砂安神丸硃砂四匙黃連生地各五錢生甘草二錢半蘭香葉二錢燒灰銅青輕粉各五分共為末干敷上治心疳怔忡心中痞悶四味肥兒丸黃連炒蕪荑神麯麥芽等分水糊丸每一二十丸開水下治嘔吐不食腹脹成疳作瀉或食積脾疳目翳口瘡斷爛發熱瘦怯小便澄白腹大筋青補肺散阿膠一兩半茯苓馬兜鈴糯米各五錢杏仁二十一粒炙草四錢每末二錢煎此方治久嗽肺虛氣促有痰噁心調元散山藥五錢人參茯苓茯神白朮白芍熟地當歸黃耆各二錢半川芎炙草各三錢石膏六錢每粗末二錢入薑二棗一煎主元虛囟開羸瘦腹大並語遲行遲齒遲萬應丸五倍子胡黃連青皮陳皮黃柏神麯麥芽三稜蓬朮蕪荑龍膽草檳榔川楝子肉使君子等分糊丸麻仁大每三五七十丸米湯下治諸疳症胃熱發作穗痿黃飲食不進聖惠乾蟾丸乾蟾一枚蛇蛻一錢穀精草二兩胡黃連瓜蒂母丁香牛黃冰片硃砂雄黃天竺黃蘆薈麝香各一分青黛五錢糊丸一二歲以米泔化下五丸服後桃柳枝湯浴兒著青衣疳蟲當出衣上及眉鬢邊如細麩或如塵毒黑者不治黃白色易治仍宜米飲下二丸日三服甚者半月內瘥此方治五疳及驚風出蟲定死生聖惠金蟾散乾蟾一枚夜明砂桃白皮樗白皮地榆黃柏訶子肉蕪荑百合人參大黃黃連各三分胡粉三錢丁香三粒檳榔一分每五分飲下日三服治積疳蟲蟲蝕脊膂煩渴下利拍背如鼓鳴紫金散蛇床子炒黑黃丹地龍炒黑各五錢青礬一分煅每一字揩牙齦日三次此方治小兒走馬疳秋霜散好砒半兩白礬四分水一盞煮砒干入礬同煅為末入麝坯子各少許研勻每一字用鵝毛點拭牙齦上日三四次此方治小兒崩砂錢氏金華散黃柏黃連各半兩黃丹一兩水飛輕粉一錢麝香一字先研勻水洗貼之此方治小兒一切濕瘡癬疳化𧈟丸蕪荑蘆薈青黛川芎白芷梢胡黃連黃連蝦蟆灰等分豬膽汁浸糕糊丸麻子大每一二十丸食後臨臥杏仁湯下其鼻常用熊膽煎湯筆蘸洗俟煎藥進數服卻用青黛當歸赤小豆瓜蒂地榆黃連蘆薈雄黃為末入鼻斂瘡治諸疳生蟲不能啼哭嘔吐清水肚腹脹痛唇口紫黑腸頭濕𧈟集聖丸蘆薈五靈脂夜明砂砂仁橘紅木香莪朮使君子肉各二錢川芎黃連乾蟾各三線當歸青皮各一錢半雄豬膽汁和麵糊丸隨大小米飲下虛去莪朮青皮加人參二錢白朮三錢熱去莪朮砂仁加龍膽三錢吐瀉下痢去莪朮青皮加白朮二錢肉果訶子各一錢積痛去芎歸加三稜小茴川楝肉各二錢瘧加鱉甲三錢渴去莪朮砂仁加參朮各二錢蟲去芎歸加蕪荑錢半川楝肉二錢此方不熱不寒補不滯消不耗萬穩萬當柴胡散柴胡葛根知母貝母茯苓茯神炙草等分每末一錢加小麥煎此方治小兒疳熱四肢如柴不能起止大黃丸大黃地黃茯苓當歸柴胡杏仁各三分蜜丸麻子大飲下五丸日三治小兒胃氣不調不嗜食不長肌肉保和丸神麯山楂半夏茯苓各一兩萊蔔子陳皮連翹各五錢粥丸湯下三十丸主飲食停滯胸膈痞滿噯氣吞酸吐瀉腹痛甘遂破結散甘遂二錢半煨黃青皮黃芩煨大黃各五錢每末一錢煎隨大小加減得通利則止以冷粥補之進食丸巴霜一錢二分當歸硃砂代赭石枳殼木香各五錢麝少許糊丸麻子大一歲一丸飲下更量虛實加減治食積發熱羸瘦肚大筋青疳積腹疼白餅子滑石輕粉半夏南星各一錢巴霜二十四粒糯米飯丸麻子大捏作餅三歲以上三五餅四歲以下一二餅臨臥蔥白湯下治小兒腹中有癖不食但飲乳是也六聖丸莪朮黃連陳皮炮薑各五錢木香二錢半每末一錢同巴霜三粒研醋糊丸麻子大每十五丸至三十五丸五更薑湯下利三五行勻氣止補治諸積和胃大能止氣厚腸消疳快膈水晶丹南星半夏各三錢滑石四錢輕粉五十帖蕪荑二百片巴霜十五粒糊丸麻子大每十五丸三十五丸五更蔥白汁下過三五行勻氣散調補下風痰薑湯下治驚食蟲積腹脹煩啼面黃食減此非可輕用之劑沉香檳榔丸沉香檳榔檀香木香三稜丁香神麯莪朮麥芽厚朴使君肉蒼朮青皮砂仁益智仁香附枳殼良薑各五錢炙草一兩半蜜丸芡子大每一丸湯化或二丸亦可治諸積癖腹脹作疼諸疳蟲積良方妨香丸硃砂一兩牛黃冰片麝香各二錢半金箔十四片粉霜膩粉各一錢黃蠟二兩巴霜一百二十粒治小兒虛中積潮發寒熱心腹脹滿疼痛取癖丸甘遂炒芫花炒牽牛半生半炒辣桂莪朮青皮木香桃仁五靈脂各二錢巴霜一錢糊丸麻子大每一二丸蜜湯下利後冷粥補仍和胃此乃峻劑非實積危甚不可用積滯木香丸木香莪朮砂仁青皮硃砂代赭石各二錢丁香巴霜各一錢糊丸麻子大每二三丸乳傷乳汁下食傷米飲下治吐乳瀉乳氣酸臭肚硬熱渴吐瀉為食積腹痛利黃為氣積及瘧癖錢氏白朮散人參白朮木香茯苓炒甘草藿香葉各一兩葛根二兩粗末一二錢煎此方助脾和胃調中益氣良聖藥也梔子柏皮湯梔子八枚黃柏一兩炙草五錢每㕮咀二錢煎此方治傷寒身黃髮熱化癖丸巴霜半兩膩粉硃砂各一錢黃鷹糞二兩半雄雀糞硇砂各一字糯米飯丸黍米大一歲兒二丸空心皂莢子湯服取下惡物為度治乳癖結塊久不消化諸藥罔效大茵陳湯茵陳一兩大黃三錢半梔子三枚大者煎分三服日三當利下惡汁黃從小便出治陽明瘀熱在裡發黃小便祕腹微滿加減瀉黃散黃連茵陳各五分黃柏黃芩山梔茯苓各三分澤瀉二分食後一服減半待五日再服而良愈此方主退脾土復腎水降火心阿膠散