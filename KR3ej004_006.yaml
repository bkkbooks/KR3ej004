芩煨大黃等分煉蜜丸每三十丸湯下量大小加減治三焦積熱眼目赤腫頭頂腫痛心膈煩躁口瘡二便祕澀五臟實熱或下鮮血或瘡癤大柴胡湯柴胡四兩黃芩白芍各兩半大黃半夏各七錢半枳實七錢甘草一兩每粗末二錢加薑二片煎此方解利風熱痰嗽腹脹及里症末解橘皮一兩半炙草竹茹各五錢人參二錢半每㕮咀五錢加薑煎加味清涼飲當歸赤芍炙草大黃各三分牛蒡子山梔各四分治熱毒積毒在內大便不通而欲痛作渴或患瘡瘍丹毒固脾和中散人參茯苓白朮葛根炙草扁豆藿香等分每末三錢加薑棗煎此方和胃止吐瀉定煩渴治腹痛黃連香薷飲黃連香薷厚朴治中暑熱盛口渴心煩或下鮮血黃耆六一湯黃耆六兩甘草一兩每末五錢煎溫服亦可用湯調下三錢此方治諸虛不足盜汗消渴茯苓半夏湯半夏二錢陳皮茯苓黃芩各一錢甘草五分加薑煎此方專治熱痰壅盛為患四苓散豬苓茯苓白朮澤瀉每末三錢煎服治風寒濕邪不解煩渴欲飲者快膈湯人參青皮砂仁烏藥良薑炙甘草香附各一兩每末一錢加少鹽酒煎主胸膈不快飲食少能順氣和中消導宿滯萬靈丸木香黃連莪朮各一錢橘皮青皮各二錢檳榔一錢半一枚用巴豆一粒醋煮杏仁二枚燈火上煅研爛和醋糊丸小緑豆大每五七丸薄荷湯下此方主小兒諸積依形症用之東垣鼠黏子湯鼠黏子二錢酒歸身炙草柴胡黃芩連翹黃耆各一錢地骨皮二錢半每㕮咀三錢煎服後慢與乳食治傷寒斑出身表熱急小柴胡加梔子湯柴胡黃芩人參半夏甘草山梔加薑棗熱甚去半夏此方主解利風熱連翹飲連翹防風山梔甘草等分水煎治一切熱傷寒熱在外而不厥少陽藥也解毒丸寒水石研石膏研各一兩青黛五錢蒸餅丸芡子大食後新汲水下或細嚼薑湯下亦可三歲兒半丸隨大小加減參附湯人參炮附子等分治陽氣虛寒咬牙寒戰手足並冷或吐瀉不食桔梗枳殼湯枳殼桔梗各二兩甘草五錢每三錢加薑三片煎治腹脹便祕煩躁作渴或譫妄不安五癇丸白附子五錢烏蛇肉全蠍半夏南星各二兩蜈蚣半條殭蠶一兩半硃砂雄黃各錢半麝香三分皂角二兩打碎用水半碗浸透揉汁入白礬二兩同煎乾為度薑汁糊丸小緑豆大每二三十丸白湯下隨大小加減此方總治一切癇症家韭子丸韭子鹿茸蓯蓉牛膝熟地菟絲子歸身巴戟杜仲石斛桂心乾薑酒糊丸治膀胱虛寒不能收攝以致遺溺淋瀝人參理中丸人參白朮乾薑甘草此方專治中焦病或吐下多而腹痛滿五黃散黃連黃芩黃柏梔子黃大黃每末一錢煎此治內外俱大熱之症然太寒非其症勿用加味清胃湯升麻當歸黃連丹皮生地以上清胃湯加茯苓陳皮此方治胃熱生痰咳逆羸瘦藿香飲藿香白朮各一兩炙草茯苓生黃耆各五錢加薑棗每五錢煎幼兒三錢或二錢隨時酌用清涼飲柴胡知母生地赤苓防風梢甘草梢當歸黃柏龍膽草治熱盛小便赤澀或膀胱熱結寧神膏人參半兩茯神二兩葛根甘草五味子知母花粉各三錢另將生地浸一夜搗爛絞取汁一碗熬膏入藥末至可丸每二三十丸棗湯下天麻膏生地二兩羌活一兩半當歸一兩二錢牛膝元參杜仲獨活各七錢半天麻一兩熬膏丸藥每三五十丸湯下或各㕮咀每三五錢煎服亦可白朮防風湯防風四錢白朮黃耆各二錢每粗末二錢煎主傷寒太陽經症汗多不止桃奴丸桃奴七個另研玳瑁一兩鎊細末安息香一兩去渣上三味同熬成膏入犀角末硃砂各五錢琥珀雄黃各三錢麝香冰片牛黃各二錢炒桃仁十四個安息膏丸芡子大陰乾固藏靜室每半丸或一丸參湯下大能辟惡去穢七味白朮散人參白朮茯苓炙甘草藿香木香葛根各一錢治中氣虛弱津液短少口渴或因吐瀉所致調中湯茯苓當歸白芍陳皮各一錢白朮一錢半又小名調中湯治一切浮腫但用此方無不愈者調中湯良薑酒洗當歸炒白芍肉桂川芎炮附子各一兩人參炙甘草各五錢每㕮咀三錢煎治腸胃虛怯冷氣乘之腹脅刺痛洞泄不止熱鬱湯連翹薄荷黃芩栝蔞實麥冬甘草鬱金竹葉此方治外感風熱之症當歸連翹湯歸尾連翹白芷各三錢煨大黃甘草各一錢每㕮咀二錢食前煎服治小兒心脾有熱致生重舌緑袍散薄荷淨葉荊芥穗各五錢青黛元明粉硼砂各二錢半百藥煎甘草各三線細研每一字至五分乾點舌上令自化或新水入蜜調點舌上黃金散黃柏蜜塗曬十數次甘草各一兩用末乾點患處或用麥冬湯調點主解口內舌上瘡毒及痘後目生翳膜清胃散升麻五分生地四分黃連丹皮各三分歸尾四分兒母俱服治胃經有熱口舌諸病牙齒及齦腫痛流氣飲蟬蛻甘草羌活天麻當歸防風大黃薄荷赤芍杏仁等分每五錢此方治小兒風毒患眼柴胡復生湯藁本蔓荊子川芎白芷羌活獨活各二分半白芍炙草薄荷桔梗各四分蒼朮茯苓黃芩各五分柴胡六分五味子十二粒每二錢煎治羞明淚多腦頂沉重睛珠痛連太陽本事方防風白蒺藜各一兩羌活一兩半甘菊三兩每末二錢入鹽少許百沸湯點服治太陽寒水滔翳膜遮睛沖和養胃湯柴胡七錢人參當歸炙草乾薑升麻葛根白朮羌活各一兩防風五錢黃耆一兩半茯苓三錢白芍六錢五味子二錢每二錢煎服治內障初起視覺微昏空中有黑花神水變淡緑色次則視岐神水變淡白色久則不見神水變純白色滋陰腎氣丸熟地三兩歸尾丹皮五味山藥柴胡各五錢茯苓澤瀉各二錢半酒炒生地四兩蜜丸硃砂為衣每十丸滾湯下治神水寬大漸散目昏空中黑花及內障山茱萸丸山萸二兩熟地丹皮牛膝茯苓澤瀉各一兩鹿茸五錢蜜丸每二十丸此方治眼白多由於虛也湯氏牛黃丸牛黃白附子肉桂全蠍川芎石膏各一錢白芷硃砂各二錢藿香五錢麝香一分蜜丸芡子大三歲兒以下每一丸薄荷湯下鬥睛即名通睛治小兒觸打撲跌著頭額肝受驚風成鬥睛立效散硼砂冰片雄黃朴硝等分為細末干滲治嬰兒咽喉痹痛不能吞咽吹喉散生甘草二錢半朴硝一兩研細末吹喉中治嬰兒咽喉腫痛氣塞不通牛蒡湯牛蒡子三兩大黃兩半防風薄荷各一兩荊芥四兩甘草一兩一錢半每二錢主喉痛傷風發熱煩躁鼻塞氣喘痰嗽驚啼化毒湯桔梗五錢薄荷荊芥穗甘草各二錢半山豆根錢半牙硝硼砂朴硝雄黃硃砂各二錢每一字至五分乾點舌上化下或湯調少與含咽亦可治風熱上攻咽喉腫痛飲食不便牛蒡子湯牛蒡子炒元參升麻桔梗炒犀角黃芩木通甘草等分每二錢煎桔梗甘草連翹山梔薄荷黃芩各五分每末一錢煎治熱腫喉痹消風散茯苓川芎荊芥穗羌活防風藿香殭蠶蟬殼炙草厚朴陳皮等分每末五分茶清調下加雄黃名雄風散治胎熱胎寒及諸風上攻頭目昏痛項背拘急肢疼鼻塞皮膚頑麻癮疹小兒虛風張渙辛荑膏辛荑葉一錢焙乾細辛木通白芷木香各半兩杏仁二錢研用羊髓豬油各二兩同藥慢火熬成膏令黃色放冷入冰麝各一錢拌勻每用少許點鼻中張渙清肺膏瓜蒂半兩附子一枚赤小豆細辛甘草各一錢冰片九分蜜丸綿裹塞鼻此方治小兒齆鼻不聞香臭聖惠菊花散甘菊白朮細辛茯苓炙甘草防風人參各一兩每末一錢煎治小兒腦戶傷風冷鼻多涕精神昏悶聖惠木通散木通麥冬升麻各半兩知母炙甘草犀角杏仁各錢半梔子三枚治小兒腦熱無涕口乾心躁眠臥不安犀角升麻湯犀角三錢升麻牙硝黃連各錢半硃砂牛黃冰片各一分每末五分湯下治腦熱肺壅鼻乾病千金方煉雄黃日納一大棗枚許於鼻中十日後瘜肉自出更不重發治小兒鼻生瘜肉楊氏地黃散生地赤芍歸身川芎等分每二三錢煎春夏入蒲黃汁秋冬入車前子汁治榮中有熱肺壅鼻衄通鳴散菖蒲遠志各一兩柴胡麥冬防風各五錢細辛甜葶藶各二錢半磁石四錢杏仁十四粒每末五分蔥白湯調下此方治小兒兩耳聾鳴細辛散細辛防風大黃黃芩各一兩蠟川椒各五錢細銼以清麻油三合熬藥紫色濾去渣入蠟候化為膏每以大豆許點耳中日三次治小兒耳聾或因腦熱或因水入或因吹著菖烏散菖蒲炒烏頭各四分為末綿裹納耳中日二次治小兒耳自鳴日夜不止菖附散炮附子菖蒲等分為末綿裹塞耳治小兒耳疼痛紅藍花散紅藍花黃柏各一兩烏魚骨黃芩各半兩雄黃四錢麝香五分綿搵藥塞耳日再治聤耳久不瘥加味歸脾湯人參黃耆茯神各二錢甘草五分木香四分白朮遠志棗仁當歸龍眼肉丹皮山梔各一錢本方去丹皮山梔即歸脾湯此方治脾虛弱損健忘驚悸等症半夏丸生半夏二兩赤苓枳殼各一兩風化朴硝二錢半薑汁糯米粉丸每三四十丸治痰症若驚搐後風涎潮作服之神效白附丸南星二兩半夏白附子白礬各一兩薑汁糊丸一歲兒七丸薄荷湯下通治咳嗽有痰感冒發熱吐瀉心神不安神效牛蒡子散牛蒡子山梔甘草川硝鬱金各半兩枳殼二錢半研細入冰片五分研勻每五分薄荷湯下量兒大小加減治小兒心脾熱壅多涎談氏金珠丸南星白礬半夏各七錢人參山藥各五錢硃砂膩粉各二錢金箔十片即為衣薄荷汁同水打糊丸緑豆大每一丸薑湯下量加減治小兒驚悸怔忡化痰涎利胸膈煩熱止嗽張渙金朱丹硃砂半夏膽星各一兩茯苓半兩石膏六錢金箔二十片薑汁和黍米大每十丸參湯下治小兒多涎乳食不下涎不流出者乃名脾熱多涎小朱砂丸硃砂一兩膽星人參茯苓珍珠半夏各半兩冰片麝香各少許蒸餅丸黍米大每四五丸金銀湯下治小兒眠睡多驚能化風壅痰涎安神黃連解毒湯黃連黃芩防風荊芥穗知母石膏酒黃柏山梔大青元參生甘草桔梗木通如暄熱之時以此辛寒之藥解之麻黃湯麻黃升麻牛蒡子蟬蛻甘草各一錢煩渴加石膏末四錢柳葉散柳即西河柳青茂時採葉曬乾為末每一二錢茅根湯調下加味黃芩湯黃連黃芩各一錢半白芍三錢甘草七分滑石三錢若調服只用一錢血痢加地榆二錢黃芩湯黃芩黃連赤芍生地枳殼當歸梢木通甘草人參初加酒大黃養血化斑湯歸身生地紅花蟬衣人參各五分加薑一片大青湯大青元參石膏生地地骨皮知母木通荊芥穗甘草等分加淡竹葉十二片安神丸黃連龍膽草當歸石菖蒲茯神各一錢半全蠍七個蒸餅杵豬心血丸硃砂為衣燈草湯下亦名黃連安神丸
