body:
  text: 卷一總論運合陰陽胚胎在腹五行相參乃成孕育逐月成形男女攸屬九竅既分肢體隨蓄臟區以五腑部以六內生筋骨外弸肌肉至於經脈無不聯屬至於毛髮無不攢簇氣通於母呼吸盈縮母息是同如璞孕玉母熱熱侵母寒寒促母怒脈興母驚陰觸母思氣拘母憂神局凡此諸因皆能停毒而毒之停更甚淫欲毒停先天後天斯酷古人胎教所由諄勖十月涵濡胎元具足一旦臨盆蒂脫瓜熟此後哺乳更須周篤易虛易實疢病惟速疾痛莫知疴癢誰告如啞不言如謎難卜保赤維艱常憂手束遍考方書廣搜秘錄識取其精論採其卓爰輯斯編釋謎標牘既分門類更詳款目欲幼幼者當為三複察色錢乙曰兒醫號為啞科脈來駛疾難憑故以察色為要形色若不相應然後聽聲切脈如面上症左腮為肝右腮為肺額上為心鼻為脾頦為腎赤者熱也黃者積也白者寒也青黑者痛也隨症治之又如目內症赤者心熱導赤散淡紅者心虛熱生犀散青者肝熱瀉青丸淺淡者補之黃者脾熱瀉黃散無精光者腎虛地黃丸若見面目浮腫主久咳嗽乃脾受疳積也又如唇上症白主吐涎嘔逆吐白便血紅主渴飲煩躁若久咳瀉唇紅者是虛症也勿用涼藥黃主脾受積後發腫紫色及吐涎主蟲痛不吐涎是積痛唇口四畔黃如橘主口臭乃脾之積熱也青主血虛脾寒為冷所乘蓋唇主脾土木來剋土知脾弱不能食也又如舌上症凡小兒舌乾舌白舌燥舌苔舌黃舌赤腫皆主大便不通或通利必赤色焦黃如舌裂舌上芒刺舌上出血皆熱極陽毒也舌上生瘡心脾有熱舌卷主驚久患瀉利舌黑而潤不可認為熱蓋久病上焦虛熱故也久瀉利舌黑者必死李仲南曰面上青色為驚積不散欲發風候紅赤色為熱為痰積壅盛驚悸煩躁增進黃色亦為熱為食積症傷欲作疳候或作痞癖若神思昏沉其候潮熱氣粗困倦或嘔噦或瀉痢白色為寒為肺氣不利大腸滑泄欲作吐利黑色為痛所傳不煩症變即為逆候榮衛失序為疾危惡虞摶面上形症歌曰痢疾眉頭皺驚風面頰紅渴來唇帶赤毒熱眼朦朧山根若見脈痕青此病明知兩度驚赤黑困疲時吐瀉色紅啼夜不曾停青脈生於左太陽須驚一度見推詳赤是傷寒微燥熱黑青知是乳多傷右邊青脈不須多有則頻驚待奈何紅赤為風抽眼目黑青三日見閻羅李梴曰小兒諸病但見兩眼無精光黑睛無運轉目睫無芒鋒如魚貓眼狀或兩眼閉而黑睛朦朧者死或外若昏困而神藏於內不脫者生黑珠滿輪睛明者少病眼白多睛珠或黃或小者稟弱多病聽聲危亦林曰睡中驚啼聲浮者易治聲沉不響者難痊或聲如鴉中彈者不治李梴曰聲輕者氣也弱也重濁者痛也風也高喊者熱欲狂也聲急者神驚也聲塞者痰也聲戰者寒也聲噎者氣不順也喘者氣促也噴嚏者傷風也驚哭身沉不響者重也聲濁沉靜者疳積也如生來不大啼哭聲啾唧者必夭也火之大發忽狂驚叫乃火盛氣虛必死夜半發者多有口瘡宜看之直聲往來而無淚者痛也連聲不絕而多淚者驚也㘂煎聲煩躁者難愈躁促聲音者感寒也李仲南曰小兒有疾既見於色必應於聲其聲不一必細審之有重實聲者歌曰重實聲雄體熱為三焦氣壅在心脾傷風咳嗽咽喉痛結澀腸中糞出遲有悲焦聲者歌曰聲悲焦有燥恐怖欲生風重濁聲沉靜疳攻必耳聾有啼哭聲者歌曰但哭無啼只有驚多啼不哭痛分明聲輕顫嘎風癇病速緩聲頻吐瀉成有㘂煎聲者歌曰㘂煎煩躁病難安躁促聲音為感寒語短氣微尿主澀長遲聲細痢多般有遲緩聲者歌曰促短聲遲緩腸鳴泄瀉頻嘎聲多不響風熱肺虛因脈法錢乙曰候兒脈當以大指按三部一息六七至為平和八九至為發熱五至為內寒訣曰小兒脈緊風癇候沉緩食傷多嘔吐弦急因知氣不和急促急驚神不守冷則沉細風則浮牢實大便應秘久腹痛之候緊而弦脈亂不治安可救變蒸之時脈必亂不治自然無過謬單細疳癆洪有蟲大小不勻為惡候脈沉而遲有潮熱此必胃寒來內寇瀉痢脈大不可醫仔細酌量宜審究王肯堂曰張云岐云未及五歲不能視聽者不可別脈五歲以上方可以脈別浮沉遲數按前錢氏論則不拘五歲上下也水鏡訣又云三歲以內看虎口三關若三歲以下更用一指按高骨乃分三關定其息數呼吸八至為平脈九至不安十至危困四歲以下用一指袞轉尋三部以關為準七八歲移指少許九歲次第依三關部取十一二歲後依大方脈部位診視按此又與前二說不同醫者臨時參酌用之可耳脈應雜病王肯堂曰諸脈數為熱屬腑諸遲脈為冷屬臟陽數脈主吐逆不吐必發熱陰微脈主泄瀉不瀉必盜汗沉數脈寒熱寒多熱少亦主骨蒸熱緊數脈寒熱熱多寒少又主骨蒸急則驚癇沉緊脈心腹痛短數同亦主咳嗽沉細脈乳食不化亦主腹痛下痢沉伏脈為積聚亦主霍亂微緩脈乳不化泄瀉沉緩亦同微澀脈瘛瘲筋攣微急脈寒熱唾血浮滑脈宿食不消亦主咳嗽浮緊脈疳氣耳聾浮洪脈頭疼身熱緊滑脈吐血噁心心脈急數驚癇否則疳淋肝脈急癲癇風癇痰涎流液肺脈浮實鼻塞並大小便不通關脈緊滑主蛔蟲尺脈沉同尺脈微細溏泄冷利乳食不化尺脈微澀便血否必盜汗脈入魚際主遺尿看虎口三關法滑伯仁曰小兒三歲以內看男左女右虎口三節日三關紋色紫熱紅傷寒青驚風白疳病黃色淡紅乃平常小恙其筋紋宜藏不宜暴露若黑色則為危險再脈紋見下截風關為輕中截氣關為重上截命關為尤重直透三關為大危鰲按從前言看三關法雖大同小異總不如滑氏之直截明簡王肯堂曰全幼心鑑十三種脈紋云流珠只一點紅色環珠差大長珠圓長以上非謂圈子總皆紅脈貫氣如此來蛇即是長珠散出一頭大一頭尖去蛇亦如此分上下向故曰來去角弓長張向里為順向外為逆槍形直上魚骨分開水字即三脈並形針形即過一二粒米許射甲命脈向外透指命脈向里雖然余嘗治之亦有不專執其形脈而投劑者蓋但有是症即投是藥而亦多驗流珠形主飲食所傷內熱欲吐或腸鳴自利煩躁啼哭用助胃膏環珠形主脾虛停食胸膈脹滿煩渴發熱五味異功散加山楂枳實長珠形主脾傷飲食腹痛寒熱不食大安丸異功散來蛇形主脾胃濕熱中脘不利乾嘔不食此疳邪內作四味肥兒丸去蛇形主脾虛食積吐瀉煩渴氣短喘急不食困極七味白朮散弓反里形主感寒驚悸哽氣出氣四肢梢冷倦怠小便赤咳嗽吐涎惺惺散弓反外形主痰熱心神恍惚夾驚夾食風癇痰盛天麻防風丸槍形主風熱生痰驚抱龍丸魚骨形主驚痰發熱抱龍丸抑青丸水字形主驚風食積胸膈煩躁頓悶少食或夜啼痰盛口噤搐搦大安丸針形主心肝熱極生風驚悸頓悶困倦痰盛搐搦抱龍丸射指形主驚風痰食聚膈牛黃清心丸射甲形主驚風及一切木剋土之敗症六君子湯加木香鉤藤鉤官桂未應即加附子小兒指形圖十五幅初生諸病嬰兒墮地一聲啞啞形體雖具猶是血茄肌膚脆嫩骨肉么麼如水中泡如樹上葩八風之賊六淫之邪豈能速害從外而加由在母腹感受淫汙或傷冷熱或被驚譁烹炰燔炙酒醴紛奢亂氣狡僨陰血周遮釀災蘊毒貽害嬰芽降生之後調護多瘥䙀袍恐嚇乳哺擎叉致令疾作一一堪嗟胎黃撮口驚癇搐拏臍風鎖肚逼肖飢鴉凡茲種種難與搔爬坐視其斃誰之咎耶昔黃帝言憫彼咿啞吾不能察幼小如麻善為調理別是一家誠哉斯語千古堪嘉敢告醫士存心勿遐胎驚胎癇胎風胎黃錢乙曰百日內發搐真者不過兩三次必死假者頻發不為重真者內生驚癇假者外傷風冷蓋血氣未實不能勝任乃發搐也欲知假者口中氣出熱治之可發散大青膏主之王汝言曰小兒未滿月驚搐似中風欲死者用辰砂以新汲水濃磨汁塗五心最效曾氏曰胎癇者因未產前腹中被驚或母食酸鹹過多或為七情所汨致傷胎氣兒生百日內有者是也發時心不寧面微黃氣逆痰作目上視身反張啼聲不出先用參蘇飲次用琥珀抱龍丸輕者可愈重者難全李梴曰胎驚癇風者乃孕婦嗜欲忿怒驚撲或傷風邪兒初生下即嘔吐搐掣口眼喎斜聲啼氣短腮縮囟開或頰赤或面青噤口咬牙眼合涎潮筋骨拘攣身腰強直臍腹腫起與噤口撮口同症視其眉間氣色紅赤者生青黑者死辰砂膏最妙王肯堂曰胎驚者初生月內壯熱吐哯心神不寧手足抽掣身體強直眼目反張是胎驚皆由妊婦調攝乖常飲酒嗜欲忿怒驚撲母有所觸胎必感之或外挾風邪有傷於胎故子乘母氣生下即病也其候月內壯熱眼翻握拳噤口咬牙強直涎潮嘔吐搐掣驚啼腮縮囟開或頰赤或面青但胎驚眼合不可誤作慢脾妄用溫藥其有搭眼噤口之類亦此一種之所發也虎口指紋曲入里者可治反出外者不治先宜解散風邪利驚化痰開氣及貼囟法甚則以朱銀丸利之若面青拳搐保命丹鉤藤散全蠍散之類大抵芽兒臟腑脆弱不可輒用鉛粉鎮墜之劑如遇此候急用豬乳細磨牛黃麝香各少許調抹入口中仍服導赤散以瀉肝之子即愈矣胎風者小兒初生其身有如湯潑火傷者此皆乳母過食膏粱所致其母宜服清胃散及逍遙散以清氣血兒亦時飲數滴有身無皮膚而不焮赤者由產母脾氣不足也粳米粉敷之焮赤發熱者產母胃火熾也石膏敷之經謂脾主肌肉肺主皮毛故知病脾肺也未滿月而撮口握拳腰軟如隨者此肝腎之中邪勝正弱也三日內必不治如男指向里女指向外尚可治宜全蠍散鉤藤散眉紅者不可治胎黃者小兒生下遍身面目皆黃狀如金色壯熱大便不通小便如梔汁乳食不思啼哭不止此胎黃之候皆因母受濕熱而傳於胎也凡有此症母子皆宜服地黃湯地黃飲子有生下百日及半周不因病後身微黃者胃熱也若自生而身黃者胎疸也經云諸疸皆熱色深黃者是也犀角散若淡黃兼白者胃怯也白朮散胎寒胎熱虞摶曰何謂胎寒芽兒百日內覺口冷腹痛身起寒粟時發戰慄曲足握拳日夜啼哭不已或口噤不開名曰胎寒其症在胎時母因腹痛而致亦有產婦喜啖甘肥生冷或胎前外感風寒暑濕治以涼藥內傷胎氣則生後昏昏多睡間或哯乳瀉白不早治必成慢驚慢脾風宜沖和飲合當歸散加煨姜微泄次用勻氣散調補次參苓白朮散養胃白芍藥湯去寒濕何謂胎熱兒在胎中母多驚恐或食熱毒物生後旬日間兒多虛痰氣急喘滿眼閉目赤目胞浮腫神困呵欠吸吸作聲遍身壯熱小便赤大便秘時驚煩由胎中受熱或誤服溫劑致令熱蓄於內熏蒸胎氣故有此症不早治則鵝口重舌木舌赤紫丹瘤自此而生母宜先服木通散亦與兒服次以四聖散溫洗兒兩目目開進地黃膏天竺黃散當歸散牛蒡湯亦同母服凡有胎疾當先令母服藥使藥過乳漸次解之百無一失如以涼藥攻之必生他病乳母尤必忌口撮口孫思邈曰小兒初出腹筋骨未斂肌肉未成血凝乃堅成肌肉耳其血沮敗不成肌肉則使面目繞鼻口左右悉黃而啼閉口聚口撮面口中乾燥四肢不能伸縮者皆是血脈不斂此多不育宜龍膽湯李仲南曰外症舌強唇青聚口撮面面目黃赤氣息喘急啼聲不出飲乳有妨若口出白沫而四肢冷者不可救療其或肚脹筋青吊腸卵疝內氣引痛皆腸胃鬱結不通致之治法貴疏利宜辰砂膏初生七日後此症可免鵝口一名噤口風又名雪口巢元方曰兒初生口裡白屑滿舌上如鵝之口故名由在胎時受穀氣盛心脾熱氣熏發於口治法用發纏指頭蘸井花水揩拭之睡時黃丹煅出火氣摻舌上如用此法不效敷保命散李梴曰噤口風者眼閉啼聲漸少舌上聚肉如粟米狀吮乳不得口吐血沫二便皆通此胎中熱毒流於心脾也此症亦初生七八日內患之鰲按鵝口瘡用硼砂細研敷之立效王肯堂曰茅先生論兒喉中壅一塊肉瘤閉卻為喉痹身大熱舌硬不轉為木舌口閉滿口黃如膏名鵝口三症皆熱甚生風風壅熱毒至此為實熱先用三解牛黃散微與通利次用天竺黃散共牛黃膏與服如喉響似鋸及眼直視面青黑不乳食者死臍風臍濕腫臍瘡臍突孫思邈曰臍風者斷臍之後被水濕風冷所乘風濕之氣入於臍而流入心脾遂令肚腹脹滿臍腫身體重著四肢柔直日夜多啼不能食乳甚則發為驚搐若臍邊青黑撮口不開是為內搐不治爪甲黑者即死朱震亨曰初生七日內見噤口撮口臍風三症者危百日內見此症手足蜷者亦不治曾氏曰如稟賦充實發熱有痰驚搐投黑白飲溫蜜湯空心調下微泄似茶褐色二三行進白芍藥湯加薑棗常用此法亦妙臍突一症又非臍風此亦因初生洗浴系臍不緊穢水浸入於內產後旬日外臍忽光浮如吹捻動微響間或驚悸作啼治用白芍藥湯加苡仁次以外消散塗貼自然平夏陳無擇曰小兒初生一七日內忽患臍風撮口百無一效坐視其死良可憫也有一法世罕知者凡患此症看兒齒齦上有小泡子如粟米以溫水蘸熟帛裹連劄指輕輕擦破即開口便安不藥神效李梴曰斷臍後為風濕所乘或尿濕䙀裙遂成臍風面赤喘急啼聲不出其症臍腫凸腹脹滿日夜多啼不能乳甚則發搐撮口噤口宜調氣益黃散甚者金烏散或宣風散亦有熱在胸堂伸引努氣亦令臍腫發風千金龍膽湯錢乙曰臍濕腫者斷臍後為水濕所傷或入風冷致令四肢不和臍腫多啼不能乳哺宜柏墨散五通膏滑伯仁曰嬰兒臍中腫濕經久不瘥若至百日即死宜速治之用枯礬龍骨為末入麝少許拭臍乾摻之須避風巢元方曰臍瘡者水入臍中或受尿濕腫爛成瘡或解脫為風所襲入於經絡則成風癇若臍腫不幹久則發搐宜金黃散王漢東曰斷臍作瘡枯礬龍骨煅當歸末皆可摻或油調敷之李仲南曰臍突者芽兒有熱在胸堂則頻頻伸引呃呃作聲努脹其氣抑入根本之中所以臍突腫赤虛大可畏無識之人將謂斷臍不利而使然者非也此由胎中母多驚悸或恣食熱毒之物所致宜對症與藥其熱自散其臍歸本不必敷藥恐反為害驚風小兒之病最重惟驚驚必發搐驚必竄睛驚必牙緊驚必面青驚必魚口驚必弓形心經熱積肝部風生肝風心火二臟交爭血亂氣壅痰涎與並百脈凝滯關竅不靈或急或慢隨其所攖急由陽盛慢屬陰凝急緣實病慢自虛成急驚之症暴疾難名種種惡候一一併呈迨其發定了了神清揆厥所原調護失情晝抱當風夜臥厚衾多食辛辣偶觸鼓鉦跌撲嚷叫人物雷霆凡諸驚恐動魄亂經一旦疾作詎比尋恆慢驚之症睡臥靡寧乍發乍靜神思昏瞑大抵久病逐漸熱增吐瀉瘧痢消耗匪輕脾虛胃弱陽常不升虛邪火旺肝木來乘淹延困頓遂致命傾有慢脾風症更堪憎慢驚之後虛極難勝病全歸脾故慢脾稱脾家痰飲凝聚胸膺脾家虛熱來往相仍脾困氣乏肢冷目瞪頻嘔腥臭微搐焦聲無風可逐無驚可平十不救一魂魄歸冥又有天吊狀若祟憑頭目仰視身熱不停爪青肢瘲是真病情邪熱毒氣壅遏心精頗難調治醫藥速營諸驚疾發診視察聽表裡虛實尤貴詳明驚風之屬癇痙易醒更多兼症一一細評毋輕心掉毋躐等行方治無誤醫始稱能驚搐由臟腑錢乙曰因潮熱發搐在寅卯辰時者此脾用事之時也身體壯熱目上視手足動搖口內生熱涎項頸強急此肝旺也當補腎治肝補腎地黃丸治肝瀉青丸因潮熱發搐在巳午未時者此心用事之時也心惕目上視白睛赤色牙關緊急口內涎生手足動搖此心旺也當補肝治心補肝地黃丸治心導赤散涼驚丸因潮熱發搐在申酉戌時者此肺用事之時也不甚搐而喘目微斜視身熱如火睡露睛手足冷大便淡黃水此肺旺也當補脾治肝治心補脾益黃散治肝瀉青丸治心導赤散因潮熱發搐在亥子丑時者此腎用事之時也不甚搐而臥不穩身體溫目睛緊斜視喉中有痰大便銀褐色乳食不消多睡不省此腎旺也當補脾治心補脾益黃散治心導赤散涼驚丸驚搐癇痙不同婁全善曰驚搐一也而有晨夕之分表裡之異身熱力大者為急驚身冷力小者為慢驚仆地作聲醒時吐沫者為癇頭目仰視者為天吊角弓反張者為痙各不同也傷風傷食發搐錢乙曰傷風搐者因傷風得之口中熱氣出呵欠頓悶手足動搖當發散大青膏小兒生來怯弱者多此病也傷食搐者因傷食後得之身溫多唾多睡或吐不思乳食而發搐當先定搐如羌活防風煎湯下瀉青丸搐退白餅子下之後服安神丸驚風先見之症危亦林曰驚者虛惕怔忡氣怯神散痰涎來去其瀉必青積漸而生風也楊士瀛曰驚邪入心則面紅臉赤惕惕夜啼入肝則面目俱青眼睛竄視入腎則面黑惡叫咬乳咬牙入肺則面淡白喘息氣乏入脾則面淡黃嘔吐不食凡乳兒欲發驚風者先神志不定恍惚懼人扎眼上視左顧右盼伸手握拳悶郁努氣情態不如尋常皆驚風先症也錢乙曰咬牙甚者發驚目直視面色青身反折者生驚呵欠面青者驚風呵欠面黃者脾虛驚目赤兼青者發搐肝臟實熱手尋衣領亂捻物目直視者必發驚肝有風目連札不搐有熱則目直視亦不搐得心熱者則搐肝主風風動而上行頭目目屬肝風入於目上下左右如風吹不定兒不任故目連札也若熱入於目牽其筋脈兩眥皆系不能轉動故目直視也若得心熱則搐其子母俱有實熱風火相搏故也虞摶曰王氏云木能勝土熱動心忡而生驚也驚搐有聲無聲錢乙曰驚癇發搐男發搐目左視無聲右視有聲女發搐目右視無聲左視有聲相勝故也男反右視女反左視亦皆有聲李杲曰男為木故左視木位無聲右視金位相擊則有聲女為金故右視金位無聲左視木位相擊亦有聲急驚風錢乙曰急驚本因熱生於心身熱面赤引飲口中熱氣出二便黃赤劇則發搐蓋熱盛則生風屬肝此陰盛陽虛也利驚丸主之以除熱痰不可用巴豆及溫藥大下之恐搐虛熱不消也小兒熱痰客於心胃因聞大聲非常則動而驚搐矣若熱極雖不聞聲及驚亦自發搐張元素曰急驚者陽症也俱腑受病熱痰客於心肺是少陽相火旺經云熱則生風因聞人聲而作若謂東方震卦得火氣而發搐火本不動焰得風而動當用利驚丸導赤散瀉青丸搐止宜服安神丸危亦林曰驚風形症不明若言陰症則渾身又溫若作陽症則又不大搐乃陰陽不和宜用防風溫膽湯下大驚丸小驚丸楊士瀛曰急驚先當定搐搐由風也風由熱也搐已定方可下熱退驚熱若不退驚亦不散急驚截風定搐為要風搐既定次與下熱熱去則無風風散則不搐朱震亨曰老醫常言小兒驚搐多是熱症若先便用驚風藥若白附子全蠍殭蠶川烏之類便成壞症後有醫幼科者只用導赤散加地黃防風進三服導去心經邪熱其搐便止次服寧神膏神效曾氏曰急驚之論前代書所不載惟曰陽癇大概失所愛護或抱於當風或近於熱地晝則食多辛辣夜則衾蓋太厚鬱蒸邪熱積於心傳於肝再受人物驚觸或跌撲叫呼雷聲鼓樂雞鳴犬吠一切所驚未發之時夜臥不穩睡中或哭或笑咬牙咬乳鼻額有汗氣喘痰喘忽爾悶絕目直上視牙關緊急口噤不開手足搐掣此熱甚而然況兼面紅脈數可辨蓋心有熱而肝有風二臟乃陽中之陽心火也肝風也風火陽物也風主乎動火得風則煙焰起此五行之造化二陽相鼓風火相搏肝藏魂心藏神熱則神魂易動故發驚也心主乎神獨不受觸遇有驚則發熱熱極生風故能成搐名曰急驚治之之法先發表次通心氣疏滌肝經安魂退熱驚風既除與之去痰免成癡疾但不可用大寒涼藥李仲南曰大要急驚用藥有次第有輕重開關以後且與截風定搐風搐既定卻下痰熱理為至當若患在痰熱未有驚風只可退熱化痰不可妄投驚風藥蓋藥中多用寒涼恐引痰熱入經絡凡病在熱不可妄治痰止當解表病在驚不可妄治風蓋驚由痰熱只可退熱化痰而驚自止病在痰不可便治驚急須退熱化痰病在風不可便治搐蓋風由驚作只可利驚化痰其風自散若驚亦有搐須用截風散至妙之道若治驚而痰不化熱亦不退驚安得自止化其痰熱若不退風亦不散痰安得去是知不治之治所以治之也急驚初傳風搐得定而痰熱一泄又須急與和胃定心之劑若搐定而痰熱無多則但用輕藥消痰除熱可也然急驚雖當下切不可過用寒涼致成慢驚且如只下痰熱不必太驟但斟酌處只用大黃一味足矣且急驚症原在於去肝風降心火幼幼書以為至要之說也薛己曰急驚之候牙關緊急壯熱涎湧竄視反張搐搦顫動口中氣熱頰赤唇紅脈浮洪數者此肝經血虛火動生風蓋風生則陰血愈散陰火愈熾火動則肺金愈虧肝木愈旺宜滋肝血養脾氣王肯堂曰急驚由內挾實熱外感風邪心家受熱積驚肝家生風發搐肝風心火二臟交爭風氣壅盛無可發泄故暴烈也又有搐搦反張斜視而牙關不緊口無痰涎而氣熱未可直指為驚風恐是傷風傷寒夾食夾驚疹痘等症此即錢氏假搐之說又各依本症施治又急驚搐搦不可把捉但扶持之否則風痰逆入經絡遂使手足拘攣或成廢疾小兒急慢驚風古謂陰陽癇急者屬陽陽盛而陰虧慢者屬陰陰盛而陽虧陽動而躁疾陰靜而遲緩皆因臟腑虛而得之虛能發熱熱則生風是以風生於肝痰生於脾驚出於心熱發於肝而心亦熱以驚風痰熱合為四症搐搦掣顫反引竄視為八候凡眨眼搖頭張口出舌唇紅瞼赤面眼唇青及瀉皆青髮際印堂青筋三關虎口紋紅紫或青者皆驚風候也大抵肝風心火二者交爭必挾心熱而後發始於搐故熱必論虛實症先分順逆治則有後先蓋實熱為急驚虛熱為慢驚慢驚當無熱其發熱者虛也急驚屬陽用藥以寒慢驚屬陰用藥以溫然又必明淺深輕重進退疾徐之機故曰熱必論虛實男搐左視左女搐右視右男眼上竄女眼下竄男握拇指出外女握拇指入里男引手挽左直右曲女引手挽右直左曲凡此皆順反之則逆亦有先搐左而後雙搐者但搐則無聲搐逆則有聲其指紋彎弓入里者順反外者逆出入相半者難痊故曰症必分順逆陽病陰脈陰病陽脈亦為反熱甚生痰痰甚生驚驚甚生風風甚發搐治搐先於截風治風先於利驚治驚先於豁痰治痰先於解熱其若四症俱有又當兼施並理一或有遺必生他症故曰治有先後綱領如此若分三者言之暴烈者為急驚沉重者為慢驚至重者肝風木之克脾土為慢脾風丹溪云忽驚用降火下痰丸養血藥作湯下之慢驚當補脾兼用硃砂安神丸清米湯下更於血藥中求之如四物四君東垣黃耆益黃散之類世以一藥通治甚妄薛氏於急慢驚癇之外又出驚風一症其候虛惕怔忡氣怯神散痰涎來去泄瀉色青蓋驚之輕而虛者也若驚入心則面赤夜啼用梔子清肝湯加黃連若入肝則面青眼竄用柴胡清肝湯若入脾則面黃嘔吐虛汗嗜臥用六君子湯加柴胡山梔若入肺則面白喘急用異功散加柴胡桔梗若入腎則面黑齧乳咬牙用六味地黃丸葉桂曰小兒倉猝驟然驚搐古曰陽癇從熱症治古人用涼膈散為主方按急驚屬陽熱病用涼膈以清膈間無形之熱膈上邪熱逼近膻中絡閉則危殆矣此宣通乃一定之法然必詢病因察時候治之幼科以痰熱風驚四治猶可說也吾鄉有專科立方鉤藤連翹木通薄荷前胡枳殼桔梗加入表散消食多不效驗驚為七情內應乎肝肝病發驚駭木強火熾其病動不能靜且火內寄肝膽火病來必迅速後世龍薈芩連必加冰麝硝黃取其苦寒直降鹹苦走下辛香通里竅之閉也如牛黃丸至寶丹紫雪皆可選用凡熱邪塞竅神迷昏憒者仿此鉤藤丹皮之屬僅泄少陽膽熱與急驚暴熱內閉之症無益若火熱劫爍血液苦寒鹹寒不中與也宜犀角地黃湯之屬方書有鎮墜金石之藥有攻風劫痰之藥雖非常用要不可不考驚與厥皆逆亂之象仲景云蛔厥都從驚恐得之凡吐蛔腹痛嘔惡明是肝木犯胃幼醫亂治束手告斃余宗仲景法每效慢驚風錢乙曰慢驚因大病後或吐瀉或只吐不瀉變成脾胃虛損遍身冷口鼻氣出亦冷手足時瘛瘲昏睡露睛此無陽也宜栝蔞湯主之張元素曰慢驚者陰症也俱臟受病曾氏曰治慢驚者考之古書亦無所據惟載陰癇而已蓋慢驚屬陰陰主靜而搐緩故曰慢其候皆因外感風寒內作吐瀉或得於大病之後或傳誤轉之候目慢神昏手足偏動口角流涎身微溫眼上視或斜轉或兩手握拳而搐或兼兩足動掣各辨男左女右搐者為順反此為逆口氣冷緩或囟門陷此虛熱也脈沉無力睡則揚睛謂兩目半開半合此真陽衰耗而陰邪獨盛陰盛生寒寒為水化水生肝木木為風化木克脾土胃為脾之腑故胃中有風瘛瘲漸生其瘛瘲狀兩肩微聳兩手垂下時復動搖不已者名曰慢驚宜以青州白丸子蘇合丸入薑汁杵勻米飲調下虛極者加金液丹虞摶曰慢驚者因吐瀉日久中氣大虛而得蓋脾虛則生風風盛則筋急宜用溫白丸鰲按脾虛則生風者非風自脾生以脾虛則肝木必強乃風生於肝也故風盛則筋急以肝主筋故耳觀溫白丸中殭蠶全蠍白附天麻等皆治肝藥可見李梴曰陰症慢驚自陽症急驚傳來才經吐瀉便是慢驚男子以瀉得之為重女子以吐得之為重慢驚因吐瀉得者宜醒脾散加味朮附湯虛風痰多者宜八仙散慢驚純陰症宜烏蠍散或陽症尚在宜蟬蠍散若有急驚方傳慢候而尚有陽症八候尚在不必回陽但與截風調胃用蟬蠍散醒脾散若手足冰冷方可回陽用硫黃附子瀉滑青者宜防慢驚蓋瀉青色乃夾驚木剋土也李杲曰小兒慢驚或吐利不止變成虛風搐搦者非風也胃氣欲絕也用來復丹五粒研碎米飲調下即效史演山曰慢驚之候蓋由急驚過用寒涼或轉太驟傳變成之又有吐利不止而成者有氣虛暴吐瀉而成者有夏月脾胃伏熱大吐瀉當解暑熱不可專曰固陽有臟虛洞瀉成者有得之久嗽作癇者有得之發癇不已者有得之蟲積衝心者惟吐瀉積痢成虛致之則症變甚速凡才經吐瀉便是慢驚須用溫中扶里或搐來緊急乃慢驚初傳尚有陽症不可誤作急驚世言搐慢為慢驚非也若泥此往往指慢脾為慢驚矣凡慢驚男子以瀉得之為重女子以吐得之為重又吐有五症瀉有五症各明所因主治古云病家怕驚不怕瀉醫家怕瀉不怕驚如因泄瀉不止且先治瀉若更治風則驚風愈甚如因他症則當循原施治也其慢驚候若從急驚傳來只可截風調胃均平陰陽不可全用陽藥使陽歸陽復作急驚之症張渙曰急驚以關竅不通略用冰麝開通定其搐搦尚可慢驚陰重陽虧諸經已虛不宜開通又涼其臟易作慢脾風致不易療聞人槻曰慢驚危急如眼睛昏定定而砭雖砭不左右顧或竄視四肢厥冷汗出如流口面黲暗指甲黑四體垂至重慢驚症眼半開半合似睡不睡是也其脈或浮或沉身或熱或涼或吐或瀉或不吐不瀉或食乳或阻乳名半陰半陽合病即如傷寒半表半裡也葉桂曰慢驚古稱陰癇其治法急培脾胃理中湯為主方有痰嘔吐用南星白附子六君子湯聲音不出開竅加竹瀝薑汁菖蒲根鬱金之屬是病皆他病致變其因非一有過飢禁食氣傷有峻藥強灌傷胃有暴吐暴瀉脾胃兩敗其症面青㿠白身無熱雖熱不甚短氣骨軟昏倦如寐皆溫補治之惟嘔逆不受乳食溫補反佐姜連連理湯錢氏益黃散錢氏異功散慢脾風楊士瀛曰慢脾風由慢驚後吐瀉損脾病傳已極總歸虛處惟脾所受故曰脾風風無可逐驚無可療但脾間痰涎凝滯虛熱往來其眼合者乃脾困氣乏神迷也若見眼合便是脾風慢驚眼在半開半合之間乃知陰氣所盛傳入臟間陽氣已虧脾經屬陰次第入脾故言慢脾風候也慢驚其眼半開半合則當預作慢脾風調理慢脾風之候面青額汗舌短頭低眼合不開睡中搖頭吐舌頻嘔腥臭噤口咬牙手足微搐而不收或身冷或身溫而四肢冷其脈沉微陰氣極盛胃氣極虛十救一二蓋由慢驚風傳變宜黑附湯救之又生附四君子湯蠍附散皆可慢脾風用藥乃不得已也其危如燈無油漸見昏減錢氏用金液丹與青州白丸子各半研勻米飲薄荷湯下一錢或錢半此截風陽也張云岐曰小兒頭雖熱眼珠青白而足冷頭雖熱或腹脹而足冷頭雖熱或泄瀉而足冷頭雖熱或嘔吐而足冷頭雖熱或渴而足冷以上五症作搐者名曰慢脾風速與補脾益真湯加全蠍一枚或全蠍觀音散譚殊聖曰慢脾風又名虛風小兒或吐或瀉後面色虛黃因虛發熱才見搖頭斜視昏困額汗身亦黏汗聲沉小而焦即是脾風之症不必定因急慢驚傳次而至慢脾惟吐與瀉積與痢傳入其症變至速虛更速也治必循次平和無令速愈之理調脾養胃不可過劑也鰲按湯氏法凡因吐瀉成虛風慢脾者先用奪命散青州白丸子末煎如稀糊入蜜調控下涎後服醒脾散天吊內吊附內李梴曰小兒瘛瘲不定翻眼戴睛狀若神祟頭目仰視手足抽掣如魚之上釣故曰天釣甚者爪甲亦青此由乳母過食熱毒心肺生熱加以外感風邪所致宜用九龍控涎散鉤藤散熱勝則保命丹痰盛則抱龍丸又有驚風內釣之症腹痛多啼面青唇黑傴僂反張外腎腫尿如米泔眼有紅筋血點乃寒氣壅結也宜鉤藤膏閻孝忠曰天吊亦驚風症也但天吊發時頭目必仰視驚風則無此症狀張渙曰小兒心膈壅滯邪熱痰涎蘊積不得宣通或乳母飲酒食肉煩毒之氣流入乳中令兒宿滯不消邪熱毒氣乘於心神致使驚悸眼目翻騰壯熱不休瘛瘲病名天釣甚者爪甲皆青狀如神祟宜一字散牛黃散薛己曰內釣者腹痛多喘唇墨囊腫傴僂反張眼尾赤此胎中受風及外驚所致若內臟抽掣作痛狂叫或泄瀉縮腳內症一作外症亦然極難調理內症服聚寶丹外症服鉤藤飲進乳食者可治若因乳母厚味宜加味清胃湯若因乳母鬱怒積熱加味逍遙散加漏蘆急慢驚諸惡候曾氏曰急驚天吊之後有變作潮熱似瘧者手足逆冷蓋因病愈時不善將護風邪乘虛而入經絡所致此症所用藥品可間使苦寒之味務在消陽盛之火肺金得勝肝木自平而風邪亦散斯為良法閻孝忠曰驚風或泄瀉等症有煩渴者皆津液內耗也不問陰陽宜錢氏白朮散使滿意取足飲之愈多愈好薛己曰諸驚有目睛瞤動者蓋目者肝之竅肝膽屬風木二經兼為相火肝藏血血不足則風火內生故目瞤動宜用四物湯益其血柴胡山梔清其肝陰血內榮則虛風自息矣有唇口蠕動者唇為脾之華口乃脾之竅又陽明之脈環唇口而交人中是以脾胃虛者多有此症不獨病後而已夫脾主涎脾虛不能收攝多兼流涎或誤認為痰而祛逐之則津液益枯不能滋養筋脈遂致四肢抽搐病勢愈甚原其治法與慢脾風相同當大補脾胃加升柴切勿用青皮龍膽之類有忽然驚搐目直者皆肝之風熱也若肝虛生風則目連札而不搐及多欠咬牙若肝經風實則目直大叫呵欠項急頓悶若肝經有熱則目直視不搐得心熱則搐氣熱則外生氣溫則內生其症手尋衣領及亂捻物宜瀉青丸壯熱喘悶宜瀉白散有睡中驚動者由心腎不足也蓋心主血與神肝藏血與魂肺主氣與魄腎主精與恐小兒臟腑脆弱易於驚恐恐則氣下驚則心無所依神無所歸且人之神氣寤則行於目寐則棲於腎今心腎既虛則不能寧攝精神故睡中驚動治宜清心安神用茯苓補心湯加茯神棗仁五味亦有驚嚇而作者因擊動其肝故魂不安也治宜鎮驚定魄用安神鎮驚丸有驚後目微動咬牙者皆病後亡津液不能榮其筋脈也亦有肝經虛熱而生風者當審其氣血有餘不足而治之有驚泄者肝屬木盛則必傳克於脾脾土既衰則乳食不化水道不調故泄瀉色青或兼發搐者蓋青乃肝之色搐乃肝之症也亦有因乳母脾虛受驚及怒動肝火而致者法當平肝補脾若用峻攻之藥脾氣益虛肝邪彌甚甚至抽搐反張者亦肝火熾盛中州虧損之變症也凡見驚症即宜用四君六君異功等方加白附子定風柴胡平肝引經以杜漸則必不至瀉搐而自安矣今已見瀉吐驚搐尚不知補脾平肝以保命丹抱龍丸鎮驚丸等治之其亦去生遠矣驚風諸變症驚癱鶴膝搖頭曾氏曰肝屬木其動則應風病則主驚駭諸熱引肝風風生痰痰作搐小兒驚風之際手足動掣當聽其自定然後療之免生異症或父母見病勢可畏從而按伏之豈知筋者肝之合也臨發病時若按束其手足則筋不舒伸遂至經絡為風所閉致成驚癱鶴膝變為廢人凡小兒心悸不常及遍身腫痛或手足不隨此為驚癱候也若治之稍遲至臂腕膝脛骨節之間流結頑核或膝大而脛肉消脛骨露如鶴膝之狀或為癰為癤此名鶴膝候也並宜發汗為先使腠理開通則風熱可除有濕亦去用百解散和五苓散料倍加麻黃加薑蔥煎服微汗為度次用防己湯獨活湯加桑寄生或黑虎丹作少丸子間服使風不生而痰不作則易愈若為癰為癤疼重者用黑牽牛半生半炒研煎無灰酒調下五苓散以除流注之寒濕則腫毒自消如入腑閉而不通是風熱內蘊其右腮紅緊及右手三部脈浮而滑實宜五和湯或當歸散其加減尤在臨機若泥一方非良醫也前症更宜間服排風湯薛己曰鶴膝風者其腿漸細其膝愈粗狀如鶴之膝是以名之此因腎經不足外邪乘之初則膝內作痛外色不變伸屈艱難若一二月間焮腫色赤而作膿者可治腫硬色白而不作膿者難治初起以大防風湯為主而佐以益氣養榮湯乃為正治婁全善曰肝風搖頭者乃肝血液盛外有風熱乘之故相引動搖而不定也王肯堂曰猶憶少時聞友人孫彭山云嘗見一小兒患驚搐延醫治之諸症悉退獨頭搖不止後一老醫於常服藥中加入紫河車草即時愈按此草神農本經名早休唐本名金線重樓錢氏方名白甘遂主治驚癇搖頭弄舌乃本經正文古人謂遵白文療病多效不虛也諸驚不治症龔信曰眼睛翻轉口中出血兩足擺跳肚腹搐動摸體尋衣神昏氣促噴藥不下通關不嚏心中熱忽大叫者皆急驚不治之症也四肢厥冷吐瀉咳嗽面黯神慘胃痛鴉聲兩脅動氣口生白瘡髮直搖頭眼睛不轉涎鳴喘噎項軟二便不禁手足一邊牽引皆慢驚不治之症也羅謙甫曰患慢驚者若似搐而不甚搐似睡而精神散漫四肢與口中氣皆冷睡中露睛或胃痛而啼哭如鴉聲此症已危蓋脾胃虛損故也楊士瀛曰慢驚欲絕之候虛痰上攻咽喉引氣呼吸粗大脈來浮數是謂陰盛強陽錯認以為陽氣已復與藥下痰痰隨藥下氣隨痰絕殊不知覆燈將絕之時雖不下藥亦無生意矣慢脾風身冷黏汗直臥如屍喘嗽頭軟背直口噤頭搖二便不禁唇縮氣粗痰如牽鋸之聲者不治慢脾風若一臟絕即不可下藥如眼無光指甲黑四肢垂軃五體俱冷並不須下藥滑伯仁曰諸驚搐而不休休而再搐驚叫發搐汗出足冷痰滿胸喉口開目直者皆不治
