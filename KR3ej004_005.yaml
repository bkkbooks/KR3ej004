body:
  text: 卷五諸病應用方導赤散生地木通甘草等分加竹葉一方不用甘草用黃芩此方瀉內小腸火錢氏生犀散犀角二錢地骨皮赤芍柴胡根葛根各一兩炙草五錢每末一錢煎服此方治心經虛熱四聖散燈心黃連秦皮木賊棗子各半兩每㕮咀二錢煎服治嬰孩胎受熱毒或生下兩目不開地黃膏鬱金皂莢水煮乾切焙豆粉各五錢炙草一分馬牙硝一錢生地汁蜜對煎成膏和丸水含化嬰兒磨濃汁以鵝翎掃入口內張渙保命散白礬硃砂各二錢半馬牙硝五錢研極細每服一字水調塗舌上先拭淨兒舌治嬰兒胎毒致生鵝口龍膽湯龍膽草鉤藤柴胡黃芩桔梗赤芍茯苓炙草各五錢蜣螂二個去翅足炙大黃一分紙裹煨為細末食前調服或加防風麥冬以去心熱亦可治胎驚月內氣盛發熱臍風撮口壯熱辰砂膏辰砂三錢硼砂牙硝各錢半元明粉二錢全蠍真珠末各一錢麝一字為末和棗肉好絹包起自然成膏每一豆許治諸驚金銀薄荷湯下潮熱甘草湯下月內嬰兒乳汁調塗奶上令吮下宣風散全蠍二十一個去頭尾酒塗炙麝香少許另研每細末半字金銀或麥冬湯調服治斷臍後外傷風濕唇青口撮多啼不乳口出白沫黑白飲黑牽牛白牽牛俱半生半炒生大黃陳皮去白檳榔各五錢炙草三錢元明粉二錢每末五分至一錢空心溫蜜湯調服此藥新合最妙久則效遲治臍風氣實者及急驚壯熱發搐錢氏柏墨散黃柏釜下墨亂髮灰等分每末少許敷之錢氏瀉心湯黃連一兩每末二分五分至一錢臨臥溫水調服此方瀉丁心實邪實則瀉其子張渙金黃散黃連二錢半胡粉煅龍骨各一錢各另研再合研每少許敷臍中時時用治臍瘡不瘥風氣傳於經絡變為癇疾朴消散大黃牡蠣各五錢朴硝二錢每末一錢或二錢用田螺一枚洗淨浸一宿水調塗治臍突或痛或不痛及感濕熱陰及囊腫木通散木通萹蓄各五錢大黃甘草梢赤苓各三錢瞿麥滑石山梔黃芩車前子各二錢半加燈心三莖或薄荷少許錢氏瀉青丸當歸焙龍膽焙川芎山梔羌活煨大黃防風等分蜜丸竹葉湯下丹溪金烏散蜈蚣半條酒浸炙川烏尖三個麝少許每末半字金銀湯下治臍風一名定命散一名麝香散五通膏生地生薑蔥白萊蔔子田螺肉搗爛塗臍四圍一指厚抱住泄屁而愈治臍風撮口六神散茯苓扁豆各二兩人參白朮山藥各一兩炙草七錢每末一錢薑棗煎治腹冷痛夜啼湯氏鉤藤散人參犀角各五分全蠍天麻各二分甘草一分鉤藤一錢一名鉤藤飲千金龍膽湯煨大黃二錢龍膽草赤苓甘草黃芩各錢半調氣益黃散蜈蚣一條酒炙蠍梢四個殭蠶七個瞿麥五分每末一字吹鼻中取嚏啼哭可治仍用薄荷湯調一字服之治噤口撮口臍風大青膏天麻末一分生白附子錢半蠍尾去毒生末烏梢蛇肉酒浸焙研各五分青黛一錢硃砂末天竺黃末各三分蜜和成膏每半皂子許至一皂子許月中兒粳米大同牛黃膏用薄荷湯化一處服之五歲上同甘露散服之惺惺散茯苓細辛桔梗花粉人參炙甘草白朮川芎等分每末一錢加姜一片薄荷三葉同煎湯氏方細辛減半余俱等分此方除風熱及傷寒時氣瘡疹發熱獨活湯獨活羌活各二錢檳榔天麻麻黃去節炙甘草各一錢共為細末每半錢水煎於內加南星末蜜調可貼囟門治胎驚發散風邪奪命散銅青硃砂各二錢膩粉半錢麝香少許蠍尾十四個去針每末五分薄荷湯調下此方治天吊臍風客忤卒死撮口鵝口木舌喉痹胙腮風壅吐涎後依症調理錢氏涼驚丸龍膽草防風青黛各三錢鉤藤鉤二錢黃連五錢牛黃麝香龍腦各一字麵糊丸粟米大每三五丸金銀湯下演山截風丹全蠍去毒炒殭蠶炒白附子炮南星炮天麻各二錢半硃砂一錢蜈蚣一條酒炙麝香一字蜜丸每三丸金銀薄荷湯化下利驚丸輕粉青黛各一錢牽牛末五錢天竺黃二錢蜜丸小豆大薄荷湯化下此方治急驚痰熱潮搐全蠍散全蠍二十四個薄荷葉包炙殭蠶五錢炒去絲嘴薄荷葉包炙南星一兩用姜一兩鮮薄荷二兩同搗作餅曬乾如急驚不用南星加煨大黃一兩若慢驚不用大黃加制南星炮白附子各三錢防風天麻炙甘草水飛硃砂川芎各五錢共為末一歲兒服一字二歲兒服半錢薄荷湯下量大小歲數加減身熱發搐煎火府散調慢驚吐瀉發搐生薑湯急驚搐煎火府散加大黃湯火府散生地木通各一兩黃芩炙甘草各半兩每㕮咀二錢不拘時水煎溫服治面赤咬牙唇口乾燥小便赤澀一切虛實邪熱直指銀白散蓮肉扁豆茯苓各一分人參白附子天麻全蠍木香藿香炙草各半分炒陳米三錢每末一錢加姜一薄片冬瓜子七粒同煎一方加白朮一分助胃驅風嘔吐作慢驚候者通用地黃丸生地八兩山萸山藥四兩丹皮澤瀉茯苓各三兩蜜丸本方加防風羌活各二兩名加味地黃丸安神丸麥冬牙硝茯苓山藥寒水石各五錢硃砂一兩甘草六錢冰片一字煉蜜丸如雞頭大每半丸砂糖調以上二方甘寒瀉火之劑血氣虛而急驚者宜之治小兒驚悸熱渴心悶脈實面紅頰赤口燥曾氏百解散葛根二兩半升麻赤芍各二兩黃芩一兩麻黃七錢半薄桂二錢半甘草一兩半每粗末二錢加薑蔥煎不拘時溫服風熱盛加薄荷此方主和解百病虛慢陰症不宜牛蒡湯炒牛蒡子三兩大黃兩半防風薄荷各一兩荊芥四兩甘草一兩一錢半每㕮咀二錢不拘時煎服主傷風發熱煩躁鼻塞氣喘痰嗽驚啼及諸瘡赤紫丹毒咽喉腫痛半夏丸生半夏二兩赤苓枳殼各一兩風化朴硝二錢半薑汁糊丸每三十丸食後薑湯下量兒大小加至五十丸治痰症神效若驚搦後風涎潮作服之神效寬氣飲枳殼枳實各一兩人參炙甘草各五錢每末五分至一錢湯調下驚風作搐薑汁調熱甚者入寬熱飲薄荷蜜湯調下或麥冬湯主通利關節胸膈痞結消痰逐水進食及治蓄氣而成搐傳變急慢驚風氣逆精神昏倦五和湯當歸赤苓各半兩炙甘草大黃枳殼各七錢半每粗末二錢煎不拘時服此方主宣利臟腑積滯調利榮衛茯神湯茯神一兩人參當歸各半兩炙草二錢每㕮咀二錢煎有熱微煩躁加麥冬此方治心氣不足虛而驚悸日常頻哭及生下羸瘦多驚宜子母同服鄭氏比金丸輕粉滑石各錢半南星一錢二分青黛五分糊丸小豆大一歲二丸薄荷湯下急驚頭熱足冷麵青口噤痰瘈加一丸桃皮湯下名桃符丸去青黛加蠍梢五分名小青丸治急驚壯熱喘粗痰嗽二便不利曾氏五苓散澤瀉二兩半茯苓豬苓白朮各一兩半肉桂七錢半每一錢湯下解傷寒溫濕暑毒霍亂分陰陽理煩渴鎮心丸甜硝人參各一兩炙草寒水石各一兩半山藥茯苓各二兩硃砂一兩冰片麝香各一錢蜜丸雞頭大每半丸溫水下至一二丸此方涼心經治驚熱痰盛及癇病安神鎮驚丸天竺黃人參茯神南星各五錢棗仁麥冬當歸生地赤芍各三錢黃連薄荷木通山梔硃砂西牛黃煅龍骨各二錢青黛一錢蜜丸緑豆大每三五丸量兒大小加減薑湯下驚退後安心神養氣血和平預防之劑也栝蔞湯栝蔞二錢白甘遂末一錢慢驚脈有力濕痰聚於胸中風火蘊結者服青州白丸子半夏七兩南星三兩白附子二兩川烏五錢去皮臍四味皆用生者研細以生絹袋盛井水擺出未出者更以手揉有渣再研再擺令盡瓷盆內連水日曬夜露曉去舊水另用井水攪又曬露如此法春五日夏三日秋七日冬十日去水曬乾如玉片研細糯米粥丸緑豆大每三五丸薄荷湯下癱風酒下皆不拘時此方治小兒驚風大人諸風醒脾散白朮人參甘草全蠍橘紅茯苓各五錢半夏木香各一分白附子四個炮炮南星二枚蓮肉一錢每末一錢加薑棗煎漸服若頓服必吐此方昏困者宜之人參羌活散人參羌活獨活柴胡川芎白茯苓甘草各一兩前胡桔梗天麻地骨皮各五錢枳殼一兩二錢每㕮咀一錢加姜一片薄荷三葉棗半個煎治初作急驚散風邪除風熱疹痘未發亦可鄭氏驅風膏辰砂蠍尾當歸山梔川芎龍膽草羌活防風大黃甘草各一錢麝香一字煉砂糖丸芡子大三歲三丸薄荷竹葉蜜湯化下治肝風筋脈拘急面紅目青眼上驚搐胎風沖和飲蒼朮一兩人參前胡桔梗五錢枳殼麻黃陳皮各三錢川芎白芷半夏當歸薄桂白芍藥赤苓各錢半乾薑厚朴各二錢炙草七錢半每粗末二錢加姜二蔥一煎服傷冷噁心嘔吐加炮姜寒疝加小茴吳萸此方治感冒風寒頭痛發熱肩背拘急噁心嘔吐腹痛膨脹兼寒濕相搏四肢拘急冷氣侵襲腰足疼痛七寶散紫蘇香附各三兩甘草陳皮桔梗各二錢半川芎白芷各一兩每粗末二錢加姜二片煎痰嗽加半夏口腥氣少加鹽此方品味不僣不燥甚佳治風寒時氣頭昏體熱咳嗽及脾胃肺不和口腥牙縫鮮血兼調理諸病固真湯人參附子茯苓白朮各二錢半山藥黃耆肉桂甘草各二錢每粗末三錢加姜三棗一煎主吐瀉痢後胃虛脾慢四肢口鼻氣冷沉困不省人事聚寶丹人參茯苓琥珀天麻全蠍白附子殭蠶防風膽星烏蛇肉酒炙各一錢硃砂五分麝香少許蜜丸桐子大每二丸菖蒲湯下專治慢驚南星散南星八九錢重者一個掘地坑深尺許用炭五斤燒通紅醋一碗灑坑中即投南星以火炭密蓋又用盆復時許取出研為末入琥珀全蠍各一錢每二字生薑防風湯下治慢驚驅風豁痰參蘇飲人參紫蘇前胡葛根半夏赤苓各七錢半枳殼陳皮桔梗甘草各五錢每粗末二錢加姜一片煎一方去人參加川芎解驚風煩悶痰熱作搐咳嗽氣逆脾胃不和金液丹舶上硫黃十兩研細盛瓷器八分水和赤石脂封縫鹽泥固臍曬乾地上埋一小罐盛水滿安瓷盒在上又以鹽泥固臍以炭火煅三日三夜候冷取出用柳木捶乳鉢內研極細每用一錢至二餞量兒大小加增薑湯送下異功散人參茯苓白朮甘草橘紅木香各等分每末三字加薑棗煎一方無木香本事保命丹虎睛一對瓦上炙乾硃砂五錢全蠍麝香各五分蜈蚣二條去頭尾天麻一分蜜丸豆大瓷罐貯之又入冰麝窨定急驚薄荷蜜湯下慢驚薄荷湯下各三丸治急慢驚風四肢逆冷眼直口噤涎流不止溫驚丸膽星四兩硃砂一錢半天竺黃一兩坯子胭脂五分冰片五分牛膽汁丸芡子大每服一丸小者半丸沙糖水下抱龍丸膽星四兩天竺黃一兩雄黃水飛硃砂研各半兩麝香一錢甘草膏丸皂莢子大溫水化下百日兒一丸分三四服五歲兒一二丸大人三五丸此治傷寒瘟疫身熱昏睡氣粗風熱痰實壅嗽驚風潮搦及蠱毒中暑壯熱兒宜常服黃耆益黃散黃耆二錢人參甘草半生半炙陳皮各一錢白芍七分茯苓四分黃連少許水二盞煎五六沸此方治胃中風熱天麻散半夏七錢天麻二錢半炙草茯苓白朮各三錢用水一盞入姜三錢同煮乾焙為細末每錢半薑棗湯下治急慢驚風及大人中風涎盛半身不遂本事褊銀丸青黛三錢水銀一皂角子大黑鉛錫炒砂子寒食麵黃明膠炒焦為末各二錢輕粉豆許大炒雄黃粉霜硃砂各一兩巴霜二十粒麝香少許水丸麻子大捏褊曬乾瓷器盛一歲一丸隨意加減棗湯送下不得化破此方治小兒急慢驚風積痼神芎丸生大黃黃芩各二兩生牽牛末一兩滑石四兩黃連薄荷葉川芎各五錢水糊丸梧子大每三四丸溫水下治風熱壅滯頭目昏眩口舌生瘡牙齒疳蝕或瘡疥咬牙驚惕煩躁作渴或大便澀滯或積熱腹滿驚風潮搐等症雄黃散雄黃二錢半白藥去黑皮川烏頭炮去皮臍草烏頭炮去皮臍天麻川芎各五錢為末驚風痰壅每服三分加至一錢薑汁調茶清下欲汗薑蔥薄荷湯下治暴中急慢驚風齁䶎痰涎滿口及雨侵汗閉不通或涼或熱坐臥生煩茯苓補心湯茯苓四錢桂心甘草各三錢人參麥冬紫石英各一錢棗二枚此方治心氣不足喜悲愁怒衄血面黃五心煩熱咽喉間痛舌