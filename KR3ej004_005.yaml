風熱發熱耳內癢或出水疼痛生瘡或胸脅間痛往來寒熱柴胡清肝散柴胡一錢半黃芩人參川芎各一錢山梔二錢連翹甘草各五分桔梗八分治肝膽三焦風熱怒火乍寒乍熱往來寒熱發熱或頭髮瘡熱等症柴胡飲子黃芩七分甘草四分大黃八分白芍六分柴胡人參各五分當歸一錢此方主解肌熱蒸熱積熱汗後餘熱脈洪實弦數大便堅實龍腦飲子炙草四兩山梔三兩藿香葉五錢石膏一兩砂仁栝蔞各七錢半每末一錢蜜水調服傷寒餘毒潮熱虛汗加竹葉此瀉脾經熱可代瀉黃散治小兒蘊熱咽喉腫痛眼赤口瘡心煩鼻衄咽乾多渴睡不寧及除痰熱咳嗽中暑煩躁一切風壅三解牛黃散殭蠶全蠍防風白附子桔梗大黃炙草茯苓黃芩人參鬱金等分每細末五分至一錢量兒大小加減薄荷蜜湯調下此方治實熱潮熱滋腎丸酒黃柏三錢知母二錢肉桂五分熟水丸梧子大每二十至三十丸百沸湯下此方專治腎熱當歸補血湯黃耆三錢當歸一錢治肌熱躁熱目赤面紅煩渴晝夜不息脈洪大而虛重按全無此血虛也服白虎湯必死羌活散人參羌活赤苓柴胡前胡川芎獨活桔梗枳殼蒼朮甘草各等分每粗末二錢加姜二片薄荷三葉煎發散風邪加蔥白痢症加薑倉米治傷風時氣頭痛發熱身體煩疼痰壅咳嗽失音鼻塞聲重及解時行下痢赤白四順清涼飲赤芍當歸大黃甘草各等分三歲用二錢末加薄荷二葉煎八九沸治小兒血脈壅實臟腑蓄熱頰赤口渴五心煩熱睡不安驚搐及因乳哺不時寒溫失度令兒氣血不順腸胃不調大小便澀欲發驚癇或風熱結核頭面生瘡目赤咽痛瘡疹餘毒一切壅滯挾熱泄瀉不止加煨木香大黃小便不通加燈心木通補中益氣湯人參黃耆各八分白朮甘草陳皮各五分升麻柴胡各二分當歸三分治中氣虛體疲食少或發熱煩渴寬熱飲枳殼一兩同巴豆去心膜十五粒同炒去巴豆大黃一兩甘草七錢半元明粉二錢半每細末五分至一錢兒小者用一字姜蜜湯或薄荷湯調下白虎湯知母三兩炙草一兩石膏八兩糯米三合每粗末二三錢煎米熟為度治傷寒吐下後邪熱不解熱結在裡表裡俱熱惡風渴燥而煩及中暑汗出惡寒熱渴參苓白朮散人參茯苓甘草白朮扁豆子山藥砂仁苡仁桔梗蓮肉各一兩每末五分至一錢米湯或棗湯調下主脾胃虛不進食少氣多困中滿痞噫嘔吐氣逆此藥不寒不熱性味和平並可常服安神散人參茯苓半夏陳皮枳實炙草各五錢每銼二錢加薑棗竹茹煎治吐瀉後心虛煩悶觸物易驚氣鬱生涎涎與氣搏睡不得寧如熱渴加麥冬火府丹生地木通黃芩甘草治小兒壯熱金蓮飲子防風炙甘草連翹柴胡山梔各半兩每末二錢煎服治小兒蘊積壯熱眼赤口瘡心煩躁悶咽乾多渴潮熱不止牛黃膏蠍尾四十九枚巴霜一錢半冰片半匙硃砂二錢鬱金三錢牛黃少許麝香一匙每末一匙蜜水調下量兒虛實用之此方治壯熱咽喉涎響不省人事或左右手偏搐或唇口眼鼻顫動此熱涎內蓄風邪外感也宜急服之梔子仁湯梔子赤芍大青知母各一兩酒黃芩升麻石膏各二兩柴胡一兩半甘草五錢杏仁二兩炒每三錢加姜三片煎治陽毒壯熱百節疼痛下後熱不退者人參生犀散犀角地骨皮秦艽麥冬枳殼大黃柴胡桑皮赤芍赤苓黃耆人參鱉甲每粗末二錢加烏梅半個煎不拘時服此方治小兒骨蒸肌瘦頰赤口乾日晡潮熱盜汗五心煩躁四肢困倦及大病後餘毒不解或傷寒後食羊肉體熱不思食調胃承氣湯大黃芒硝各一兩炙草五錢每末一錢煎少少溫服治傷寒陽明症不惡寒反惡熱口渴便閉譫語腹滿中焦燥實及傷寒吐後腹脹滿者桂枝湯桂枝白芍生薑甘草大棗熱服溫覆微汗治太陽中風陽浮陰弱發熱頭痛自汗鼻鳴乾嘔惡風惡寒及陽明脈遲汗出多微惡寒麻黃湯麻黃桂枝杏仁甘草治太陽邪在表發熱頭身腰骨節痛項背強惡寒惡風無汗而喘脈浮而緊亦治哮症三拗湯麻黃杏仁甘草治感冒風寒咳嗽鼻塞桂枝麻黃各半湯桂枝白芍生薑甘草大棗麻黃杏仁治太陽症如瘧狀熱多寒少小建中湯桂枝白芍焙生薑甘草大棗飴糖大承氣湯大黃芒硝厚朴枳實治陽邪入里胃實不大便發熱譫語自汗不惡寒痞滿燥實雜病三焦大熱脈沉實者大青龍湯麻黃桂枝甘草杏仁石膏生薑大棗治太陽中風脈浮緊身疼發熱惡寒無汗煩躁又脈浮數身重不痛乍有輕時無少陰症者小青龍湯麻黃桂枝白芍細辛甘草五味子乾薑半夏治傷寒不解心下有水氣發熱乾嘔而咳噎喘渴利小便不利少腹滿短氣不得臥麻黃附子細辛湯麻黃附子細辛此治少陰症始得之反發熱脈沉者四逆湯附子乾薑甘草冷服治三陰傷寒裡寒外熱四肢逆冷脈微細升麻葛根湯升麻三錢葛根白芍各二錢甘草一錢加姜治陽明傷寒中風頭痛發熱惡寒無汗口渴目痛鼻乾不臥及陽明發斑欲出不出解肌湯葛根麻黃黃芩大棗芍藥甘草此方治傷寒溫病地骨皮飲地骨皮柴胡各二兩知母炙草鱉甲黃芩人參各二錢半赤芩五錢治小兒骨蒸潮熱往來心膈煩悸及傷寒後氣未解每歲用末二錢加姜梅各一片煎地骨皮散知母炙草半夏銀柴胡人參地骨皮赤苓各等分每末二錢加姜三片煎量兒大小加減驚熱加蟬蛻天麻黃芩若加秦艽名秦艽飲子治虛熱潮作亦治傷寒壯熱及餘熱玉露飲寒水石石膏各一兩甘草三錢每末五分至一錢溫水下治煩躁頰赤咽乾不臥身熱頭痛兼中暑發渴昏悶小便祕驚氣入腎夢中咬牙萬安飲人參當歸生大黃柴胡枳殼半夏白芍防風黃芩甘草各一兩滑石末六兩每末二錢加姜煎此方藥品之外惟可加枳殼半夏主不拘表裡症能宣通氣血疏解風寒寧心化痰去煩理熱並可常服黃連解毒湯黃連三錢炒黃柏五錢炒梔子四枚黃芩二錢炒每二三錢煎亦治熱痢治時疾三日汗已解煩悶口嘔口燥發熱至寶丹生犀角生玳瑁琥珀硃砂雄黃各一兩金箔五十片半為衣銀箔五十片冰片一匙麝香一錢牛黃五錢安息香一兩半為末酒淘去砂取一兩酒煎成膏上各研再和研勻入安息膏如干量入熟蜜丸桐子大每一二丸參湯下量大小加減此方治驚癇心熱卒中客忤煩躁風涎搐溺及傷寒狂語伏熱嘔吐酸棗仁湯棗仁甘草生地山梔麥冬當歸身人參等分加燈心不拘時服四物湯當歸熟地各二錢白芍川芎各一錢治血虛發熱煩躁或晡熱作渴頭目不清香瓜丸大黃瓜一枚胡黃連煨大黃柴胡鱉甲黃柏黃連蘆薈青皮等分諸藥為末將黃瓜去頂納入至滿蓋口竹釘釘住煨熟將瓜藥同研糊丸每二三丸食後新水下大者五七丸不及十丸十全大補湯白朮茯苓當歸人參川芎黃耆白芍肉桂熟地炒甘草各等分治諸虛不足自汗不食時發潮熱當歸六黃湯當歸熟地生地黃芩黃柏黃連黃耆此方治血虛盜汗內熱晡熱者升麻湯升麻黃耆人參各一兩熟地五錢天竺黃牡蠣各五錢每末五分至一錢竹葉湯調下大治小兒肌熱盜汗涼膈散大黃朴硝炙草各一兩連翹二兩山梔黃芩薄荷各半兩每末二錢加竹葉七片蜜少許煎溫服大小加減治小兒一切臟腑積熱症仙方活命飲金銀花橘皮各三錢穿山甲角刺防風沒藥乳香白芷當歸各一錢貝母花粉甘草節各八分每粗末五錢酒煎嬰兒一兩母子同服或為細末酒調服亦可毒在表者加麻黃散毒在內者加大黃下之臨時制宜此解毒回生起死妙劑化丹湯獨活射干麻黃甘草青木香黃芩薄桂各五錢石膏末每二錢煎此方解利丹毒遍身燥癢發熱煩啼升麻散升麻黃芩大黃朴硝各一分麥冬葛根各三分每粗末一錢煎治小兒一切丹遍身壯熱煩渴升麻膏升麻大黃護火草蛇銜草山梔寒水石芒硝藍葉生地芭蕉根羚羊角梧桐皮各半兩臘豬油一斤慢火熬一食久乘熱濾去渣入竹瀝候冷成膏每以棗大竹瀝化服並塗毒處戎鹽散戎鹽一兩附子一枚雄黃半兩每末少許雄雞血調塗嬰孺方麻黃升麻各三分硝石四分每末方寸匕井花水服日三一方加大黃主丹毒入腹及下至卵者不治方天竺黃散天竺黃鬱金茯神甘草各五錢硼砂牙硝白芷川芎殭蠶枳殼各二錢半硃砂二錢麝香一字蟬殼十五個每末五分至一錢薄荷湯下治上焦風熱口鼻生瘡目赤腫咽膈不利涎壅氣滯驚搐煩悶神思昏迷清胃散升麻五分生地四分黃連丹皮各三分歸梢四分嬰兒母亦服治胃熱牙疼飲冷作渴口舌瘡唇口腫痛連頭面吐舌流涎若服克伐藥有此等症者五味異功散人參平肺散人參陳皮甘草地骨皮茯苓各一錢知母七分五味子青皮天冬各四分桑皮一錢半每粗末二三錢煎此方治心火克肺金傳為肺癰咳嗽喘嘔痰涎壅盛胸膈痞滿咽嗌不利錢氏益黃散陳皮一兩青皮訶子肉炙甘草各五錢丁香二錢每末二錢食前煎服此方治脾胃虛寒又名補脾散錢氏瀉黃散藿香葉七錢山梔石膏各五錢甘草三兩防風四兩上銼用蜜酒炒微黃為末每一錢至二錢煎溫服又名瀉脾散治作渴飲冷手足熱身發黃屬胃經實熱平胃散厚朴五兩陳皮炙草各一兩蒼朮五錢每末二錢薑棗湯調服治脾胃不和不思飲食心腹脹痛口苦短氣噁心噯氣吞酸面黃體瘦嗜臥霍亂吐瀉調中丸白朮人參甘草各五分此方治脾胃虛寒健脾飲厚朴人參各一兩茯苓半夏肉豆蔻益智仁香附良薑東壁土炒訶子肉各二錢半炙草五錢每粗末二錢加姜二片棗一枚煎主健脾胃理嘔吐治瀉利及諸病後虛弱有痰噁心腹微痛飲食減精神慢並宜服藿香飲人參半夏赤苓炙甘草各一兩蒼朮二兩陳皮藿香各七錢半厚朴兩半每㕮咀二錢加姜二棗一煎空心服或加燒鹽少許主理虛化痰及治脾胃不和飲食少進健脾散茯苓人參各一兩厚朴二兩蒼朮四兩陳皮五兩甘草二兩半生半炙草果六錢每末一錢加薑棗煎量大小加減最能和養小兒胃氣調中飲子肉豆蔻白朮人參陳皮訶子肉茴香炙草砂仁各五錢藿香葉檳榔桂心各三錢每末五分至一錢加薑棗煎量大小加減此方治小兒諸疾香薷飲香薷三兩扁豆厚朴各一兩半生草二兩每粗末二錢煎治夏秋臟腑冷熱不調飲食不節吐痢腹痛發熱煩悶六和湯人參砂仁炙草杏仁半夏各一兩扁豆一斤藿香赤苓木瓜各二兩香薷厚朴各四兩每二錢加姜二片棗一枚煎或加鹽半字治心脾不和氣不升降霍亂吐瀉胸滿咳嗽冒暑伏熱煩悶成痢中酒作渴心逆畏食守胃散人參白朮山藥茯苓南星扁豆甘草葛根藿香防風天麻各五錢每二錢加姜二片冬瓜子仁五十粒打碎煎空心服瀉不止加沉香白豆蔻治陰陽不和吐瀉不止預防風症常調脾胃理中湯人參白朮各一兩甘草乾薑各二錢半每末半錢或一錢溫湯空心調服主溫脾暖胃冷吐冷瀉及胎氣虛中寒腹痛四君子湯人參白朮茯苓炙草等分每二錢加薑棗煎治小兒脾胃虛損吐瀉少食六君子湯人參茯苓白朮炙草半夏陳皮治脾胃虛吐瀉不食羸瘦或肺虛痰嗽喘促或肝虛驚搐目眩自汗觀音散石蓮肉人參神麯各三錢茯苓二錢炙草木香黃耆扁豆白朮各一錢每粗末二錢加棗一枚藿香三葉煎治小兒外感內傷嘔逆吐瀉漸羸瘦和中散人參茯苓白朮炙草葛根白扁豆黃耆藿香每末三錢加薑棗煎此方和胃止吐瀉定煩渴治腹痛胃苓湯白朮茯苓澤瀉豬苓厚朴陳皮甘草等分桂少許每二錢加薑燈心治腸胃受濕嘔吐泄瀉若停食吐瀉小便短少腹脹作痛以此分利再用六君調補脾胃消積丸丁香九粒砂仁十二粒巴霜二錢烏梅肉二個糊丸溫水下此方治小兒吐瀉大便醋臭肉豆蔻散肉豆蔻桂心各一分人參炙草各五錢每粗末一錢加姜少許煎隨大小加減此方治小兒霍亂吐瀉腹痛白朮散白朮人參半夏各二錢茯苓炙甘草乾薑各一錢每末二錢加薑棗煎此方治小兒嘔吐脈遲細有寒參香飲人參一兩沉香丁香藿香南木香各二錢五分每二錢煎入薑汁少許三次服此方治胃虛作吐投諸藥不止香薷散香薷茯苓扁豆厚朴各五錢每二三錢煎入酒半杯冷服立效治外傷風寒暑內傷飲食致吐利心腹痛霍亂氣逆發熱頭痛或轉筋拘急嘔噦肢冷竹茹湯葛根七錢半夏五錢炙草三錢每二三錢入竹茹三分煎微冷服加茯苓三錢妙治胃受邪熱心煩喜冷嘔吐不止玉露飲寒水石五錢生甘草一錢石膏六錢每末三五分至一錢食後溫湯調服此非腎熱相火大盛者不宜服大順飲細面二十兩生薑十六兩赤苓甘草各五錢先搗成餅曬乾為末每二錢水調治冒暑毒煩渴吐瀉發熱腹痛神昏吐衄血便血溺黃少口乾汗多緑豆飲緑豆粉一兩黃連葛根甘草各五錢每五分至一錢豉湯調服主誤服熱藥毒煩躁悶亂或吐或渴益元散滑石六錢甘草一錢每一錢至二錢水服治熱吐面赤氣粗小水少傷暑吐神昏尤妙烏犀丸皂莢三寸炙存性硫黃白姜各三錢半陳皮川烏各五錢巴霜七十七粒主諸積滯夾驚夾風吐逆醋酸氣面黃肌瘦茯苓厚朴湯茯苓半夏各七錢半炙草三錢厚朴五錢每㕮咀二錢加姜煎或加棗亦可此方主傷寒傷風夾痰嘔逆並吐瀉後喉涎牽響飲食減少脾胃氣虛防風溫膽湯半夏枳殼赤苓各五分陳皮防風各二分半人參二分甘草一分半姜一片紫蘇二葉煎水送大驚丸小驚丸此方治驚風消痰疏風順氣大驚丸棗仁蚌粉炒炙草各五錢人參赤苓白朮硃砂麥冬木香代赭石醋煮各二錢半殭蠶桔梗各一錢二分半全蠍三個金銀箔各三片蜜丸薄荷湯下一二丸此方定驚安神又治心熱夜啼一名大安神丸小驚丸鬱金皂角水浸煮黃連牙硝木香藿香龍膽草各二錢半全蠍三個糊丸以雄黃硃砂麝香金銀箔為衣薄荷湯化下一二丸此方亦治驚風溫白丸殭蠶白附子生炒南星各一兩生天麻五錢全蠍一錢糊丸緑豆皮生薑米飲下五七丸至二三十丸此方治慢驚風加味朮附湯炮附子白朮各一兩煨肉蔻二個木香炙草各五錢每粗末二錢加薑棗此方治吐瀉後便成慢驚或因臟寒洞泄得者八仙散天麻白附子白花蛇肉防風半夏曲南星全蠍冬瓜仁各二分半川烏一分姜二片棗一枚薄荷二葉此方治慢驚虛風烏蠍散白朮人參茯苓炙草川烏全蠍南星姜三片棗二枚此方治慢驚純陰症吐瀉不止蟬蠍散全蠍七個蟬蛻二十一個南星一個甘草分半每粗末二錢加姜三棗二煎此方治慢驚風陽症黑附湯炮附三錢木香錢半白附子一錢炙草五分分二帖加姜三片煎以匙灌下此方治慢脾風危急者灌下藥如手足暖而蘇即止勿灌生附四君子湯人參茯苓白朮炙草生附子各等分每末二錢加姜五片煎以匙灌下此方治慢脾風灌藥手足暖即止助胃回陽蠍附散炮附子二錢炮南星炮白附子木香各一錢全蠍七個㕮咀一錢加姜五片煎此方治慢脾風回陽豁痰補脾益真湯丁香木香訶子皮陳皮厚朴肉豆蔻草果茯苓人參白朮桂枝半夏炮附子炙草各二分全蠍一枚姜二片棗一枚灌服後輕揉心下以助藥令此方治慢脾風全蠍觀音散人參一錢蓮肉神麯各三分茯苓分半白朮黃耆木香扁豆甘草各二分羌活防風天麻全蠍各一分此方治吐瀉後成慢驚風亦治慢脾風定魄丸人參琥珀茯神遠志硃砂天麻石菖蒲天冬棗仁甘草等分硃砂為衣此方治因驚發癇沉香天麻湯羌活五分獨活四分防風天麻半夏炮附子各三分沉香益智炮川烏各二分姜梢當歸甘草各一分半姜三片煎先灸兩蹺脈各七壯此方治因驚成癇發搐痰涎壅塞目多白睛項背強急喉中有聲神思如癡三癇丹蜈蚣一條膽星二錢全蠍防風白附子遠志蘆薈延胡索硃砂各一錢麝香一字金銀箔各三片糊丸薄荷湯下梧子大一丸此方治急驚為癇十全丹陳皮青皮莪朮川芎白豆蔻五靈脂檳榔蘆薈各五錢使君子木香蝦蟆灰各三錢豬膽汁浸糕和丸麻子大米飲下二三十丸此方治丁奚哺露無辜壞症布袋丸夜明砂使君子蕪荑各二兩蘆薈人參白朮茯苓甘草各五錢蒸餅丸彈子大每一丸布袋盛同精豬肉二兩煮肉爛提起藥掛風處陰乾只用肉和汁與兒吃次日又煮服藥盡止此方治丁奚哺露無辜疳小兒清心丸人參茯神防風硃砂柴胡各二錢金箔三十片蜜丸每一丸竹瀝化下此方治諸熱及驚熱煩躁牛黃奪命散白醜黑醜各取半生半熟頭末五錢大黃一兩檳榔二錢半木香錢半輕粉一字每末一錢至二錢蜜水調下微利為度一名一捻金此方治小兒肺脹胸滿喘粗氣急兩脅肩動兩鼻竅張痰涎潮塞悶亂喘渴死在旦夕者蔥豉湯蔥白淡豆豉此方主表散清燥救肺湯霜桑葉三錢炒杏仁七分麥冬一錢二分石膏二錢五分人參七分阿膠八分胡麻仁甘草各一錢枇杷葉一片食遠服
