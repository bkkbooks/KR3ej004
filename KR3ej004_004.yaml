body:
  text: 卷四感冒感者觸也冒其罩乎觸則必犯犯則內趨罩則必蒙蒙則里瘀當其感冒淺在肌膚表之則散發之則祛病斯痊矣寧至盤紆若不早治由外內徂侵經及絡臟腑壅沮潛骨淪髓邪毒固儲變成大病難以驟驅而至於危而至於殂伊誰之過能無憾歟感冒之邪惟風最初風行迅速飄忽吹噓當風行止便入身驅由風挾寒風寒是區乃風之寒非風寒俱故異傷寒六經遍逾脈兼浮緊其候籲喁由風挾熱風熱是呼乃風及熱非風熱殊故異中熱暑喝猝痡脈兼浮數其候齟齬感冒之原由衛氣虛元府不閉腠理常疏虛邪賊風衛陽受攄惟肺主氣首先犯諸心火相合肝風並喣以漸而入因風疾馳避風避箭載在方書正風且然況戾風刳感冒之症未可盡拘頭疼身熱輕則或無必惡風寒肢體不舒鼻流清涕堵塞氣粗咳喘聲重涎沫有餘咽乾口閉自汗沾襦此外因也當用表除素有痰熱窠囊若墟太陽陽明二經是居風邪易入招引而孚風乘火勢火煽風樞互相鼓動病盛膈胠此內因也當用爬梳感冒之治四時難誣春夏辛涼升麻柴胡荊防羌葛取效須臾秋冬辛溫桂枳參蘇二胡二活其要也夫內治甘苦升散同符沖和通聖二方是圖臨時消息以意菑畲庶幾疢疾如草加鋤所觸斯解所罩亦紓四時感冒症治錢乙曰貪睡口中氣熱呵缺煩悶者傷風症也頭目疼痛而畏人畏寒者傷寒症也張元素曰小兒外感風寒拘急呵缺皮毛澀口中氣熱者當發散秋冬用溫熱春夏用涼寒談殊聖曰小兒頭疼體痛鼻塞流涕咳嗽噴嚏頰赤眼澀山根青色皆傷風寒也宜大青膏初虞世曰感冒風寒通用人參羌活湯惺惺散參蘇飲萬全曰有風熱兼傷者或先傷風而後受熱或先受熱而後傷風一時齊發貴審輕重而治之宜桔梗湯熱鬱湯若久不愈此兒必虛不得仍用表散李梴曰傷風則涕流鼻塞聲重傷風症屬肺者多宜辛溫辛涼散之戴氏曰新咳嗽鼻塞聲重是也有汗而惡風此真感風症也春溫風溫夏熱秋燥冬寒症治王履曰小兒春日溫病未滿三日先用惺惺散二帖後四五日不解煩渴嘔吐白朮散自汗口燥用制白虎湯六七日大便燥結四順飲子下之心腹大實大滿牛黃通腸丸下之初起疑是瘡疹只用葛根升麻湯解肌葉桂曰春溫伏氣症也昔人以冬寒內伏藏於少陰入春發於少陽以春木內應肝膽也寒邪深伏已經化熱昔人以黃芩湯為主方苦寒直清裡熱熱伏於陰苦味堅陰乃正治也知溫邪忌散不與暴感門同法若因外邪先受引動在裡伏熱必先辛涼以解新邪繼進苦寒以清裡熱況熱乃無形之氣幼醫用消滯攻治有形胃汁先涸陰液劫盡者多矣擬春溫備用方黃芩湯涼膈散清心涼膈散若新邪引動伏邪蔥豉湯春溫為冬季伏邪幼科亦有之治從大方然暴感為多如頭痛惡寒發熱喘促鼻塞身重脈浮無汗原可表散春令溫舒辛溫宜少用陽經表藥最忌混亂至若身熱咳嗽有痰之症只宜肺藥辛解瀉白散加前胡牛蒡薄荷之屬消食藥只宜一二味風溫乃肺先受邪遂逆傳心包治在上焦不與清胃攻下同法幼科不明手經之病多致危殆若寒痰阻閉亦有喘急胸高不可與前法用三白吐之春季溫暖風溫極多溫變熱最速若發散風寒消食劫傷津液變症尤速擬風溫備用方涼膈散清心涼膈散瀉白散白虎湯至寶丹清心牛黃丸喻氏清燥救肺湯先夏至為病溫後夏至為病熱熱者暑熱也暑必兼濕暑傷氣分濕亦傷氣汗則耗氣傷陽胃汁大受劫爍病變由此甚多張鳳逵云暑病首用辛涼繼用甘寒再用酸泄收斂不必用下可稱要言不煩夏令受熱昏迷若驚此為暑厥即熱氣閉塞孔竅所致其邪入絡與中絡同法牛黃丸至寶丹芳香利竅可效蘇後用清涼血分如連翹心竹葉心元參細生地鮮生地二冬之屬此症初起大忌風藥初病暑熱傷氣竹葉石膏湯或清肺輕劑大凡熱深厥深四肢逆冷但看面垢齒燥二便不通或瀉不爽為是大忌誤認傷寒秋深初涼稚年發熱咳嗽與春月風溫相似而溫自上受燥自上傷理亦相等均是肺氣受病世人誤認暴感風寒混投三陽發散津劫燥甚喘急告危若果暴涼外束身熱痰嗽只宜蔥豉湯或蘇梗前胡杏仁枳桔之屬僅一二帖亦可更有粗工亦知熱病與瀉白散加芩連之屬不知愈苦助燥必增他變當以辛涼甘潤之方氣燥自平而愈慎勿用苦燥劫爍胃液秋燥一症氣分先受治肺為急若延數十日病必入血分又非輕浮肺藥可治須審體症端深秋入冬暴冷折陽外感發熱頭疼身痛嘔惡必從太陽若渴能飲水者裡熱見症即非純以表散傷寒每以風傷衛用桂枝法寒傷營用麻黃法小兒肌疏易汗難任麻桂辛溫表邪太陽治法輕則紫蘇防風一二味身痛用羌活然不過一劑傷風症亦肺病為多前杏枳桔之屬辛勝即是汗藥蔥豉湯乃通用要方若肢冷寒戰嘔吐自利或身無熱即從中寒里症三陰須分但小兒太陰中寒最多厥陰間有若冬令應寒氣候溫暖當藏反泄即能病名曰冬溫溫為欲熱之漸非寒症得汗即解若涉表邪一二裡熱必兼七八是癮疹丹痧非徒風寒或外受之邪與里邪相搏亦令鬱於經絡或飲醇厚味裡熱熾烈而衛氣不與營氣相和或不正直入內侵即有腹痛下痢諸症其治法必以里症為主稍兼清散設用辛溫禍不旋踵至於痧痘時癘須分四氣也痰涎大人痰飲小兒涎痰痰由涎結涎乃脾泔脾運胃液肢體皆咸脾氣不足風熱相兼壅遏中脘口沫淹淹乃生壯熱驚搐漸添脾熱乘心涎亦中含心忡心悸胸膈常惉涎流口角痰自喉探或喘或嗽皆痰之嫌雞聲鋸聲皆痰之占凡屬驚癇痰必深潛凡屬痞積痰又牢堅瘧必有痰寒熱難堪眩亦多痰痰火上炎凡諸痰病涎亦均沾然痰與涎津液所涵實為元氣相附如緘不圖其本痰涎是劖元虛而脫難免儖儳錢氏遺法白朮散拈涎痰之治此其大凡勿求小效心存二三痰涎原由症治錢乙曰余治朱監簿子五歲夜發熱曉如故醫以鐵粉丸下涎病益甚至五日大引飲余取白朮散一兩煎三升任意飲朱疑其瀉余曰縱瀉勿怪但不可下耳止瀉治痰清神退熱皆此藥也又煎三升服稍盡愈三日又服三升不渴無涎投阿膠散二服安聖惠方曰小兒多涎者風熱壅脾積聚成涎即乳食不下涎沫結實而生壯熱小兒多涎亦由脾氣不足不能四布津液而成若不治其本補益中氣而徒去其痰涎痰涎雖病液亦元氣所附去之不已遂成虛脫每見驚搐壯熱等症醫以下痰小見功效屢下之而致夭亡者多矣姑備方半夏丸牛蒡子散談氏金珠丸白附丸五臟傳變皆痰李梴曰五臟傳變皆痰為患蓋痰乃風苗火靜則伏於脾風動則壅於肺痰火交作則為急驚或成嗽痹痰火結滯則為癇釣或為咳嗽痰火來去則為瀉青皆由脾濕而成所以驚風忌純用風藥當以養血藥為使古方保元湯加白芍為慢驚美劑也脾肺母子也二臟俱虛則生頄涎頄涎者脾肺所出也涎則流溢在於咽喉如水雞之聲喘嗽煩悶宜抱龍丸奪命散咳嗽哮喘咳嗽哮喘肺臟所招為虛為實有本有標析而治之理無或淆咳則無痰其聲必高嗽則無聲其痰若膠聲痰俱有咳嗽名昭大抵咳嗽由傷肺杓或風乘肺頭痛汗饒或寒乘肺肢冷酸痟或熱乘肺面赤熱潮或火乘肺涕唾血條或燥乘肺毛髮如燒惟嗽之痰脾濕未消更詳時令四序分鑣秋冬多實春夏虛勞更分久暫莫任歊歊初時感冒邪舍皮毛淫淫習習喉癢難搔嗽久液耗華蓋難澆聲連氣促涎沫盈瓢更參臟腑仔細推敲嘔苦屬膽脅痛肝撓小腸失氣喉梗心苗長蟲胃嘔吐乳脾嘈大腸遺糞喘息肺搖膀胱遺溺腎痛背腰腹滿面腫此屬三焦須明種種咳嗽堪標哮喘相近細核實遙哮專主痰與氣相撩或嗜咸醋膈腕煎熬口開呷吸口閉呀嗷呀呷二音乃合成哮喘氣促急專主熱燎痰聲喝喝肚擷胸堯抬肩張口鼻扇氣烋俱為惡候非可易調故知肺病不自一朝金為火克熱被寒包根因不一辨析釐毫肅清嬌臟永令堅牢咳嗽原由症治錢乙曰夫嗽者肺感微寒八九月肺氣大旺病嗽者必實非久病也其症面赤痰盛或身熱宜葶藶丸下之久者不可下也十一二月嗽者乃傷風嗽也風從背脊第三椎肺俞穴入也宜麻黃湯汗之有熱症面赤飲水涎熱咽喉不利者宜兼甘桔湯若五七日間身熱痰盛唾黏者褊銀丸下之有肺盛者咳而後喘面腫欲飲水有不飲水者其身即熱瀉白散若傷風嗽五七日無熱症而但嗽者亦可用葶藶丸後用下痰藥有肺虛者咳而哽氣時時常出氣喉中有聲此久病也阿膠散補之痰盛者先實脾後以褊銀丸微下之痰退即補肺如上法蓋久嗽者肺亡津液故必用阿膠散治嗽大法盛則下之久即補之更量虛實以意為增損聖惠方曰小兒嗽而呀呷作聲者由胸膈痰多嗽動其痰上搏於咽喉之間痰與氣相擊隨嗽動息呀呷有聲其咳嗽本體雖同而於治療則加消痰破飲之藥以此為異耳宜聖惠射干散羅謙甫曰小兒齁䶎症本由暑熱所侵未經發散邪傳心肺變而為熱熱生風風生痰痰實不化因循日久結為頑塊圓如豆粒遂成痰母推本其原或啼哭未休遽與乳食或飼以酸鹹氣鬱不利致令生痰或風寒暑濕侵襲或墮水中水入口鼻傳之於肺故痰母發動而風隨之風痰潮緊氣促而喘乃成痼痰急宜去風化痰先以五苓散同寬氣飲寬熱飲稍用薑汁和勻沸湯調服次進知母湯半夏丸治之張元素曰嗽而兩脅痛者屬肝經小柴胡湯嗽而嘔苦者屬膽經黃芩半夏生薑湯嗽而喉中如梗者屬心經甘桔湯嗽而失氣者屬小腸芍藥甘草湯嗽而右脅痛者屬脾經升麻湯咳而嘔長蟲者屬胃經烏梅丸嗽而喘息吐血者屬肺經麻黃湯咳而遺尿者屬大腸赤石脂湯咳而腰背痛甚則咳涎者屬腎經麻黃附子細辛湯咳而遺溺者屬膀胱茯苓甘草湯咳而腹滿不欲食面腫氣虛者屬三焦異功散曾氏曰脾虛亦能作嗽當投補劑醒脾散茯苓厚朴湯令脾氣實然後間與清肺飲疏解肺經風寒及藿香飲助脾養胃亦救子益母之法也有一症咳嗽至極時頓嘔吐乳食與痰俱出盡方少定此名風痰壅盛肝木克脾土用白附飲治之薛己曰咳嗽流涕外邪傷肺也參蘇飲咳嗽面赤心火刑肺也人參平肺散嗽而吐青緑水肝木乘脾也異功散加柴胡嗽而吐痰乳脾肺氣傷也六君加桔梗嗽而吐膿痰熱蘊於肺而成肺癰也桔梗湯凡風邪外傷法當表散而實腠理其用下藥非邪傳於內及胃有實熱者不宜輕用面色白脈短澀者肺之本症也易治面色赤脈洪數者火刑金也難治百日內嗽曾氏曰百日內嬰兒咳嗽痰壅睡中不寧亦因産後感風而得不可過用表散宜惺惺散貝母湯王肯堂曰此名乳嗽實難調理亦惡症也當審虛實實者散之虛者補之其症氣粗痰盛口瘡眼熱發散後可微利之比金丸等主之散其實也其症嘔吐驚悸困倦自汗者宜補肺散益黃散天麻散補其虛也大抵治驚嗽琥珀散天麻丸乃要藥也用天麻蟬蛻殭蠶人參川芎甘草硼砂膽星天竺黃白附子雄黃金箔末之蜜丸芡子大金箔為衣薄荷湯下此治百日內嗽不止遠勝諸藥哮喘原由症治張兼善曰哮喘遇冬則發者有二症一由內外皆寒須用東垣參蘇溫肺湯一由寒包熱用越婢湯加半夏虞摶曰喘促喉中如水雞聲者曰哮氣促而連續不能以息者謂之喘李梴曰哮以聲響言喘以氣息言鰲按哮症古人專主痰後人謂寒包熱治須表散竊思之大都幼稚多吃鹹酸滲透氣脘一遇風寒便窒塞道路氣息喘促故多發於冬初必須淡飲食行氣化痰為主禁涼劑恐風邪難解也禁熱劑恐痰火易升也蘇子枳殼青皮桑皮桔梗半夏前胡杏仁山梔皆治哮必用之藥李士材謂先於八九月未寒時用大承氣下其熱至冬寒無熱可包此法頗好曾試之亦效而又有食哮宜清金丹有水哮宜水哮方有風痰哮宜千緡導痰湯有年久哮宜皂角丸或青皮散錢乙曰喘症有由肺盛復有風冷者胸滿短氣氣急喘嗽上氣當先散肺後發散風冷散肺瀉白散風冷大青膏有由肺臟怯弱者其唇白色當補肺阿膠散若悶亂氣粗喘促哽氣者難治肺虛損故也脾肺病久則虛而唇白脾者肺之母也母子皆虛不能相營故曰怯肺主唇唇白而澤者吉白如枯骨者死閻孝忠曰小兒喘病甚於咳嗽然有虛實冷熱之分實熱者清肺飲加五和湯加薑蔥及瀉肺湯經云喘息皆因氣有餘蓋肺主氣也虛冷者補肺散坎離湯此肺虛感風氣不升降致有是症及用定喘飲常驗不拘冷熱皆可服痰涎失音二聖散婁全善曰喘急之症有因暴驚觸心者有因寒邪壅盛者有因風邪外客者有因多食鹹酸痰滯者有因膏粱積熱熏灼清道者然喘與氣急有輕重之別喘則欲言不能隘於胸臆氣急但息短心神迷悶耳治法因驚者化痰定喘丸寒傷肺氣者小青龍湯風邪傷肺者三拗湯加減鹹酸傷肺者食生豆腐熱傷肺者清肺飲喉聲如鋸者半夏丸前症多因脾肺氣虛腠理不密外邪所乘真氣虛而邪氣實者為多若已發則散邪為主未發則補脾為主設概攻其邪則損真氣徑補其肺則益其邪馬脾風初虞世曰馬脾風者暴喘而兼脹滿也大小便硬宜急下之用牛黃奪命散後用白虎湯平之馬脾風若患在百日內者不治吳綬曰有馬脾風者因寒邪入肺寒鬱為熱痰喘上氣肺脹齁䶎若不速治立見危亡宜用辰砂二錢半甘遂一錢半輕粉五分共為末每取一字以溫漿水少許上滴香油一點挑藥在油花上待沉下卻去漿水灌之即名馬脾風散此方甚妙也啼哭淚為肝液哭乃肺聲風襲肝臟內外風並惟風煽熱乘於心經火熱逞風刑鑠肺金金木相擊悲哭聲驚或日或夜陰陽互爭亦因母怒乳哺熱生熱移肝臟肝火莫平乃多驚哭其用弗寧亦因母欲孕時過淫淫火炎熾致令毒停既生之後有觸哭應亦因母冷孕時寒凝邪氣入胞兒與之迎生後邪郁兒腹膨脝正氣相搏躽張啼傾亦因父氣腎弱虧精兒稟之産腎陰不榮虛火炎上忽作啼鳴丹溪論此必致歸冥然則啼哭病因匪輕或寒或熱或嚇或攖或胸腹痛或觸神靈務觀其勢各究其情勿云常事任彼涕淋啼哭原由症治巢元方曰小兒有躽啼者在胎時其母傷於風冷邪氣入胞傷於臟腑故兒生之後邪猶在兒腹內邪動與正氣搏則腹痛故兒躽張蹙氣而啼也鉤藤膏錢乙曰小兒驚啼者謂睡夢中忽然啼而驚覺邪熱乘心也安神丸寒夜啼者脾臟寒冷當夜陰盛之時相感故痛而啼也錢氏當歸丸熱夜啼者腹熱痛夜啼面赤唇焦便赤用人參湯下三黃丸張渙曰嬰兒在胎之時其母將養一切不如法及取涼飲冷食過度冷氣入兒腸胃使胎氣不強致生下羸弱多病俯仰多啼名曰躽啼宜養臟湯王履曰小兒夜啼有四症一曰寒二曰熱三曰口瘡重舌四曰客忤寒則腹痛而啼面青白口有冷氣手足腹俱冷曲腰而啼宜六神散益黃散熱則心躁而啼面赤小便赤口中熱腹暖或有汗仰身而啼或上半夜仰身有汗而啼面赤身熱者必痰熱也到曉方息宜導赤散加黃芩口瘡重舌則吮乳不待口到乳上即啼身額皆微熱急取燈照之依口瘡重舌為治客忤者或見非常之物與未識之人或經神廟佛寺與鬼神氣相忤而啼有日啼驚夜必黃昏前後尤甚者錢氏安神丸龐安常曰小兒夜啼作心經有熱有虛治之燈心散黃連飲蟬花散月內夜啼驚搐者乃胎中受驚所致鎮驚散有痰者抱龍丸李梴曰初生月內多啼者凡胎熱胎毒胎驚皆從此而散且無奇疾鰲按李氏此說甚是故凡兒啼只宜輕手扶抱任其自哭自止切不可勉強按住或令吮乳止之若無他病亦不必服藥以上諸家方治亦為有他病者備用非謂夜啼必服藥也汗汗為心液心陽固留在內為血發外汗流傷於客感濈濈汗浮發汗而汗邪隨汗休必以汗愈去病之由汗而為病病從汗搜自汗盜汗二者是求陰虛陽湊發熱汗稠陽虛陰乘發厥汗瀌心腎俱弱自汗堪憂腠疏膚嫩邪熱內仇熱搏心主液不內兜睡中汗出其醒則否或傷冷熱陰陽相勾津液走泄肌體遍周此皆盜汗惟虛是謀飲食飢飽胃汗外投驚而奪精心汗瀏瀏持重遠行腎汗悠悠疾走恐懼肝膽汗遊力作勞苦脾汗颼飀經言臟腑各不相侔總之汗病日久體柔骨蒸疳瘵驚癇筋抽黃瘦疲弱汗冷如揉凡諸變症悉皆可愁他如陽脫其汗在頭心空之汗當心逗遛命絶之汗如珠如油各從病決醫法方優自汗症治錢乙曰六陽虛汗上至頂不過胸也不須治之曾氏曰小兒脾虛自汗多出額上沾黏人手速救胃氣沉香飲脾虛瀉自汗遍身冷而出有時遇瀉則無瀉過即有此候大虛急當補脾益黃散參苓白朮散肺虛自汗右臉色多㿠白肺脈按之無力蓋久因咳嗽連聲不已痰滯不活乃肺經虛氣上壅致令汗出宜補肺散及以藿香飲調脾此又益母救子之義也慢驚自汗遍體俱有其冷如冰此症已危金液丹固真湯實症自汗外因感冒風邪發熱無問昏醒浸淫汗出當急救表解肌百解散胃怯汗上至頂下至臍此胃虛當補胃益黃散盜汗症治錢乙曰小兒睡而自汗出者肌肉虛也止汗散遍身汗出者香瓜丸薛己曰自汗屬陽虛盜汗屬陰虛蓋陽為衛氣陰為營血血之所主心也所藏肝也熱搏於心故液不能內斂而外泄於皮膚人臥則靜而為陰覺則動而為陽故曰自汗屬陽盜汗屬陰也多因心腎不交水火不能既濟腎虛則閉藏之令失守故有是症因血虛內熱當歸六黃湯心經有熱導赤散肝經虛熱六味丸血脫盜汗當歸補血湯肝膽風熱柴胡清肝湯耳目鼻口舌齒咽喉人身九竅取象於泰眼耳與鼻各兩竅對陰數為偶三偶坤外口及二便各一竅系陽數為奇三奇乾內外坤內乾是為泰卦天地生人精微廣大然皆中正非為誕怪按卦核形病從茲逮耳竅屬腎其病聾聵或火或虛肝邪同害目為肝竅病最難制多半屬火兼由風戾亦或內虛間因寒滯腫痛為輕甚則障翳淚出羞明隱澀多蔽鼻之發竅專主於肺肺金受邪鼻塞而悶清涕常流時或發嚏鼻衄鼻瘡肺熱莫泄葉去聲鼻淵鼻瘜病兼腦治唇口屬脾熱甚則碎口瘡口糜相連為害齒本骨余病來則齘疳潰爛齦腎脾肝憊舌乃心苗掉弄舌礙濕食胎生火熱黑綴重舌木舌皆屬危殆至若咽喉呼吸氣會喉癬喉痹喉鵝喉閉種種惡症最宜審諦傷人性命瞬息之際瀉火逐痰乃其要劑或渴或燥腫痛相繼猶為輕候清之便解諸症在上匯為一派凡有病者急治無怠分經析症勿俾敗壞若前後陰下部是隸別為疏論聿分疆界耳病原由症治巢元方曰耳者宗脈之所聚腎氣之所通小兒腎臟盛而有熱者熱氣上衝於耳津液壅結即生膿汁亦有因沐浴水入耳內水濕停積搏於血氣蘊結成熱亦令膿汁出皆謂之聤耳日久不瘥即變成聾也紅藍花散劉完素曰耳者心腎之竅肝膽之經也心腎主內症若其人精血不足也肝膽主外症若其人風熱有餘也或聾聵細辛膏或虛鳴者通鳴散稟賦虛也總治六味地黃丸或脹痛菖附散或膿癢者菖烏散邪氣客也總治柴胡清肝湯若因腎肝疳熱六味丸蘆薈丸並用若因熱積內熱四味肥兒丸若因脾經鬱熱加味歸脾湯若因肝經怒火加味逍遙散若因乳食膏粱積熱加味清胃散其藥皆令乳母小兒同服不可專於治外不惟閉塞耳竅且恐變生他症延留日久遂成終身聾聵蓋外治方只可治腑症之輕者若系肝經風熱血燥元虛等症必依前方論內服各宜之藥或外治以收膿濕亦可目病原由症治薛己曰目者白睛屬肺黑睛屬肝瞳人屬腎上下胞屬脾兩眥屬心內眥又屬膀胱五臟五色各有所司心主赤赤甚心實熱也導赤散赤微心虛熱也生犀散肝主青青甚肝熱也瀉青丸淡青肝虛也地黃丸脾主黃黃甚脾熱也瀉黃散淡黃脾虛也異功散目無精光及白睛多黑睛少者肝腎俱不足也地黃丸加鹿茸晝明夜暗者陽氣衰弱也沖和養胃湯凡赤脈翳膜從上而下者屬足太陽東垣選奇湯從下而上者屬足陽明局方流氣飲蓋翳膜者風熱內蘊也邪氣未定謂之熱翳邪氣已定謂之冰翳而沉於內邪氣既升謂之陷翳宜用升發佐以退翳藥上眼皮下出黑白翳者屬太陽寒水從外至內者屬少陽風熱從下至上緑色者屬足陽明及肺腎合病也疳眼者因肝火濕熱上衝脾氣有虧不能上升清氣故生白翳睫閉不開眵淚如糊久而膿流遂至損目宜益氣聰明湯茯苓瀉濕湯及四味肥兒丸目閉不開者因乳食失節或過服寒涼使陽氣下陷不能升舉也柴胡復生湯若胃氣虧損眼睛少力而不能開補中益氣湯暴赤腫痛肝火熾盛也龍膽瀉肝湯多淚羞明心肝積熱也生犀散風沿爛眼者腸有積熱也清胃散時時作癢者膿潰生蟲也用點藥紫蘇膏眼睫連札者肝經風熱也柴胡清肝湯若生下目黃壯熱二便祕不乳面赤眼閉在胎時感母熱毒也兒服瀉黃散母服地黃丸若肢體面目爪甲皆黃小便如屋塵色者難治又有痘疹後餘毒未盡上侵於目者腎肝虛也滋陰腎氣丸前症皆當審治於母兼調其兒其外障宜保命羚羊角散龍膽飲子其內障宜瀉肝黃連湯局方菊睛丸雀盲宜復明散通睛宜湯氏牛黃丸眼白多宜山茱萸丸鼻病原由症治聖惠方曰肺氣通於鼻若肺為風冷所傷冷隨氣乘於鼻故流清涕宜聖惠菊花散蓋津液涕唾得熱則乾燥得冷則流溢也張兼善曰小兒肺臟雍滯有積熱上攻於腦則全腦熱犀角升麻散肺臟有熱津液乾燥亦令無涕木通散其鼻中瘜肉宜千金方張渙曰肺氣通於鼻氣為陽若氣受風寒停滯鼻間則成鼻塞氣寒津液不收則多涕若冷氣久不散膿涕結聚使鼻不聞香臭則成齆鼻清肺膏若挾熱則鼻乾皆能妨害乳食薛己曰風邪客肺鼻塞不利宜消風散辛夷膏因驚僕氣散血無所羈而鼻衄異功散楊氏地黃散加柴梔鼻色赤脾胃實熱也瀉黃散微赤脾經虛熱也異功散加升柴口病原由症治史演山曰小兒口內白爛於舌上口外糜潰於唇弦瘡少而大不甚痛常流清水此脾胃虛熱上蒸內已先發而後形於外也百解散以疏表當歸散以和胃氣理虛熱次投牛蒡湯或天竺黃散地黃膏外塗黃金散有無故口鼻糜潰而不成瘡或服涼劑或塗末藥而不效者此名元焦故脈訣云陰數脾熱並口臭是脾有虛熱上攻於口也回陽散兒大者黑錫丹參苓白朮散調元散外以黃金散乾摻潰處先用蒸蜜水調點舌上令自咽下忌毒物若瘡生口角是脾有積熱再有外風吹著便覺折裂微有清血名燕窩瘡治法同前總之口瘡一症形與名不同故治法亦異有發於未病前有發於已病後有不病而自發大抵此疾不拘肥瘦血氣盛又將養過溫或心脾有熱或客熱在胃熏逼上焦而成此為實症宜宣熱拔毒使無炎熾則自愈也小兒偏風口噤總由肝膽二經之症居多蓋噤者筋急也由風木太甚乘脾以勝水逆故筋燥而收斂徑切或左或右其因一也若胃氣虛風邪所乘其筋脈偏急者屬外因若肝經風熱乘脾筋脈偏急者屬內因若脾肺虛外邪乘於腠理或服金石藥耗損肝血或吐瀉液亡不能養肝致口眼歪斜或半身不遂諸症皆屬肝血不足肝火生風宜滋腎水六味丸養肝血六味丸壯脾土異功散加柴胡鉤藤舌病原由症治初虞世曰脾家微熱冷舌絡微緊時時舒舌微露即收名弄舌宜瀉黃散其欲飲水脾胃液少也勿用冷藥反下舌腫硬漸粗大滿口名木舌由風熱盛也不急治即塞殺人宜當歸散瀉黃散玉露飲以消黃散擦舌上有小舌附舌下近舌根處名重舌用苦竹瀝浸黃柏末點舌上不效真蒲黃敷之不過三次愈內服當歸連翹湯外點緑袍散亦可蓋舌者心之苗心熱則生瘡破裂肝壅則血出如湧脾閉則白苔如雪總宜涼散上焦及心肝脾三經邪熱疏風化痰為主齒病原由症治王漢東曰腎主骨齒者骨之餘也小兒初生腎氣不足則齒生遲緩若腎經有熱上蒸於齒亦能令齒腫以腎為胃關故腎熱易移於胃也其由脾胃實火作渴口舌生瘡齒齦潰爛焮痛連頭面或惡寒發熱宜清胃散若因脾胃氣虛寒涼克伐或虛熱上行口舌生瘡弄舌發熱或嘔吐困倦大便不實流涎齦爛者五味異功散咽喉病原由症治談殊聖曰咽喉者一身之總要與胃氣相接呼吸之所從出也凡小兒熱毒蘊積於胸膈之間壅滯不散發為咽喉之病如單蛾雙蛾重舌木舌痄腮懸癰皆其屬也宜參雜病源流中咽喉症法治之大法先洗去口中舌上白苔其次掃去風痰然後依所見症治之薛己曰小兒喉痹因膏粱積熱或稟賦有熱或乳母七情之火飲食之毒當分其邪蓄表裡與症之輕重經之所主而治之若左腮色青赤肝膽風熱也柴胡梔子散右腮色赤肺經熱也瀉白散額間色赤心小腸熱也導赤散兼青色風熱相搏也加味逍遙散鼻間色黃脾胃熱也瀉黃散兼青木乘土位也加味逍遙散兼赤心傳土位也柴胡梔子散頦間色赤腎熱也地黃丸凡此積熱內蘊二便不通疏利之風邪外客而發寒熱發散之乳食膏粱積熱清胃散陰虛地黃丸大概當用輕和之劑以治其本切不可用峻利之藥以傷真氣其或感風熱但腫痛咳嗽者為輕症宜甘桔湯牛蒡湯化毒湯牛蒡子湯拔萃桔梗湯若至氣塞不通則非吹喉散立效散不可大小二便蓋聞二便均司於腎元陽上蒸肺脾符吻脾腐水穀大腸導引大便通調登圊勿窘肺主化原膀胱氣醞小便通調無須堅忍二便自利惟腎無損若夫閉澀各有其本傷暑傷寒風熱相等驚癇客忤疳積可憫類皆煩熱燥渴引飲二便祕結乃其兼症原其所由哺乳失準酸鹹凝滯甘甜食並腸胃風壅心胸癖梗水穀不行氣脈如捆三焦熱焚臟腑毒蘊治之之法疏導為穩至於癃淋陰莖諸疢腸頭癢痛癰毒高墳尿血腸紅一切宜審二便病除陰陽分畛大便不通原由症治王肯堂曰百問云小兒大便祕乃是肺家有熱在裡流入大腸以致祕結不通乃實熱也當以四順清涼飲加柴胡熱甚者加山梔黃芩流利之其表裡俱熱者面黃頰赤唇燥口乾小便赤澀大便焦黃無汗者先解表宜柴胡散汗之解後大便祕或肚疼者以清涼飲大柴胡湯承氣湯皆可下之積熱者神芎丸尤妙小便不通有陰閉陽閉癃閉曾氏曰小便不通有陰陽二症陰閉者為冷濕乘虛入里因而不通以白芍藥湯加南木香及用炒鹽尉臍四圍陽閉者因暴熱所逼澀而不通又有癃閉乃內臟氣虛受熱壅滯宣化不行非澀非痛但閉不通腹脹緊滿宜木通散玉露飲薛己曰東垣云小便不利有在氣在血之分在氣分者病居上焦必渴肺中有伏熱水不能生絶小便之源也法當淡滲能泄肺中之熱而滋水之化源在血分者病居下焦而不渴熱蓄膀胱是熱澀其流而溺不泄也須用氣味厚陰中之陰藥治之諸淋皆由腎虛巢元方曰諸淋症皆腎虛所致腎與膀胱為表裡至水下入小腸通於胞行於陰而為溲腎氣通於陰下流之道也淋有五曰膏淋小便有肥脂似膏浮在上此腎虛不能制其肥液而下行也曰冷淋先戰栗而後小便此亦腎虛而下焦受冷冷氣入胞與正氣交爭故小便澀而戰栗曰熱淋下焦有熱熱氣傳於腎流入於胞其溺黃多而澀間有鮮血曰血淋熱之極也心主血外行經絡內行臟腑熱盛則失其常道心與小腸表裡故下流入胞為血淋曰石淋腎主水水結則化為石腎為熱所乘遇小便則莖中痛不得流利痛引小腹則沙石從小便出甚至寒痛令人昏悶遍身有汗而後醒也並以局方五淋散下龍腦雞蘇丸自愈遺尿有寒熱異因劉完素曰遺尿不禁者為冷腎主水膀胱為津液之腑腎與膀胱俱虛而冷氣乘之故不能拘制其水出而不禁謂之遺尿睡中自出者名尿床此皆腎與膀胱俱虛而挾冷所致也以雞腸散主之亦有熱客於腎部干於足厥陰之經廷孔鬱結極甚而氣血不能宣通則痿痹而神無所用故液滲入膀胱而旋溺遺失不能收禁也尿白薛己曰小便如泔或良久變白亦有脾虛食積濕熱下注者先用茯苓散五七服次用四味肥兒丸王肯堂曰小便初出微赤良久白濁者乃熱疳之邪也初出黃白久白濁者乃冷疳之候也冷者益黃散熱者牛黃丸冷熱兼者蘆薈丸純下白濁者厚朴丸陰腫㿗疝巢元方曰諸筋會於陰器邪客於厥陰少陰之經與冷氣相搏則陰囊腫痛而引縮經中雖分四症曰腸㿗氣㿗水㿗卵㿗然小兒患此若治之不早則成痼疾如腰曲腹痛冷汗自出而陰囊二子吊縮入腹痛止方出名曰內吊用勻氣散及金鈴散曾氏曰有陰莖全縮不見有陰囊光腫不痛此因肝腎氣虛也宜金鈴散勻氣散蓋筋遇寒則引縮遇熱則弛張故三因用法以寬小腸氣疏風為治然小兒此症多因坐陰冷之處及感風濕而得用當歸散加檳榔蒼朮水姜煎服有外腎無故而膚囊腫大不燥不痛光亮如吹此氣虛所致宜三因家韭子丸勻氣散一症外腎膚囊赤腫通明及女兒陰戶腫脹乃心熱之所傳皆以木通散導赤散為治間有啼叫怒氣閉繫於下結聚不散加以水竇不行以致陰腫核腫者宜桃仁丸小兒狐疝氣偏有大小時時上下者此名偏墜以蜘蛛十四個炒焦桂枝五錢共為末每服八分日再酒調下蜜丸亦可外敷黑散尿血錢乙曰溺血者蓋心主血與小腸相合血之流行周遍經絡循環臟腑若熱聚膀胱血滲入脬故小便血出也薛己曰熱入大腸則大便下血熱入小腸則小便出血小兒多因胎中變熱或乳母六淫七情厚味積熱或兒自食甘肥積熱或六淫外侵而成小便出血者實熱清心蓮子飲虛熱六味地黃丸脫肛肛癢肺為華蓋表裡大腸大腸有戶肛門是張肛即腸頭本屬內臟其氣通流來往輸將肺如實熱腸結非常肺如虛寒腸出而長虛寒實熱此其大綱致脫之故還宜細詳風木剋土脾胃是傷暑濕風熱俱聚其方清濁既混洞泄莫當久則腸虛傳送力尪風冷所襲肛脫為殃他如久痢努力是妨稟賦怯弱神氣洸洸皆能致脫病非孔臧又有肛癢甘肥過嘗致生濕熱壅滯非良濕熱成毒蟲生蝕肛其肛作癢腸吊心忙便血發熱神志悽惶肌體骨立遍身生瘡清胃滌熱扶脾是襄內外兼治乃其要方蝕肛透內此子必殤肛病原由症治巢元方曰肺與大腸為表裡肛者大腸之門肺實熱則閉結不通肺虛寒則腸頭出露有因痢久裡急後重努力肛開為外風所吹或伏暑作瀉腸滑不禁或稟氣怯弱易於感冷亦致大腸虛脫凡小兒所患瀉痢皆因暑濕風熱乘脾胃虛而得治法宜補脾溫胃使金得受母之益而氣實宜藿香飲次則內投固腸之劑健脾飲養臟湯外以伏龍肝散敷之令其自收陳藏器曰小兒肛癢或嗜甘肥大腸濕熱壅滯或濕毒生蟲而蝕肛門若因濕熱壅滯宜四味肥兒丸大便祕者清涼飲蟲蝕肛門先用化䘌丸後用四味肥兒丸外以雄黃散納肛門若因病不食蟲無所養而食臟食肛者其齒齦無色舌上盡白四肢倦怠其上唇內有瘡吐血如粟心中懊憹此蟲在上食臟若下唇有瘡此蟲在下食肛若食肛透內者不治丹毒丹毒多般病原則一總由心火風毒搏擊主血者心血為火逼陰滯於陽血熱鬱逆內而熏蒸先蘊胸膈外達皮膚熱而色赤赤若丹塗熱若火炙凡熱有毒毒則痛極漸至壞爛水流肌裂入腎入腹斯至於厄亦有在胎胎毒久積逮至生後感熱發泄亦有乳母七情內迫酒醴燔炮恣情而食毒從乳流與兒相賊亦有食多脾弱難克熱蘊於中肌表紅色亦有孕時母受驚嚇驚邪傷胎遞相傳襲形發於外向夜啼泣眼胞微腫面帶青黑種種諸丹不能盡悉治法大要清火滌熱頃刻丹消肌膚一抹胎毒發丹史演山曰胎毒發丹者因胎毒內伏或頻浴熱湯或著烘衣或乳母飲食七情內熱助邪為患發於頭面四肢延及胸腹色赤遊走不定古人云從四肢起入腹囊者皆不治當急令人隨患處遍吮毒血各聚一處砭出之急服活命飲惟百日內忌砭以其肌肉難任也若發散太過表虛熱而赤不退者用補中益氣湯加防風白芷寒涼過劑胃氣受傷而熱赤不退者異功散加升柴或兼發搐等症用四君加升歸鉤藤若復用攻毒必致不起頭額間患者當砭之一切丹原由症治巢元方曰火丹候往來如傷寒赤著身而日漸大者是也又云丹火候狀發赤如火燒須臾熛漿起是也聖惠方曰凡小兒一切丹皆由風毒在於腠理熱毒搏於血蒸發於外其皮上熱而赤如丹塗狀故謂之丹若又不歇則肌肉壞爛若毒氣入腹則殺人合以一方同療之故號一切丹也用升麻散赤丹者由風毒之重故使赤也初發腫起大如連錢小者如麻豆肉上生粟如雞冠故亦謂之茱萸丹也宜升麻膏又云有天火丹者肉中有如丹赤色者大者如手劇者遍身赤癢故名天火丹也又云天火丹從背起赤點用桑白皮末羊脂調塗千金治天火丹病初從髀間起小兒未滿百日犯行路灶君若熱流陰頭赤腫血出方用伏龍肝末雞子清調塗又有鬼火丹者發兩臂赤起如李子戎鹽散有野火丹者丹發赤斑斑如梅子滿背腹千金遍身皆赤者名野火丹雄黃戎鹽各五錢為未雞子白調頻塗以瘥為度有家火丹者初發著兩頰兩膀上兩腋下古方治家火丹攻喉入腹用硝石凝水石銅器內熬干研服方寸匕有殃火丹者初發兩脅及腋下腿上用朴硝研末每服五分竹瀝調下更量兒大小加減有神火丹者丹發兩膀不過一日便赤黑醋調梔子仁末塗有熒火丹者丹發如灼在脅下正赤初從額起或從耳起而多痛赤小豆一合硝石五錢寒水石一分為末冷水調五分日三服量兒大小加減冷水調塗亦可有朱田火丹者先發於背遍身一日一夜而成瘡藍靛塗之或未成瘡雞子清調赤小豆末敷已成瘡赤豆末摻之有天灶火丹者發兩膀里尻間正赤流至陰頭赤腫血出者是也用赤豆伏龍肝等分為末雞子白調塗車前子末水調塗亦可有廢灶火丹者從足趺起正赤者是也赤小豆一兩牛角二兩燒灰共末雞子白調塗有尿灶火丹者丹發膝上從兩股起及臍間走入陰頭者是也李樹根半斤燒灰取田中流水調塗有赤流者小兒身上或一片片赤色如胭脂及漸引此名丹毒俗謂之流火若因熱而得者赤色因風而得者白色皆腫而壯熱也先砭其惡血內服升麻湯毒未入腹者可療也有蛇纏丹者此丹匝腰則死搗萵苣爛塗或研萵苣子塗之有蜘蛛丹者滿身病用白礬皂莢燒灰豬糟下泥和塗之有赤白遊腫者小兒肌肉虛為風毒熱氣所乘熱毒搏於血氣則皮膚赤而腫起其風隨氣行遊不定故名也又云遊腫之狀為青黃赤白無復定色遊走於皮膚之間肉上微光是也犀角散凡丹入腹生麻油塗之服嬰孺方丹痛搗竹茹汁及一升作一服只一二服效丹癢搗韭菜汁入些鹽與香油以手摩熱于丹上揩之立愈曾氏曰赤火丹瘤皆心火內熱而發赤如丹砂心主血而火性熱血熱相搏陰滯於陽即發丹毒心虛寒則癢心實熱則痛自腹生出四肢者易治自四肢生入腹者難療先用百解散表之次以當歸散加連翹荊芥水煎與宣熱拔毒其次赤葛散或初用化丹湯亦好有身上發時亦如前症不甚燥癢但見出浮遍體神昏不悅名陰濕毒症嬰孩生後百日之內半歲以上忽兩眼胞紅暈微起面青黯色向夜煩啼或臉如胭脂此伏熱在內亦有臉不紅者始因居胎之時母受重驚驚邪傷胎遞相傳襲形發於外初發時散生滿面狀如水豆腳微紅而不壯出沒休息無定次到頸項亦如硃砂名曰驚丹用四聖散先洗其目次百解散加五和湯同煎與解驚熱丹毒當歸散牛蒡湯亦可如驚丹發至胸乳間微有痰喘作搐急宜宣熱拔毒免至內流為害不淺五和湯加升麻生地燈心生薑則自消除仍用前數藥調治不生他症吳綬曰小兒丹毒乃熱毒之氣極與血相搏而風乘之故赤腫及遊走遍身者又名赤遊風入腹入腎則殺人也大抵丹毒雖有多種病源則一有赤丹毒遍身癢者或女子十五六而脈未通者多發丹疹皆由血有風毒乘之宜防己散五色丹聖惠方曰夫小兒五色丹者由丹發而改變無常或青黃赤黑白皆風毒之熱有盛有衰或冷或熱故發為五色丹也宜用小柴胡湯如法煎服以渣敷丹上良辨小兒欲發丹毒候王肯堂曰初生兒蓄伏胎熱欲發丹者必先見於外如在襁褓中無故眼生厚眵此丹毒欲發也更微喘急毒氣已甚上乘於肺也才覺有此急以水調龍腦飲子或藍根犀角等潛消其毒如渾身已有赤處即更以蕓薹等外挫其鋒消息而次第治之凡兒病諸丹腫其勢雖盛切不可遽用大黃芒硝輩大下之恐毒乘虛入里也但用性平解毒托裡藥小兒丹發若預度其勢必展引至咽頸腹心陰尻諸虛處可先塗藥以護之仍砭其引頭所向微出惡血以泄其毒丹毒宜食海蜇鯽魚然不可過
