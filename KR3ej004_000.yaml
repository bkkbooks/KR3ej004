body:
  text: 自敘余性素拘凡所著述皆言其所明弗明者弗敢言也夫明非不喻其理之謂謂必得所傳授親習其事有以證其理之不差而後曉然於心者亦曉然於手與目斯之謂明也如是言之則皆確鑿可據非浮光掠影之談非臆測傅會之語耳余於醫傳自孫慶曾先生凡男婦大小為脈為症皆得之親受故試之診視罔弗取效前著傷寒綱目雜病源流婦科玉尺皆曉然於心與手目一一筆之於書者也幼科中獨痘瘡一症其旨微其候險其變化百出尤必臨症指示而後能悉其精微知其蘊奧孫先生與前輩葉天士同出一門固精於痘而余於受業時非專屬行醫弗獲相隨痘家親聆教誨故獨於痘弗敢言也雖古痘醫首推錢仲陽陳文中後如曾氏萬氏湯氏魏氏皆接兩家宗派而翟氏聶氏尤能闡明錢陳底蘊其書具在未嘗不深切究明曉然於理之所在然未得臨症指示所謂曉然於心未能曉然於手與目也既不能曉然於手與目其敢自謂已明而妄有言乎故輯幼科釋謎六卷共分二十四門獨闕痘症非竟闕也庸有待也孫先生雖已捐世或得一精其業者受其傳焉則闕者未嘗不可補矣釋謎既成因書其故以冠於首時乾隆三十九年甲午十二月上浣無錫沈金鰲芊綠氏自書凡例一是書獨闕痘症已詳明自敘中其餘共分二十四門雖症變多端或有不盡於此者更當臨症消息然大段備具已足該幼科綱領一二十四門症候各著四言韻語闡明義理不列散文者便誦習也但韻語中探源析流義尚簡括閱者當求意旨之所在勿以為略而短之一韻語後各採前人議論以相發明要皆擇其至精至當歸於一是足為幼醫科律者故書中所登無錯雜無重疊無支離無牽扯一是書刪繁就簡雖卷帙無多實足發明病旨遵守斯法已大概無誤若更神而明之則存乎其人矣一芽兒臟氣未全不勝藥力周歲內非重症勿輕易投藥須酌法治之即兩三歲內形氣畢竟嫩弱用藥亦不可太猛峻攻驟補反受藥累一兒病多由食積固是要語醫家不可不知然亦有稟受薄弱或病後虛怯其所生病有全無食積者不得以此語橫亙心中仍為消導即或有之亦當扶正而使積自消消息甚微當意會毋執一古人治幼兒或專攻或專補或專涼或專熱皆有偏處是書宗旨一以中和當病為歸不敢偏於攻補涼熱一病家怕驚不怕瀉醫家怕瀉不怕驚要知驚瀉俱為重候在病家罔知病症固無足怪醫家既怕瀉又安得不怕驚耶若存不怕之念恐有輕心妄治以致害者不可不慎思之也一古人制幼方必使藥品與幼兒相得本與大方有別醫者固不可執古方以治今病亦不可妄作方劑有背古人之意此旨亦至微明者自領之一嬰兒兩三歲內全屬天真痛癢不能自達其時脈雖不可憑而觀色察形或視三關指紋醫者反得依據有一種嬌養小兒至四五歲六七歲知識略開便生詐偽不飢為飢不渴為渴不癢為癢不疼為疼父母溺愛不知諄諄告醫醫若不察便爾多誤此又當觀色於色之外察形於形之表以辨其情偽者也切勿為他瞞過
