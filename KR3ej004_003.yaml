body:
  text: 卷三黃疸脾土色黃病則成疸其病緣何先因虛損復感濕熱風寒外犍停郁腠理浸淫肢脘內熱蒸蒸外熏色變此其大凡脈必濡緩傷寒無汗瘀熱不散身必發黃尿澀腹滿暑邪挾濕經絡俱燀淪膚浹髓臟氣莫展黃如橘色筋骨痿軟或由疳瀉肌肉消剗肚大筋青皮黃髮卷胎疸之疾得於初産生下即黃遍身梔染原雖不同陰陽必辨陽黃體熱二便硬短脾與心搏胸膈必悶先利小便下法莫遠陰黃肢冷清便滋泫大便清黃腹痛而喘面目爪齒黃色暗慘脾虛失制腎水脹衍約此二端疸病斯顯再詳兼症身疼體懶強直其膊枯澀其眼溺如屋漏浮腫若繭或渴或嘔或寒或暖按症求之有此款款淡黃兼白乃胃怯懦或胃不和其病稍淺疸病原由症治錢乙曰諸黃皆相似如身皮目皆黃者黃病也身痛膊背強大小便澀一身盡黃面目指爪皆黃小便如屋塵色著物皆黃渴者難治此黃疸也其症多患於大病後別有一症不因病後身微黃者胃熱也大人亦同又有面黃腹大食土而渴者脾疳也又有自生而身黃者胎疸也古書云諸疸皆熱也深黃者是也若淡黃兼白者胃怯胃不和也難知云色如熏黃乃濕病也則一身盡痛若色如橘子黃者黃病也身不痛有干黃者燥也小便自利四肢不沉重渴而引飲宜梔子柏皮湯有濕黃者脾也小便不利四肢沉重似渴不欲飲宜大茵陳湯如大便自利而黃者茵陳梔子黃連三物湯或往來寒熱一身盡黃者小柴胡加梔子湯曾氏曰黃病不可一概論標本不同症治亦異乃脾胃氣虛感受濕熱鬱於腠理淫於皮膚蘊積成黃熏發於外故有是症或脾胃虛弱內因症癖攻之而成然疳瀉亦主皮黃肚大發直筋青肌肉消瘦外無色澤身必發黃治法感濕熱者以㕮咀五苓散加麻黃薑汗之即愈或茵陳蒿湯調下五苓散亦可若得乾疳癖者形如黃土宜醒脾或化癖丸羅謙甫曰豫治一小兒季夏身體蒸熱胸膈煩滿皮膚如橘黃眼白亦黃筋骨瘦弱不能行立此由熱加以濕而蒸搏於經絡入於骨髓使臟氣不生故脾遂乘心濕熱相合而成以疾也蓋心火實則身體蒸熱胸膈煩滿脾濕勝則皮膚如橘色有餘之氣必乘己所勝而侮所不勝是腎肝受邪而筋骨痿弱不能行立內經言脾熱者色黃而肉蠕動又言濕熱成痿是也所謂子能令母實實則瀉其子也蓋脾土退其本位腎水得復心火自平矣加減瀉黃散疸分陰陽張元素曰陽黃者大小便赤澀身熱是脾土與心火相搏為陽病法當先利小便後下大便陰黃者清便自調面目及身黃四肢冷是脾虛不能制腎水宜益黃散下使君子丸水腫諸腫脹附少陰腎水太陰肺金金本生水水融兩陰腎邪相傳膀胱是侵逆於脾土反被水沉脾虛失制隨水所淫脾既受克不能生心水激心火與肺相臨肺又受害化原失憑以致水溢腎邪縱橫脾易受濕水乃與並脾主四肢流走駸駸滲於脈絡皮膚是尋血亦化水停積日深乃作水腫腹飽筋青手足面目悉屬水停或氣喘逆或口呻吟或發煩渴或寒熱乘或小便祕溺出如針胸滿脅脹減食失音背平臍凸命乃將傾須潔淨府亦開鬼門去菀陳莝內經是針當須識此急早治懲根由症狀仔細詳明嗟嗟水腫病豈尋恆時俗謬妄河白是稱遍考方書古無此名水腫原由症治曾氏曰原腫病之由標本之疾腎主元氣天一之水生焉肺主沖化地四之金屬焉腎為本而肺為標皆至陰以積水其為病也腎者胃之關鍵關鍵不利則樞機不轉水乃不行滲於脈絡皮膚而為浮腫當推究內外所因為治兒大者憑脈以明虛實古方有十種論症短氣不得臥為心水兩脅緊痛為肝水大便鴨溏為肺水四肢苦重為脾水腰痛足冷為腎水口苦咽乾為膽水乍虛乍實為大腸水腹急肢瘦為膀胱水小便閉澀為胃水少腹急滿為小腸水然脈浮為風為虛沉伏為水病沉則脈絡虛伏則小便難即為正水脾脈虛大多作脾腫因循不治乃成水腫蓋脾屬土喜燥而惡濕常感濕氣濕又喜傷脾血化為水土敗不能制水則停蓄不行留滯皮膚故作浮腫初得病時見眼胞早晨浮突午後稍消急以羌活散疏解次醒脾散及間投南星腹皮散其脾冷困則燥以草果縮砂之類然此症夏秋冬治之頗易惟春不然蓋四時之水無如春水泛溢兼肝木旺而脾土受克不能受水所以難療須徐徐調理取效若脾熱而困入投燥熱藥雖不能生土亦可勝水奈殺之太過土不勝火則熱愈盛而不食發熱煩渴又進燥劑由此面目轉浮致脾敗手足背腫臍凸皆脾之外候有未經發表遞用下藥一瀉腫消乃曰瀉之力不知脾愈瀉而愈虛不旬月其腫如初此世人但知瀉腫為最不求十補而一瀉之論法當隨四時用藥解表通利小便春以七寶丹加麻黃桂枝赤苓薑蔥夏以五苓散加麻黃苡仁車前子薑蔥秋以清肺飲加羌活細辛商陸薑蔥冬以沖和飲加白朮生川烏赤小豆薑蔥次投滋潤救脾導水湯劑滲泄之乃為良法更以香陸胃苓丸頓服自安有初中便覺痰嗽氣喘小水不通正屬肺腎所主先服解表散次投三白散凡得此病非一朝夕之故不可求速效以致虛脫如愈後再感外風滿面虛浮用排風散和解仍服救脾湯劑免致反復劉氏曰治腫非易補養尤難忌食物切須詳審有久不消者下浚川丸即效史演山曰腫脹二症此由虛中有積久患失治日漸傳變症候多端隨輕重察盛衰審表裡以主治先固其本後治其標斯無患矣受濕腫食毒氣腫傷寒虛氣入腹腫瀉痢虛氣入腹腫此四種所患病不相同皆由虛得之受濕謂脾胃受濕冷久不克化氣浮四肢頭面皆腫食毒氣腫由脾胃傷冷積毒氣停留胃脘致氣入腹蠱脹腫急傷寒由下之太早乘虛入腹作腫瀉痢久脾氣亦虛是以致腫以上宜平調胃氣補臟充實方可去腫先服四味理中湯減半乾薑加白朮桑皮傷寒虛腫加枳實作喘加淡豉瀉痢虛脹宜正氣調胃胃氣既壯救生丹利之腫即退再用觀音散調補臟腑即平復矣王履曰氣虛腫亦名氣蠱血虛腫亦名血蠱小兒所患腫脹一門最為要急前人少有究竟然腫脹之作皆由榮衛不順臟腑怯弱壅滯三焦流注百脈表裡俱虛邪正相亂以致四肢浮盛肚腹膨滿多由食毒得之飲食得之症傷得之飢飽得之積久不化故成斯病病由虛得或妄亂通下因虛致虛根不得去疾加益甚是謂壞症危症先投榮衛飲子次服分氣飲子以散滯斯病去矣葉桂曰夏季濕熱鬱蒸脾胃氣弱水穀之氣不運濕著內蘊為熱漸至浮腫腹脹小水不利治之非法水濕久積逆行犯肺必生咳嗽喘促甚則坐不得臥俯不能仰危期速矣大凡喘必生脹脹必生喘方書以先喘後脹者治在肺先脹後喘者治在脾亦定論也金匱有風水皮水石水正水黃汗以分表裡之治河間有三焦分消子和有磨積逐水皆有奧義學者不可不潛心體認難以概述閲近代世俗論水濕喘脹之症以內經開鬼門取汗為表治分利小便潔淨府為里治經旨病能篇謂諸濕腫滿皆屬於脾以健脾燥濕為穩治治之不效技窮束手矣不知凡病皆本乎陰陽通表利小便乃宣經氣利腑氣是陽病治法暖水臟溫脾腎補後方以驅水是陰病治法治肺以輕開上治脾必佐溫通若陰陽表裡乖違臟真日漓陰陽不運亦必作脹治以通陽乃可奏績如局方禹餘糧丸甚至三焦交阻必用分消腸胃窒塞必用下奪然不得與傷寒實熱同例擅投硝黃枳朴擾動陰血若太陰脾臟飲濕阻氣溫之補之不應欲用下法少少甘遂為丸可也其治實症選用方法備採葶藶大棗湯牡蠣澤瀉散甘遂半夏湯子和桂苓湯中滿分消飲五子五皮湯茯苓防己湯小青龍湯木防己湯瀉白散五苓散控涎丹禹功丸大順散越婢湯徐姓小兒單脹數月服肥兒丸萬安丸磨積丹緑礬丸雞肫藥俱不效余謂氣分不效宜治血絡所謂絡瘀則脹也用歸鬚桃仁延胡山甲蜣螂蟅蟲靈脂山楂之類為丸十日全愈腹痛腹脹腹痛腹脹病屬中宮臟氣相擊邪正交攻挾寒挾熱症見不同曰食曰積壅滯於胸有虛有實其故難窮二病之因各以類從先詳腹痛勢若攻衝脾虛氣冷胃虛嘔㤝虛熱面黃實熱面紅食積便臭蠱積沫瀜肝木乘脾兩脅恫恫寒水侮土瀉利重重脾氣下陷重墜如鍾脾來克腎少腹如舂盤腸內吊腰曲猶弓啼干唇黑由於肝風亦有鎖肚硬如石䃔撮口面青初生屯蒙此二症者患之實凶以上種種務通其中次詳腹脹痞氣填衷悶亂喘滿下則倥侗不喘虛痞誤下疲癃土虛及肺金氣銷熔目胞腮腫內及喉嚨或緣病後脈細朦朧或緣痰食膈滿肚壅葉平聲或緣熱結壯熱若烘或緣寒積肢冷涎之丁奚哺露無辜病叢頭小腹大黃瘦其躬乃脹之重病氣日充審其根原毋俾病隆為補為瀉當可病松莫作等間用拯幼童腹痛原由症治錢乙曰小兒積痛食痛虛痛蟲痛大同小異惟蟲痛當口淡而沫自出治之隨其症用藥蟲與癇相似小兒本怯故胃虛冷則蟲動而心痛與癇略相似但目不斜手不搐也宜安蟲散又有胃受極寒極熱亦令蟲病或微痛或不痛遽然吐蟲法當安蟲為主若因治蟲反傷胃氣固不可因寒而動者理中湯加烏梅川椒因熱而動者五苓散加烏梅曾氏曰蟲痛小兒多有之其症心腹痛叫哭倒身撲手嘔吐清水涎沫面青黃時作時止口唇紫黑色者是蛔厥也宜安蟲散安蟲丸談殊聖曰小兒腹痛多因邪正交攻與臟氣相擊而作桔梗枳殼湯加青皮陳皮木香當歸為妙挾熱而痛必面赤壯熱四肢煩手足心熱四順清涼飲加青皮枳殼挾冷而痛者必面色或白或青手足冷七氣湯加桂調蘇合丸冷甚變症則面黯唇口俱黑爪甲皆青矣若內吊痛則鉤藤散其餘則芍藥甘草湯皆要藥也盤腸內吊痛婁全善曰曲腰乾哭無淚者為盤腸內吊痛面㿠白不思食為胃冷痛面赤唇焦便黃為熱痛面黃白大便酸臭為積痛口痰而沫自出為蟲痛然皆不如內吊之甚也吳綬曰小兒腹痛曲腰乾啼面青白唇黑肢冷大便色青不實名盤腸內吊痛急煎蔥湯淋洗其腹揉蔥白尉臍腹間良久尿自出其痛立止續用乳香散鎖肚痛曾氏曰有鎖肚痛者嬰兒一月後忽乳不下咽肚硬如石赤如朱撮口而哭面青唇黑手足口氣俱冷是也始因斷臍帶不緊為冷風所乘症甚危急以白芍藥湯烏梅散投之久則難治更參考臍風症腹脹原由症治錢乙曰腹脹由脾胃氣虛攻作也實者悶亂喘滿可下之用紫霜丸不喘者虛也不可下誤下則脾虛氣上附肺而行肺與脾子母皆虛肺主目胞腮之類脾主四肢母氣虛甚即目胞腮腫四肢黃色宜塌氣丸漸消之未愈漸加丸數不可以丁香木香橘皮豆蔻大溫散藥治之何以然脾虛氣未出故雖腹脹而不喘可以溫散藥治之使上下分消其氣則愈若氣已出附肺而行即脾胃內弱每生虛氣入於四肢面目矣小兒易為虛實脾虛則不受寒溫服寒則生冷服溫則生熱當識此勿誤也胃久虛熱多生疸病或引飲不止脾虛不能勝腎隨肺氣上行於四肢面目腫若水狀腎氣漫淫於肺即大喘也宜塌氣丸病愈面未紅者虛衰未復故也治小兒虛腹脹先服塌氣丸不愈腹中有食積結糞小便黃時微喘脈伏而實時飲水能食者下之蓋脾初虛而後有積所治宜先補脾然後下之後又補脾即愈也不可補肺恐生虛喘張云岐曰小兒熱結於內腹脹壯熱大便赤黃躁悶煩亂者宜用瀉青丸腹脹有虛實張元素曰凡久病吐瀉後虛則脈微細若色淡黃目胞腮虛腫手足冷先塌氣丸後異功散和中丸益黃散四君之類用諸溫藥養其氣實則脈洪實不因吐瀉痢下後腹脹而喘急悶亂更有熱有痰有食而腹脹者白餅子大黃丸解毒丸下之兼須認二便如都不通先利小便李杲曰大約寒脹多熱脹少皆主於脾龐安常曰東垣治脹不犯上下二焦用素問中滿者瀉之於內之法實者分氣消積虛者升陽滋血治者當師其意而活用之不可排擊宜中滿分消丸消痞丸丹腹脹方升陽滋血湯痞結積癖痞義為閉結則實哉始由痰飲熱蘊如煨專留腹脅似盆似杯營衛氣塞不能往來非心下痞易於宣開故時脹滿按則哭哀飲食減少寒熱相催原其所由脾臟虛羸久必土敗變難預推當須養正勿但結摧然痞雖結未成硬胚積且致癖堅實難錘積因乳哺節度多乖膩滯生冷停聚難裁風寒外襲濕熱中懷老痰堅結或系血衃皆能成積腹內為災始同雞卵逐漸如胎腹脹且痛足冷麵灰亦由脾病虛實兼該實則宜攻虛則宜培未可概論未可狐猜漢東王氏論積最佳可治不治分辨無差虛中之積症更難諧因驚傷食吐瀉與偕其脾愈弱其病難排取轉不著積反隱埋驚疳之候最易根荄嬰兒乳積面色莓苔口瘡吐哯腹中塊轠皆由乳後偏臥不回乳滯脅下結塊而隤痃癖一症更屬奇賅蘊結在腹成塊如梅時常叫痛骨瘦如柴左脅下痛痃氣為媒右脅下痛癖氣相偎俗名龜癆左右脅叉此亦脾病冷氣沉霾致成是疾寒熱侵骸至於傷暑秋必病痎寒熱來往脾胃氣衰血膜包水瘧癖如蛙古人成法可摩可楷詳核方治慎保嬰孩痞結原由症治薛己曰痞結既久飲食減少脾氣必虛久而不愈必先以固胃氣為主使養正則積自除若欲直攻其結不惟不能善消抑亦損其脾土脾土既虧必變症百出當詳參各類以治之陳藏器曰痞者塞也熱氣蘊於胸膈之間留飲聚於腹脅之內於是營衛不能流行臟腑不能宣通由脹滿而致痞結勢使然耳此熱實之症也時或發為壯熱宜聖惠破結散此方治小兒痞結雖服湯藥時暫得利而滯實不消心下堅脹按之即哭內有伏熱併成宜利大便破結散氣積癖原由症治李仲南曰積症有傷乳傷食而身體熱者惟肚熱為甚耳夜間有熱者傷積之明驗也錢乙曰小兒病癖由乳食不消伏在腹中乍涼乍熱飲水不止或喘而嗽與潮食相類若不早治必成癆疳寒熱飲水脅下有形硬痛法當用藥漸消漸磨之以其有症癖故令兒不食脾胃虛而發熱故引飲也曾氏曰嬰孩積症皆乳哺不節過餐生冷堅硬之物脾胃不能克化積停中脘外為風寒所襲或夜臥失蓋致頭疼面黃身熱眼胞微腫腹痛膨脹足冷肚熱喜睡神昏飲食不思或嘔或噦口噫酸氣大便醙臭此為陳積所傷如覺一二日先用百傷飲發表次當歸散蕩動積滯方下烏犀丸六聖丸重與寬利後用勻氣散調補陳無擇曰小兒五積為臟氣不行蓄積一處不動故曰積如伏梁息賁奔豚痞氣肥氣是也六聚謂六腑之氣留聚也腑屬陽陽氣流轉不停故其聚不定一處發而腹痛積聚之候皆面黃瘦劣㘂啀不生肌肉發立或肌體浮腫腹急多困多為水氣凡虛中有積者因傷食而瀉又吐如此漸處其病未瘥故曰虛積也又虛中之積有積而頻頻取轉卻取轉不著致其積尚伏故亦曰虛中積若驚積取下則屎青食積屎成塊子凡疳中虛積者因疳病轉瀉虛而疳不退故虛中爾所取下糞里白色也龔信曰癖塊者僻於兩脅痞結者痞於中脘皆乳哺失節飲食停滯邪氣相搏而成也諸積分辨王肯堂曰乳積者其候但是吐下乳來有酸臭氣因啼叫未已遽與乳吃停滯不化而得兼面青黃發熱作渴多睡口瘡漸漸黃瘦腹內結塊不散茅先生用丁香散開胃後用牛黃丸取下乳積後用勻氣散常服健脾散即愈食積者肚硬而熱或瀉或嘔因飲食過飽飽後即睡而得茅先生用牛黃丸取積後用勻氣散調理常服萬靈丸即愈氣積者面色黃白不進食腹痛啼叫利如蟹渤此因營衛不和日久而得茅先生用萬靈丸勻氣散醒脾散相夾調理驚積者時時泄清水如米泔是受傷而復有積煩悶啾唧常以生嗔先解散用百解散後理積烏犀丸三稜散醒脾散寧驚化積壯氣和胃仍節冷乳自愈熱積者大便不通風毒瘡癤喉閉痄腮咽中涎響茅先生用奪命散吐下熱涎後用勻氣散醒脾散調理常服鎮心丸天竺黃散愈積痛錢乙曰積痛口中氣溫面色黃白目無睛光或白睛多及多睡畏食或大便酸臭者當磨積而痛自除宜下積丸甚者白餅子下之後和胃氣用白朮散又有食積肚痛有熱者芍藥甘草湯加葛根吐者加生薑半夏或加枳實亦效其有積而潮熱寒熱心腹脹滿疼痛者良方妙香丸李杲曰凡小兒失乳以食餉之未有食腸不能克化致成食積腹脹而痛利色無常日久瘦弱鰲按有寒積腹痛者由日漸受寒兼吃冷物涼飲寒邪結於脾經遂致作痛始猶數日一發繼則一二日發或日日發發則面青白吐清水喜人手按或將物抵住方得稍可宜用棉子仁八兩炒令煙盡加入枳殼炒烏藥炒各一兩木香生研五錢神麯糊丸空心淡薑湯下數日當下白物漸愈積病有治有不治王漢東曰小兒積病可醫者九面上虛腫是積積者脾之所繫脾主身之肌肉故應於面故知是脾積其脾系土土無正形故早晚浮腫不定多則早浮其睡則脾不磨上面作腫若病後此症則是虛中積宜用補脾消積行氣等藥又面合地臥是積何以合地其受積在脾是冷積何以知之其脾好土故知在脾其冷者屬陰故知傷冷硬物得之宜下熱藥耳又腹脹是積其積在肺何以知之其肺主於氣才受積其氣便冷腹脹滿氣急故知在肺如腹脹先宜調氣後用轉轉後更宜調氣又小便如油是積其積在小腸何以知之積受於脾脾當傳心心不伏故亦曰虛中積若驚積取下則屎青食積屎成塊子凡疳中虛積者因疳病轉瀉虛而疳不退故虛中爾所取下糞里白色也龔信曰癖塊者僻於兩脅痞結者痞於中脘皆乳哺失節飲食停滯邪氣相搏而成也諸積分辨王肯堂曰乳積者其候但是吐下乳來有酸臭氣因啼叫未已遽與乳吃停滯不化而得兼面青黃發熱作渴多睡口瘡漸漸黃瘦腹內結塊不散茅先生用丁香散開胃後用牛黃丸取下乳積後用勻氣散常服健脾散即愈食積者肚硬而熱或瀉或嘔因飲食過飽飽後即睡而得茅先生用牛黃丸取積後用勻氣散調理常服萬靈丸即愈氣積者面色黃白不進食腹痛啼叫利如蟹渤此因營衛不和日久而得茅先生用萬靈丸勻氣散醒脾散相夾調理驚積者時時泄清水如米泔是受傷而復有積煩悶啾唧常以生嗔先解散用百解散後理積烏犀丸三稜散醒脾散寧驚化積壯氣和胃仍節冷乳自愈熱積者大便不通風毒瘡癤喉閉痄腮咽中涎響茅先生用奪命散吐下熱涎後用勻氣散醒脾散調理常服鎮心丸天竺黃散愈積痛錢乙曰積痛口中氣溫面色黃白目無睛光或白睛多及多睡畏食或大便酸臭者當磨積而痛自除宜下積丸甚者白餅子下之後和胃氣用白朮散又有食積肚痛有熱者芍藥甘草湯加葛根吐者加生薑半夏或加枳實亦效其有積而潮熱寒熱心腹脹滿疼痛者良方妙香丸李杲曰凡小兒失乳以食餉之未有食腸不能克化致成食積腹脹而痛利色無常日久瘦弱鰲按有寒積腹痛者由日漸受寒兼吃冷物涼飲寒邪結於脾經遂致作痛始猶數日一發繼則一二日發或日日發發則面青白吐清水喜人手按或將物抵住方得稍可宜用棉子仁八兩炒令煙盡加入枳殼炒鳥藥炒各一兩木香生研五錢神麯糊丸空心淡薑湯下數日當下白物漸愈積病有治有不治王漢東曰小兒積病可醫者九面上虛腫是積積者脾之所繫脾主身之肌肉故應於面故知是脾積其脾系土土無正形故早晚浮腫不定多則早浮其睡則脾不磨上面作腫若病後此症則是虛中積宜用補脾消積行氣等藥又面合地臥是積何以合地其受積在脾是冷積何以知之其脾好土故知在脾其冷者屬陰故知傷冷硬物得之宜下熱藥耳又腹脹是積其積在肺何以知之其肺主於氣才受積其氣便冷腹脹滿氣急故知在肺如腹脹先宜調氣後用轉轉後更宜調氣又小便如油是積其積在小腸何以知之積受於脾脾當傳心心不受觸則入小腸小腸是心之腑故知在小腸則積其水道小便如米泔油相似也又發黃是積是積氣傷心心主血脈潤遍身毛髮被積氣所幹則發黃故知是積傷心宜下空心散及取積藥此人必時復發熱也又赤白痢是積其積在肺受傳大腸及有外傷而得何以知之肺主金色白後赤則是外邪故知肺傳大腸則為赤痢也宜取後調氣又兩眼黃赤睛青是積在肝何以知之肝主木色青卻被氣所幹即黃赤睛青者眼屬肝若受積故令睛青是肝受積若傳膽必口苦不要吃物宜涼藥退之又遍身虛腫是積其積不在臟只在腑何以知之為其積曾取後被藥發動即不在臟故出皮膚之間為腫也只宜下取虛中積藥後補之又多瀉白糞是積是受冷積在脾何以知之脾主化受冷積在脾冷滑而瀉白屎故知在脾宜先轉後熱藥補之以上皆可治者也積病不可治者六喘急是肺積肺主氣喘急則肺絶當面白全無血色故不可醫又面黑是腎積蓋面黑者腎絶也當不辨好惡眼直無光只一日而死又吐熱氣是榮積其不可醫者是血絶也血主於心心不能管故出熱氣不止耳又手腳心生瘡是衛積衛者氣也胃氣不生故手足生瘡若衛絶則氣不回只半日死也又噁心吐乾嘔是胃絶何以不醫胃主化食熱則惡吐故不治當食乳不化不食亦乾嘔吐面色青黃無血色也又瀉久住了又瀉是積咬脾爛何以知其脾爛當瀉白糞而食不消住了卻放糞赤黑而死故知脾爛以上皆不可治者也痃癖原由症治龐安常曰癖者血膜包水側僻於脅旁時時作痛也惟癖為能發熱為能生寒熱故瘧家中脘多蓄黃水日久而腹結癖寒熱不已有是疾者由乳哺失調三焦關格以致水飲停滯腸胃如冷氣搏之則結聚成癖輕者積滯木香丸重者取癖丸王肯堂曰茅先生論兒生五月至七歲有結癖在腹成塊如梅核大來去或似卵大常叫痛者左脅下名痃氣右脅下名癖氣用蓬莪朮散夾健脾飲服即愈如面黑目直視瀉黑血口鼻手足冷不進食者死食積太陰脾臟奠安一身論其職掌化宿消陳滋榮臟腑灌液布津上承胃納表裡相循下輸大腸傳送頻頻土為物母乃見其真本臟氣虛虛則寒因虛寒相搏或又濕屯水穀所入莫與磨磷久則成積腹痛脹䐜吞酸嘔吐昏冒其神夜必發熱肚熱眉顰當須識此食積是論若有外感益覺邅迍夾食傷寒寒熱吟呻先消其食發汗溱溱寒熱自止寧至經旬脾腎虛敗瀉必侵晨脾胃實熱渴咽燥唇此皆食積脾病災親或則傷飽脾氣不伸積留日久潰敗濡淪變成食利膿積維均微痛微脹肚腹內堙法從積滯調理是遵夫然後愈病得回春鰲按小兒之病多由乳食未化即或六淫相干成疾亦必兼宿食故另出食積一門不混於積癖條內食積原由症治王履曰仲景云寸口脈浮而大按之反澀故知有宿食下之宜大承氣湯然同一發熱而傷食者惟肚腹之熱為甚且糞極酸臭夜間潮熱尤傷食之明驗也小兒宿食不消者胃納水穀而脾化之兒初不知樽節胃之所納脾氣不足以勝之故不消也錢氏論食不消由脾胃冷當補脾益黃散主之是也初虞世曰小兒食積者因脾胃虛冷乳食不化久而成積其症至夜發熱天明覆涼腹痛膨脹嘔吐吞酸足冷肚熱喜睡神昏大便酸臭是也有前症而兼寒熱者名曰食積寒熱若食在胃之上口者吐之在胃之下口者消之腹痛痞脹按之益痛者下之下後仍痛按之則止者補之夾食傷寒者先散之用參蘇飲熱甚便祕者先利之大柴胡湯如無外感只傷食不至於甚保和丸調之蓋脾為至陰之臟故凡脾病者至夜必熱熱而兼寒則又見所勝者侮所不勝者矣食未消者消之則寒熱自止既消者補之則寒熱自痊若手足並冷喜熱飲食此中州虛寒也皆溫之大便欲去不去脾氣下陷也宜升之若夜間或清晨泄瀉者脾腎俱虛也四神丸手足熱作渴飲水者脾胃實熱也瀉黃散手足雖熱不渴大便不實者白朮散仍參腹痛腹脹積痛積滯治之食積痢聞人槻曰有食飽傷脾脾氣稍虛物難消化留而成積積敗為痢肚腹微痛先調胃氣次理積卻止痢則病根自除和中散理虛養胃三稜散烏犀丸助脾化積沉香檳榔丸守中湯進食止痢食積吐瀉張渙曰吐乳瀉黃是傷熱乳吐乳瀉青是傷冷乳皆當下之此迎而奪之之法也不若傷熱者用五苓散以導其逆傷冷者用理中湯以溫其中自然平復也脾經積滯未除再為飲食所傷不吐則瀉不瀉則吐宜以三稜散化積守胃散和中鰲按痢與吐瀉各有專門二條列於此者以專由食積也吐瀉單吐單瀉吐病傷胃瀉病傷脾吐上焦郁瀉下焦衰臟腑部分各不相移論吐之原病非一機或由胃虛睡必露眥或由胃冷其脈沉微或由胃熱涼飲是怡或胃虛熱渴而溺稀或胃有積肚熱面黧或胃有痰嗽逆聲嘶挾驚挾毒吐亦相隨和中助胃止吐之基論瀉之原五臟兼推脾受木克面黃神疲脾為水侮洞泄如篩心脾氣虛瀉黃多噫肺脾氣拂沫出多啼脾氣虛寒冷及四肢脾家積熱心煩口糜脾為濕滯浮腫脈遲脾氣下陷腹墜如遺脾中虛痞脹滿難支清神益氣止瀉應施吐瀉交作霍亂維危或心先痛吐難自持或腹先痛瀉必淋漓中焦閉隔上下氣暌揮霍撩亂方書慎之曰攪腸痧俗名甚奇開通疏利乃是正治吐瀉之故調護多非兒生幼稚六氣尚虧乳食不節外感侵欺清濁相干蘊作瘡痍先瀉後吐由虛冷兮先吐後瀉其實熱治詳其輕重審厥參差維吐之屬嘔則類齊維瀉之屬痢則同歸其分別處未可或迷再參歲氣更辨四時勿輕心掉才可言醫吐瀉原由症治虞摶曰小兒吐瀉泄黃傷熱乳也吐瀉泄青傷冷乳也皆用白餅子下後傷熱乳者玉露散傷冷乳者益黃散王汝言曰小兒吐瀉並作即名霍亂有心痛而先吐者有腹痛而先瀉者莫不由中焦而作上焦主納而不出中焦主腐化水穀而生榮衛灌溉百骸下焦分別水穀主出而不納脾居中州胃為水穀之海乳哺入胃脾能克化然後水穀傳變得宜豈有吐瀉之患凡小兒吐瀉皆因六氣未完六淫易侵兼以調護失宜乳食不節遂使脾胃虛弱清濁相干蘊作而然有先瀉而後吐者乃脾胃虛冷其候先瀉白水吐亦不多且氣緩而神色慢額前有汗六脈沉濡此為冷也有先吐而後瀉者乃脾胃有熱氣促唇紅吐來面赤脈洪而數渴飲水漿此為熱也冷熱宜辨婁全善曰吐瀉昏睡露睛者胃虛熱也錢氏白朮散吐瀉昏睡不露睛者胃實熱也錢氏玉露散張兼善曰初生吐瀉大便色白停乳也紫霜丸下後用香橘餅初生月內吐瀉宜硃砂丸如吐驟或瀉完穀者傷風甚也凡傷風多作吐瀉者風木好侵脾土故也宜大青膏王履曰嬰兒暑月吐瀉身熱宜玉露散或益元散寒月吐瀉身冷宜益黃散錢乙曰吐瀉久將成慢驚風宜和胃丸雙金丸一五歲兒吐瀉壯熱不思乳飲錢見曰此見目中黑睛少而白睛多面色㿠白必多病夫面色㿠白者神怯也黑睛少者腎虛也黑睛屬水本怯而虛故多病也縱長成必肌膚不壯不耐寒暑易虛易實脾胃亦弱更不可縱恣酒色若不保養不過壯年也面上常無精神光澤者如婦人之失血也今吐利不食壯熱者傷食也又虛怯不可下下之虛入肺則嗽入心則驚入脾則瀉不止入腎則益虛但以消積磨化之為微有食積也薛己曰小兒吐瀉手足指冷者脾氣虛寒也異功散加木香瀉而腹中重墜者脾氣下陷也補中益氣湯服克滯藥而腹中窄狹者脾家虛痞也六君子湯面黃瀉青者脾虛而肝乘之也六君加升柴木香多噫瀉黃者六君加炮薑升麻生下半月內吐者只調其母兒不勝藥也四時吐瀉治分表裡錢乙曰春冬之治宜從表如傷寒吐瀉身溫乍涼乍熱睡多氣粗大便青白嘔吐乳下不消時咳嗽更有五臟兼現症當煎入臟君臣藥先服大青膏後服益黃散如先曾下或無下症慎不可下此乃脾肺受寒也若傷風吐瀉身熱多睡能食乳飲水不止吐痰大便黃水此為胃虛熱渴吐瀉也當生胃中津液以止其渴白朮散後用發散大青膏傷風吐瀉身涼吐沫瀉青白悶亂不渴哽氣長出氣睡露眼此傷風荏苒輕怯因成吐瀉專先補脾益黃散後用發散大青膏此傷風二症多病於春冬也夏秋之治宜從里兒生三日內壯熱不思乳食大便乳食不消或白色是傷寒當下之白餅子並和胃益黃散兒生三日至十日吐瀉身溫涼不思乳食大便青白乳食不消上實下虛也更有五臟兼見症肺則睡露睛喘氣心則驚悸飲水脾則困倦多睡肝則呵欠煩悶腎則不語畏明當視其兼臟症先瀉其所實而補其虛如脾虛益黃散主之此二症多病於夏秋也再如五月夏至後吐瀉身壯熱者此熱也蓋小兒臟腑十分中九分熱也或因傷熱乳食不消瀉深黃色玉露飲六月大暑後吐瀉身大溫而似熱臟腑中六分熱四分冷也吐嘔乳食不消瀉黃白色似渴或乳或不乳食前少服益黃散食後多服玉露飲立秋後吐瀉身溫臟腑中三分熱七分冷也不能食乳多似睡悶亂哽氣長出氣睡露睛唇白多噦欲大便不渴食前多服益黃散食後少服玉露飲八月秋分後吐瀉身冷無陽也不能食乳乾嘔噦瀉青褐水當補脾益黃散不可下也凡治小兒吐瀉大法五月內九分下而一分補八月內九分補而一分下切勿混治萬全曰小兒盛暑吐瀉邪熱在下焦則瀉在上焦則吐亡津必渴用玉露散雖吐時時與啜之過三日必愈如身熱脈大溺黃五苓益元各半湯調溫服如身涼脈細尿清早晨益黃散後玉露散如過四五日困弱異功散或用和中散曾氏曰小兒盛夏初秋遇夜乘涼渴而飲水過食生冷攻擊腸胃遂乃暴吐暴瀉傳作手足俱痹筋攣而痛痛則神志不寧若以驚症治之誤矣張元素曰如有風而瀉用防風羌活謂吐瀉兼肝病風搐拘急如有熱而瀉用大黃黃連謂吐瀉兼心病身熱也有寒而瀉用附子謂吐瀉兼腎病身冷或足脛寒而逆也有濕而瀉用白朮茯苓謂吐瀉兼本臟脾病多睡體重昏倦也有肺病而瀉用白芍桂心定喘麥冬人參甚者用檳榔大便不通加大黃謂吐瀉兼肺病咳嗽也吐瀉心腹痛聖惠方曰小兒冷熱不調乳哺不節使陰陽清濁之氣相干而變亂腸胃間則成霍亂而心腹痛者冷熱氣與正氣相擊或上攻心下攻腹故痛單吐吐病原由症治巢元方曰毒氣吐者春夏以湯與兒腸胃脆弱不勝藥勢逆吐下不止藥熏臟腑煩懊頓乏為中毒氣吐下千金藿香湯曾氏曰論吐之原難以枚舉有冷吐熱吐積吐傷風嗽吐傷乳吐吐則同而症則異冷吐者乳片不消多吐而少出脈沉微面白眼慢氣緩神昏額汗此因風寒入胃或食生冷或傷宿乳胃虛不納而出宜當歸散加煨薑陳皮或間投沖和飲理中湯不效參香飲熱吐者面赤唇紅吐次少而出多乳片消面色黃遍體熱甚或因暑氣在胃或食熱物精神不慢而多煩躁此熱吐也宜大順飲香薷飲誤服熱藥先投緑豆飲解之次止吐藥積吐者眼胞浮面微黃足冷肚熱日輕夜重兒大者脈沉緩此宿冷滯脾故吐黃酸水或有清痰脈實而渴為食積所傷吐酸醙氣或宿食並出兒小者哯乳不化是也先五苓散和解次烏犀丸最小者三稜散傷風嗽吐者熱生風風生痰痰結胸中肺氣不順連嗽不止和痰吐出此為嗽吐痰壅而作乃為實症先投清肺飲小柴胡湯若嗽久肺虛土不生金面白唇燥干嗽乾嘔而無痰可溫補為主茯苓厚朴湯惺惺散傷乳吐者才乳哺後即吐或少停而吐此因乳飲無度脾弱不運故也三稜散此外又有風痰吐乃是傷寒不解吐乳夾痰若多時必要生風青州白丸子半夏散挾驚吐張渙三香丹疳積吐本事方凡霍亂吐不止者伏龍肝細末二錢白扁豆炒煎湯調下立止若扁豆嫩苗更好錢己曰小兒經年吐乳眼慢糞穢有筋膜者乃父母交感時吃乳所致名曰交精吐奶宜益黃散五疳保童丸談殊聖曰小兒驚膈吐還頻日夜連連不暫停淥水槐黃泔澱汁和蟲乳食一時噴丁香研共生犀服五膽牛黃主有勳若有得逢如此藥值饒危困卻還魂此名歸命丹單瀉瀉病原由症治巢元方曰小兒暴瀉者由腸胃虛卒為冷熱之氣所傷而成熱則色黃赤冷則色青白若冷熱相交則變為赤白滯痢也宜龍骨散小兒久瀉者大法補虛消積宜華他久利神驗方張元素曰乳食不消初病忽然氣出冷四肢亦冷面白無光澤精神不定乃胃氣不和可以大溫藥治之使君子丸益黃散若病泄瀉日久不瘥乳食不化是脾胃有風冷先服益黃散二帖後用宣風散導之再大補胃曾氏曰論瀉之原有冷瀉熱瀉傷食瀉水瀉積瀉驚瀉風瀉臟寒瀉疳積䑋瀉種種不同冷瀉多是白水瀉密而出少腹痛而鳴眉皺目慢面帶白色額有汗沖和飲當歸散參苓白朮散熱瀉者大便黃色如筒吊水瀉過即止半日復然心煩口渴小便黃少乳食必粗先用五苓散或大順飲次錢氏白朮散香薷散傷食瀉者乃脾胃素弱復傷生冷故大便不聚而瀉或因母餐生冷肥膩亦能作瀉面唇俱白瀉稀而少或如敗卵臭身形黃瘦宜固脾和中散醒脾散水瀉者即洞泄乃陰陽不順水穀不分瀉黃水而小便少次多無度夏秋之際晝則解衣取涼夜則失蓋感冷冷熱相激清濁混亂或因母熱與乳令兒脾胃不和水穀交雜而下宜五苓散加苡仁車前半夏分正陰陽或白朮散六和湯積瀉者脾氣虛弱乳食入胃不消久又傷冷食傳之大腸遂成泄瀉諸藥無效蓋以積在脾胃未除何由得愈先三稜散除積次沉香檳榔丸參苓白朮散再和中散驚瀉者糞青如苔稠黏如膠不可便止但鎮心抑肝和脾胃消乳食先五苓散次三稜散風瀉者慢驚大病後有之糞稀黃褐色或夾食而下因脾虛所致或夾黑褐色者屬脾虛而腎水乘之也若久則驚搐先五苓散加苡仁以疏腎水次瀉黃散以去脾風再參苓白朮散以補脾氣臟寒瀉者糞青不稀不稠或下清水未瀉腹痛而鳴啼哭方瀉生三五月內有此周歲則無因斷臍風冷外逼而成先沖和飲加蔥白次當歸散加煨薑及勻氣散理中湯疳積䑋瀉者面黃肚脹腳弱頭大項小發稀而豎肌瘦不食朝涼夜熱腹有症癖瀉無定色惡臭自瀉自止先三稜散加陳皮次烏犀丸蘆薈丸快腸湯凡瀉痢色青甚而淡黃夾白寒多熱少此陰邪勝陽宜守中湯胃苓湯扶表救里方進當歸散加陳皮紫蘇生薑糯米寒甚者理中湯加附子薑棗次南星腹皮飲若瀉泄色青淡有沫黃稠熱多寒少亦致黃瘦煩躁宜五苓加苡仁車前生薑解散餘邪仍用茵陳山梔湯送五苓散退黃色或萬安飲四神丸鰲按疳積䑋瀉䑋者脹也其症必目胞腫腹脹喜飲水利色無常日見消瘦痢疾東垣有言凡發痢疾白則傷氣赤則傷血赤白相兼氣血都怫東垣此言千古無匹請申論之昭昭若揭惟肺主氣氣傷肺遏白由肺來暑濕所折惟心主血血傷心熱赤自心來暑濕是結至若痢黃乃脾胃泄暑濕傷土飲食無節黃中白垢肺脾氣鬱黃中赤穢心脾氣奪五臟俱傷五色痢溢治必求本審之貴悉因熱因寒斯言恍惚痢必腹痛後重裡急乃氣不宜津液凝澀每一滯行腸痛如刮大腸既瘀小腸亦窒陰陽不分虛實更疊內經之言其因不一春傷於風夏生飧泄少陽在泉火淫如爇民病注瀉赤白俱出此皆病因非病從發至於噤口至於休息痢至於此多死少活審脈察症毋少輕忽方藥所投庶保無失赤白痢原由症治巢元方曰小兒痢如膏血者名赤痢腸氣虛極腸間脂與血俱下也蠱毒痢者寒暑不調小兒解脫為毒癘之氣所傷邪與氣血相搏毒蘊腸胃值大腸氣虛則其痢狀血瘀如雞肝此毒氣甚熱狀如中蠱故名脾毒痢歌云脾間有毒號純陽本為醫人熱藥傷致使大腸多結澀多饒滴血在枯腸如風腹閉難開眼身熱頭溫腳轉涼舌赤胸高為此候多啼喘急更如狂先須解熱並開胃便是明醫用藥良此脾受熱積失治則毒伏治先涼脾次去積若胸骨忽高更加喘急不治宜金華散香連丸風毒痢歌云八痢之中風轉難形如青草汁多般毒風豆汁添邪熱胃敗雞肝片片全加赤不須先下積閉眸絶食不堪看若歸白痢還須下臟腑頻溫得本源聖惠方曰小兒血痢者由熱毒折於血血入大腸也血隨氣循環經絡通行臟腑常無停滯若為毒熱所乘遇腸虛血滲入腸則成血痢小兒腸熱則痢下鮮血如腸風一般小兒膿血痢者由熱毒在臟血得熱則流滲入大腸與腸間津液相搏積熱蘊結血化為膿腹虛則泄故成膿血痢有渴痢兼症者小兒利兼渴候此是水穀痢津液枯渴臟腑虛燥則引飲若小便快者利斷渴則止小便澀者水不行於小腸滲入腸胃渴亦不止利亦不斷凡如此者皆身體浮腫脾氣弱不能剋水故也亦必眼痛生障小兒上焦本熱今又利下焦虛上焦熱氣轉盛熱氣熏肝故也先醒脾散勻氣散調一二日後用調中飲自愈有痢後羸瘦小兒腸胃虛弱受風冷或挾疳氣則下痢痢斷後腸胃尚虛穀氣猶少不能榮血氣故羸瘦桔梗丸痢後浮腫歌曰冷痢日久失醫治遍身浮腫卻如吹脈洪是氣化為水沉實還因積有之順氣腫消為上法氣平兩日定多尿莫教食飽還憂滯此疾先因積損脾用止渴聖效散小兒赤白久痢不止腹痛瘦弱不思飲食宜黃連散肉豆蔻散曾氏曰赤白之痢世人無不曰赤為陽為熱白為陰為冷或曰無積不成痢至於調治若冷熱藥更進或單投去積藥必難效蓋風木克胃土不為暴下則成痢疾赤白交雜為陰陽不分法當分正陰陽若既分仍赤白同下則專究所因若先白後赤乃內傷生冷失於蓋復又元氣感於暑熱宜先救里次解暑毒若先赤後白乃先傷熱而後感冷先宜解熱後治痢有夾熱痢者則純下鮮血此風能動血宜冷服黃連香薷散及當歸散加醋炒蒸柏葉有夾冷痢者則下純白凍或白上有粉紅色或似豬肝瘀血皆為陰症蓋血得寒則凝也先五苓散加守中湯次固真湯倘不辨虛實冷熱妄治必脾胃愈虛或成噤口又有裡急為陽後重為陰未圊前腹痛為裡急已圊後腹痛為後重裡急大腸澀也先大順飲加寬氣散利解寬腸丸後重為氣虛五苓散加人參送香連丸若二症俱作雙金飲然瀉痢二字自是兩症糞夾水來多而順者曰瀉帶血純白凍來三五點而疼者曰痢輕重陰陽於此而分斯為治法有膿血交雜經久不止日輕夜重或日夜頻數食減痛多並用萬金散神效散有五色痢者乃因五臟蘊熱榮衛不調五穀不化熏腐臟腑神氣昏沉日久不散此候已危最苦是腹中利痛兒小者無治法蓋五色者乃五臟之色皆見於外兒大者可用局方三神丸或小來復丹煎五苓散送下或可療又有風痢多是黃褐色與疳瀉頗同但不臭為異此風毒停滯於脾瀉黃散若赤白同下不禁小便少澀痛熱並作唇裂眼赤氣促心煩坐臥不安狂渴飲水穀道傾陷飲食不進者難治薛己曰海藏用四君芎歸治虛弱之痢四君乾薑治虛寒之痢愚嘗治手足指熱飲冷者為實熱用香連丸手足指冷飲熱者為虛寒用異功散送香連丸若兼體重肢痛濕熱傷脾也升陽益胃湯小便不利陰陽不分也五苓散若濕熱退而久痢不止者脾氣下陷也補中益氣湯倍升柴瀉痢兼嘔或腹痛脾胃虛寒也異功散加木香炮薑或變為瘧者肝克脾也六君加升柴鉤藤若積去仍痢脾氣虛也四君送香連丸若因母膏粱六淫七情致兒為患者當兼治其母葉桂曰膿血痢㽱痛後重初用宣通驅熱如芩連大黃必加甘草緩之非如傷寒屎堅須用芒硝咸以耎堅直走破泄至陰此不過苦能勝濕寒以逐熱足可卻病噤口痢都因熱升濁攻必用大苦如芩連石蓮清熱人參輔胃益氣熱氣一開即能進食藥宜頻頻進二三口小兒休息久痢變為糞後下血最難速愈有因氣弱下陷補中益氣虛寒若飲食不化益黃散濕熱未淨氣分延虛清暑益氣湯胃強善食者苦寒清熱更節飲食須善調經月久瀉久痢必傷腎腎司二便也必肛門後墜與初病濕熱裡急下重不同治以攝陰液或佐疏補久則純與攝納
